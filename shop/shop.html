<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <!-- ==========================================================================
         1. ENTERPRISE SEO, METADATA & BROWSER OPTIMIZATION
         ========================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Digital Marketplace | Nexra Tech PK</title>
    <meta name="description" content="Browse Pakistan's elite collection of premium software licenses, SaaS tools, UI kits, and physical tech assets. Instant delivery and 256-bit encryption.">
    <meta name="robots" content="index, follow">
    
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <link rel="icon" id="dynamic-favicon" href="" type="image/png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Digital Marketplace | Nexra Tech PK">
    <meta property="og:description" content="Shop elite SaaS tools and software keys with instant automated delivery.">

    <!-- ==========================================================================
         2. RESOURCE PRELOADING & TYPOGRAPHY
         ========================================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- ==========================================================================
         3. HYBRID DATABASE SDKs
         ========================================================================== -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- MASTER CONFIGURATION (Relative path to root) -->
    <script src="../firebaseconfig.js"></script>

    <!-- ==========================================================================
         4. CORE DESIGN SYSTEM & PAGE CSS
         ========================================================================== -->
    <style>
        :root {
            /* Fallback Variables (Overridden by NexraBrand) */
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.25);
            --brand-dim: rgba(255, 74, 23, 0.1);
            
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            
            --glass-border: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.04);
            --shadow-float: 0 20px 50px rgba(0,0,0,0.08);
            
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
            --blue: #3b82f6;
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.05);
            --shadow-soft: 0 10px 40px rgba(0,0,0,0.4);
            --shadow-float: 0 20px 60px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; 
            transition: background 0.4s, color 0.4s;
        }
        
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        .text-gradient { background: linear-gradient(135deg, var(--brand-main) 0%, #ff8a00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* COMPONENT MOUNT POINTS */
        .nx-mount-point { display: contents; }

        /* SKELETON LOADER */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-surface) 50%, var(--bg-elevated) 75%);
            background-size: 400% 100%; animation: shimmer 1.5s infinite linear; border-radius: 16px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ==========================================================================
           PROMO BANNERS (HORIZONTAL SCROLL)
           ========================================================================== */
        .promo-section { padding: 120px 5% 20px; max-width: 1500px; margin: 0 auto; }
        .banner-track { 
            display: flex; gap: 20px; overflow-x: auto; scroll-snap-type: x mandatory; 
            scrollbar-width: none; padding-bottom: 10px;
        }
        .banner-track::-webkit-scrollbar { display: none; }
        
        .promo-banner {
            flex: 0 0 90%; max-width: 800px; aspect-ratio: 21/9; border-radius: var(--radius-md);
            scroll-snap-align: center; position: relative; overflow: hidden;
            background: var(--bg-elevated); box-shadow: var(--shadow-soft); cursor: pointer;
        }
        @media(min-width: 768px) { .promo-banner { flex: 0 0 60%; aspect-ratio: 21/7; } }
        
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .promo-banner:hover img { transform: scale(1.05); }
        .promo-overlay {
            position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex; flex-direction: column; justify-content: center; padding: 40px; color: #fff; pointer-events: none;
        }
        .promo-tag { background: var(--brand-main); padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; letter-spacing: 1px; width: max-content; margin-bottom: 10px; }
        .promo-title { font-size: clamp(20px, 4vw, 36px); font-family: 'Space Grotesk'; font-weight: 800; line-height: 1.1; margin-bottom: 10px; max-width: 400px; }

        /* ==========================================================================
           ADVANCED SEARCH & VOICE BAR
           ========================================================================== */
        .search-container { max-width: 1400px; margin: 0 auto; padding: 20px 5%; position: sticky; top: 75px; z-index: 100; background: var(--bg-base); }
        .search-box {
            display: flex; align-items: center; background: var(--bg-surface); border: 2px solid var(--glass-border);
            border-radius: 50px; padding: 10px 15px 10px 25px; box-shadow: var(--shadow-soft); transition: 0.3s;
            position: relative;
        }
        .search-box:focus-within { border-color: var(--brand-main); box-shadow: 0 10px 30px var(--brand-glow); }
        .search-box i.fa-search { color: var(--text-300); font-size: 18px; }
        .search-box input { flex: 1; border: none; background: transparent; padding: 0 15px; font-size: 15px; font-family: inherit; color: var(--text-100); outline: none; }
        
        .voice-btn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--bg-elevated); color: var(--text-200);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; font-size: 16px; position: relative;
        }
        .voice-btn:hover { background: var(--brand-dim); color: var(--brand-main); }
        .voice-btn.listening { background: var(--danger); color: #fff; animation: pulseVoice 1.5s infinite; }
        @keyframes pulseVoice { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .search-btn { background: var(--text-100); color: var(--bg-base); border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-left: 10px; transition: 0.3s; }
        .search-btn:hover { background: var(--brand-main); color: #fff; }

        /* LIVE DROPDOWN SEARCH */
        .live-search-dropdown {
            position: absolute; top: calc(100% + 10px); left: 0; right: 0;
            background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            box-shadow: var(--shadow-float); padding: 10px; z-index: 1000;
            display: none; max-height: 400px; overflow-y: auto;
        }
        .live-search-dropdown.active { display: block; animation: slideDown 0.3s var(--transition); }
        .ls-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .ls-item:hover { background: var(--bg-elevated); }
        .ls-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: var(--bg-elevated); }
        .ls-info h4 { font-size: 14px; font-weight: 700; color: var(--text-100); margin-bottom: 4px; }
        .ls-info span { font-size: 10px; font-weight: 800; color: var(--brand-main); text-transform: uppercase; }
        .ls-price { margin-left: auto; font-family: 'Space Grotesk'; font-weight: 800; color: var(--text-100); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==========================================================================
           SWIMLANES (CATEGORY ROWS) & SIDEBAR
           ========================================================================== */
        .market-layout { max-width: 1440px; margin: 0 auto; padding: 0 5% 100px; display: grid; gap: 30px; }
        @media(min-width: 1024px) { .market-layout { grid-template-columns: 260px 1fr; align-items: start; } }

        /* Sidebar Filters */
        .filter-sidebar { background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 25px; position: sticky; top: 160px; display: none; }
        @media(min-width: 1024px) { .filter-sidebar { display: block; } }
        .filter-group { margin-bottom: 25px; }
        .filter-title { font-size: 11px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .filter-radio { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text-200); margin-bottom: 10px; cursor: pointer; }
        .filter-radio input { display: none; }
        .custom-radio { width: 18px; height: 18px; border: 2px solid var(--text-300); border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .custom-radio::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 10px; color: #fff; opacity: 0; transform: scale(0); transition: 0.2s; }
        .filter-radio input:checked + .custom-radio { background: var(--brand-main); border-color: var(--brand-main); }
        .filter-radio input:checked + .custom-radio::after { opacity: 1; transform: scale(1); }
        .filter-radio input:checked ~ span { color: var(--text-100); font-weight: 800; }

        /* Mobile Filter Toggle Button */
        .mobile-filter-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; background: var(--bg-surface); border: 1px solid var(--glass-border);
            border-radius: 16px; font-weight: 800; font-size: 13px; color: var(--text-100);
            margin-bottom: 20px; cursor: pointer; box-shadow: var(--shadow-soft);
        }
        @media(min-width: 1024px) { .mobile-filter-btn { display: none; } }
        .mobile-filter-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 10000; opacity: 0; visibility: hidden; transition: 0.4s; }
        .mobile-filter-overlay.active { opacity: 1; visibility: visible; }
        
        @media(max-width: 1023px) {
            .filter-sidebar {
                position: fixed; bottom: 0; left: 0; width: 100%; top: auto;
                border-radius: 30px 30px 0 0; z-index: 10001;
                transform: translateY(100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
                max-height: 85vh; overflow-y: auto; padding: 30px 20px 100px;
            }
            .filter-sidebar.active { transform: translateY(0); }
        }

        /* Swimlane Section */
        .swimlane-section { margin-bottom: 50px; }
        .swimlane-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .swimlane-title { font-family: 'Space Grotesk'; font-size: 24px; font-weight: 800; }
        .see-all-btn { background: none; border: none; color: var(--brand-main); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .see-all-btn:hover { gap: 8px; }

        .swimlane-track { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .swimlane-track::-webkit-scrollbar { display: none; }
        
        /* Master Grid (Used when filtering) */
        .master-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .master-grid.active { display: grid; }

        /* Premium Product Card */
        .nx-card {
            flex: 0 0 240px; scroll-snap-align: start;
            background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 12px; display: flex; flex-direction: column; cursor: pointer; transition: 0.4s;
            box-shadow: var(--shadow-soft); position: relative; overflow: hidden;
        }
        .master-grid .nx-card { flex: auto; scroll-snap-align: none; }
        .nx-card:hover { transform: translateY(-6px); border-color: var(--brand-main); box-shadow: var(--shadow-float); }
        
        .nx-card-img-wrap { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background: var(--bg-elevated); margin-bottom: 12px; position: relative; }
        .nx-card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .nx-card:hover .nx-card-img { transform: scale(1.08); }
        
        /* Dynamic Watermark inside Image Wrap */
        .nx-card-watermark { position: absolute; bottom: 8px; right: 8px; width: 60px; opacity: 0.5; pointer-events: none; z-index: 2; }
        
        .nx-card-badge { position: absolute; top: 8px; left: 8px; background: var(--brand-main); color: #fff; font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; letter-spacing: 1px; z-index: 2; }
        
        .nx-card-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--text-300); margin-bottom: 8px; }
        .nx-card-stars i { color: var(--gold); }
        
        .nx-card-title { font-size: 14px; font-weight: 700; color: var(--text-100); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; min-height: 38px; }
        
        .nx-card-price-row { display: flex; flex-direction: column; margin-bottom: 15px; }
        .nx-card-price-old { font-size: 11px; text-decoration: line-through; color: var(--text-300); font-weight: 600; margin-bottom: 2px; }
        .nx-card-price { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 800; color: var(--text-100); }

        .nx-card-actions { display: flex; gap: 8px; margin-top: auto; }
        .nx-card-btn-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--glass-border); color: var(--text-100); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.3s; flex-shrink: 0; cursor: pointer; }
        .nx-card-btn-icon:hover { background: var(--brand-main); color: #fff; border-color: var(--brand-main); transform: scale(1.05); }
        .nx-card-btn-main { flex: 1; background: var(--text-100); color: var(--bg-base); border: none; border-radius: 10px; font-size: 11px; font-weight: 800; transition: 0.3s; cursor: pointer; text-transform: uppercase; }
        .nx-card-btn-main:hover { background: var(--brand-main); color: #fff; box-shadow: 0 8px 20px var(--brand-glow); }

        /* Empty State */
        .nx-empty-state { grid-column: 1 / -1; padding: 60px 20px; text-align: center; border: 1px dashed var(--glass-border); border-radius: var(--radius-md); }
        .nx-empty-state i { font-size: 40px; color: var(--text-300); margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- 1. COMPONENT MOUNT POINTS (Safe Loading) -->
    <div id="global-container" class="nx-mount-point"></div>
    <div id="header-container" class="nx-mount-point"></div>
    <div id="sidebar-container" class="nx-mount-point"></div>
    <div id="ui-notifications-container" class="nx-mount-point"></div>
    <div id="cart-container" class="nx-mount-point"></div>

    <!-- 2. MAIN SHOP VIEWPORT -->
    <main id="spa-main">
        
        <!-- A. PROMO BANNERS CAROUSEL -->
        <section class="promo-section">
            <div class="banner-track" id="banner-track">
                <!-- Skeletons -->
                <div class="promo-banner skeleton"></div>
                <div class="promo-banner skeleton"></div>
            </div>
        </section>

        <!-- B. ADVANCED SEARCH & VOICE BAR -->
        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="market-search" placeholder="Search CapCut, UI Kits, Physical Gear..." autocomplete="off">
                
                <!-- Voice Search Button -->
                <button class="voice-btn" id="voice-btn" onclick="NX_SHOP.startVoiceSearch()" title="Search by Voice">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                
                <button class="search-btn" onclick="NX_SHOP.executeSearch()">FIND</button>

                <!-- Live Search Dropdown -->
                <div class="live-search-dropdown" id="live-search-dropdown"></div>
            </div>
        </div>

        <section class="market-layout">
            
            <!-- C. MOBILE FILTER TRIGGER -->
            <button class="mobile-filter-btn" onclick="NX_SHOP.toggleMobileFilters()">
                <i class="fa-solid fa-sliders"></i> Filters & Sorting
            </button>
            <div class="mobile-filter-overlay" id="mobile-filter-bg" onclick="NX_SHOP.toggleMobileFilters()"></div>

            <!-- D. SIDEBAR FILTERS -->
            <aside class="filter-sidebar" id="filter-sidebar">
                <div class="flex-between" style="margin-bottom: 25px; display: none;" id="mobile-filter-header">
                    <h3 class="tech-font" style="font-size: 20px;">Filters</h3>
                    <button style="background:none; border:none; font-size:20px; color:var(--text-100);" onclick="NX_SHOP.toggleMobileFilters()"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <!-- Product Type -->
                <div class="filter-group">
                    <span class="filter-title">Asset Type</span>
                    <ul class="filter-list">
                        <label class="filter-radio"><input type="radio" name="type" value="all" checked onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>All Assets</span></label>
                        <label class="filter-radio"><input type="radio" name="type" value="digital" onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>Digital Tools</span></label>
                        <label class="filter-radio"><input type="radio" name="type" value="saas" onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>SaaS Licenses</span></label>
                        <label class="filter-radio"><input type="radio" name="type" value="physical" onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>Physical Gear</span></label>
                    </ul>
                </div>

                <!-- Category Filter (Loaded Dynamically) -->
                <div class="filter-group">
                    <span class="filter-title">Categories</span>
                    <ul class="filter-list" id="filter-categories-list">
                        <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: 10px;"></div>
                    </ul>
                </div>

                <!-- Sort Filter -->
                <div class="filter-group">
                    <span class="filter-title">Sort By</span>
                    <ul class="filter-list">
                        <label class="filter-radio"><input type="radio" name="sort" value="newest" checked onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>Newest Arrivals</span></label>
                        <label class="filter-radio"><input type="radio" name="sort" value="price_low" onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>Price: Low to High</span></label>
                        <label class="filter-radio"><input type="radio" name="sort" value="price_high" onchange="NX_SHOP.applyFilters()"><div class="custom-radio"></div><span>Price: High to Low</span></label>
                    </ul>
                </div>
                
                <button class="search-btn" style="width:100%; margin:0; background:var(--bg-elevated); color:var(--text-100);" onclick="NX_SHOP.resetFilters()">Clear Filters</button>
            </aside>

            <!-- E. DYNAMIC CONTENT AREA -->
            <div id="content-area">
                
                <!-- DEFAULT VIEW: SWIMLANES -->
                <div id="swimlanes-view">
                    
                    <!-- 1. Personalized (Recently Viewed/Recommended) -->
                    <div class="swimlane-section" id="section-recommended" style="display: none;">
                        <div class="swimlane-header">
                            <h2 class="swimlane-title"><i class="fa-solid fa-sparkles text-gradient"></i> Recommended For You</h2>
                        </div>
                        <div class="swimlane-track" id="track-recommended"></div>
                    </div>

                    <!-- 2. Digital Assets -->
                    <div class="swimlane-section" id="section-digital">
                        <div class="swimlane-header">
                            <h2 class="swimlane-title">Digital <span class="text-gradient">Assets</span></h2>
                            <button class="see-all-btn" onclick="NX_SHOP.setFilterAndSwitch('type', 'digital')">See All <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                        <div class="swimlane-track" id="track-digital">
                            <div class="skeleton nx-card"></div><div class="skeleton nx-card"></div><div class="skeleton nx-card"></div>
                        </div>
                    </div>

                    <!-- 3. SaaS Licenses -->
                    <div class="swimlane-section" id="section-saas">
                        <div class="swimlane-header">
                            <h2 class="swimlane-title">SaaS <span class="text-gradient">Licenses</span></h2>
                            <button class="see-all-btn" onclick="NX_SHOP.setFilterAndSwitch('type', 'saas')">See All <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                        <div class="swimlane-track" id="track-saas">
                            <div class="skeleton nx-card"></div><div class="skeleton nx-card"></div><div class="skeleton nx-card"></div>
                        </div>
                    </div>

                    <!-- 4. Physical Gear -->
                    <div class="swimlane-section" id="section-physical">
                        <div class="swimlane-header">
                            <h2 class="swimlane-title">Physical <span class="text-gradient">Gear</span></h2>
                            <button class="see-all-btn" onclick="NX_SHOP.setFilterAndSwitch('type', 'physical')">See All <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                        <div class="swimlane-track" id="track-physical">
                            <div class="skeleton nx-card"></div><div class="skeleton nx-card"></div><div class="skeleton nx-card"></div>
                        </div>
                    </div>

                </div>

                <!-- FILTERED VIEW: MASTER GRID (Hidden by default) -->
                <div id="filtered-view" style="display: none;">
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <span style="font-size: 14px; color: var(--text-200); font-weight: 600;">
                            Showing <span id="result-count" style="color: var(--text-100);">0</span> results
                        </span>
                        <button class="see-all-btn" onclick="NX_SHOP.resetFilters()"><i class="fa-solid fa-arrow-left"></i> Back to Sections</button>
                    </div>
                    <div class="master-grid" id="master-grid"></div>
                </div>

            </div>
        </section>
    </main>

    <!-- ==========================================================================
         SHOP LOGIC ENGINE (HYBRID DB + VOICE SEARCH + DYNAMIC BRANDING)
         ========================================================================== -->
    <script>
        window.NX_SHOP = {
            state: {
                allProducts: [],
                filtered: [],
                categories: [],
                filters: { search: '', type: 'all', category: 'all', sort: 'newest' },
                viewedIds: JSON.parse(localStorage.getItem('nx_viewed_products') || '[]'),
                searchTimer: null
            },

            init: async function() {
                console.log("🛒 NX_SHOP Engine Initializing...");
                
                // 1. Safe Load Components (Ignores 404s to keep running)
                await this.safeLoadSharedUI();

                // 2. Wait for Backend
                this.waitForBackend(async () => {
                    
                    // 3. Sync Branding (Watermarks & Logos)
                    if(window.NexraBrand) window.NexraBrand.refreshDOMAssets();

                    // 4. Initialize Search Listeners
                    this.initSearchListener();

                    // 5. Fetch Data (Supabase -> Firestore -> Fallback)
                    this.fetchBanners();
                    await this.fetchCategories();
                    await this.fetchProducts();

                    // 6. Check URL Params (e.g. from index.html search)
                    this.parseUrlParams();
                });
            },

            safeLoadSharedUI: async function() {
                const components = [
                    { id: 'global-container', path: '../global.html' },
                    { id: 'header-container', path: '../components/header.html' },
                    { id: 'sidebar-container', path: '../components/slider.html' },
                    { id: 'cart-container', path: '../components/cart-drawer.html' },
                    { id: 'navigation-container', path: '../components/navigation.html' },
                    { id: 'footer-container', path: '../components/footer.html' },
                    { id: 'ui-notifications-container', path: '../components/ui-notifications.html' }
                ];
                for (const comp of components) {
                    try {
                        const res = await fetch(comp.path);
                        if (res.ok) {
                            const mount = document.getElementById(comp.id);
                            mount.innerHTML = await res.text();
                            mount.querySelectorAll('script').forEach(s => {
                                const ns = document.createElement('script');
                                Array.from(s.attributes).forEach(attr => ns.setAttribute(attr.name, attr.value));
                                if (s.src) ns.src = s.src; else ns.textContent = s.textContent;
                                document.body.appendChild(ns);
                            });
                        }
                    } catch (e) { /* Silent fail for testing */ }
                }
            },

            waitForBackend: function(callback, tries = 0) {
                if (tries > 30) {
                    console.warn("[NX_SHOP] Backend Timeout. Using Static Fallbacks.");
                    callback(); return;
                }
                if (window.supabaseClient || window.db) callback();
                else setTimeout(() => this.waitForBackend(callback, tries + 1), 100);
            },

            /* --- 1. VOICE & LIVE SEARCH --- */
            startVoiceSearch: function() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const btn = document.getElementById('voice-btn');
                
                if (!SpeechRecognition) {
                    if(window.Nexra && window.Nexra.showToast) Nexra.showToast("Voice search not supported on this browser.", "error");
                    else alert("Voice search not supported.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;

                recognition.onstart = () => {
                    btn.classList.add('listening');
                    btn.innerHTML = '<i class="fa-solid fa-microphone-lines"></i>';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const input = document.getElementById('market-search');
                    input.value = transcript;
                    this.state.filters.search = transcript.toLowerCase();
                    this.applyFilters();
                };

                recognition.onerror = () => btn.classList.remove('listening');
                recognition.onend = () => {
                    btn.classList.remove('listening');
                    btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                };

                recognition.start();
            },

            initSearchListener: function() {
                const input = document.getElementById('market-search');
                const dropdown = document.getElementById('live-search-dropdown');

                input.addEventListener('input', (e) => {
                    clearTimeout(this.state.searchTimer);
                    const query = e.target.value.toLowerCase().trim();
                    
                    if(query.length < 2) {
                        dropdown.classList.remove('active');
                        return;
                    }

                    this.state.searchTimer = setTimeout(() => {
                        this.handleLiveSearch(query);
                    }, 300);
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if(!input.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.remove('active');
                    }
                });
            },

            handleLiveSearch: function(query) {
                const dropdown = document.getElementById('live-search-dropdown');
                const results = this.state.allProducts.filter(p => 
                    (p.title && p.title.toLowerCase().includes(query)) || 
                    (p.category && p.category.toLowerCase().includes(query))
                ).slice(0, 5); // Max 5 results for dropdown

                if(results.length === 0) {
                    dropdown.innerHTML = `<div style="padding:15px; text-align:center; color:var(--text-300); font-size:13px; font-weight:600;">No instant matches found.</div>`;
                } else {
                    dropdown.innerHTML = results.map(p => `
                        <div class="ls-item" onclick="NX_SHOP.viewProduct('${p.id}')">
                            <img src="${p.image}" class="ls-img" alt="${p.title}">
                            <div class="ls-info">
                                <h4>${p.title}</h4>
                                <span>${p.type.toUpperCase()}</span>
                            </div>
                            <div class="ls-price">Rs. ${p.price}</div>
                        </div>
                    `).join('');
                }
                dropdown.classList.add('active');
            },

            executeSearch: function() {
                document.getElementById('live-search-dropdown').classList.remove('active');
                const val = document.getElementById('market-search').value.toLowerCase().trim();
                this.state.filters.search = val;
                this.applyFilters();
            },

            parseUrlParams: function() {
                const params = new URLSearchParams(window.location.search);
                if (params.has('q')) {
                    document.getElementById('market-search').value = params.get('q');
                    this.state.filters.search = params.get('q').toLowerCase();
                }
                if (params.has('cat')) {
                    this.state.filters.category = params.get('cat');
                    const radio = document.querySelector(`input[name="category"][value="${params.get('cat')}"]`);
                    if(radio) radio.checked = true;
                }
                
                // If there are any params, immediately apply filters (which switches to grid view)
                if(params.has('q') || params.has('cat')) {
                    this.applyFilters();
                } else {
                    this.renderSwimlanes();
                }
            },

            /* --- 2. DATA FETCHING (HYBRID) --- */
            fetchBanners: async function() {
                const track = document.getElementById('banner-track');
                const fallback = [
                    { image: 'https://img.freepik.com/free-vector/gradient-modern-sale-banner-template_23-2148897530.jpg', tag: 'SALE', title: '50% Off Agency Bundles' },
                    { image: 'https://img.freepik.com/free-vector/modern-creative-gradient-banner-template_23-2148419614.jpg', tag: 'NEW', title: 'Premium SaaS Licenses Added' }
                ];
                
                try {
                    let data = [];
                    if (window.supabaseClient) {
                        const res = await window.supabaseClient.from('banners').select('*').eq('active', true);
                        if(res.data && res.data.length > 0) data = res.data;
                    }
                    if (data.length === 0 && window.db) {
                        const snap = await window.db.collection('banners').where('active', '==', true).get();
                        data = snap.docs.map(d => d.data());
                    }
                    this.renderBanners(data.length > 0 ? data : fallback);
                } catch(e) { this.renderBanners(fallback); }
            },
            
            renderBanners: function(data) {
                document.getElementById('banner-track').innerHTML = data.map(b => `
                    <div class="promo-banner">
                        <img src="${b.image}" alt="${b.title}">
                        <div class="promo-overlay">
                            <span class="promo-tag">${b.tag || 'PROMO'}</span>
                            <h2 class="promo-title">${b.title}</h2>
                        </div>
                    </div>
                `).join('');
            },

            fetchCategories: async function() {
                const list = document.getElementById('filter-categories-list');
                const fallbackCats = [{id:'c1', name:'Video Editing'}, {id:'c2', name:'UI Kits'}, {id:'c3', name:'Gear'}];

                try {
                    let cats = [];
                    if (window.supabaseClient) {
                        const res = await window.supabaseClient.from('categories').select('*').eq('type', 'product').order('name');
                        if(res.data && res.data.length > 0) cats = res.data;
                    }
                    if (cats.length === 0 && window.db) {
                        const snap = await window.db.collection('categories').where('type', '==', 'product').get();
                        cats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    }
                    if(cats.length === 0) cats = fallbackCats;

                    let html = `
                        <label class="filter-radio">
                            <input type="radio" name="category" value="all" ${this.state.filters.category === 'all' ? 'checked' : ''} onchange="NX_SHOP.applyFilters()">
                            <div class="custom-radio"></div> <span class="label-text">All Categories</span>
                        </label>
                    `;
                    cats.forEach(c => {
                        const isChecked = this.state.filters.category === c.name ? 'checked' : '';
                        html += `
                            <label class="filter-radio">
                                <input type="radio" name="category" value="${c.name}" ${isChecked} onchange="NX_SHOP.applyFilters()">
                                <div class="custom-radio"></div> <span class="label-text">${c.name}</span>
                            </label>
                        `;
                    });
                    list.innerHTML = html;
                } catch (e) {
                    console.warn("Using Category Fallback.", e);
                    // Safe execution even if fails
                }
            },

            fetchProducts: async function() {
                const fallbackProducts = [
                    { id: 'p1', title: 'CapCut Pro Lifetime', price: 950, oldPrice: 3500, type: 'saas', category: 'Video Editing', image: 'https://i.postimg.cc/SNm7KsrH/images-(2).jpg', rating: 5.0, salesCount: 1200, badge: 'HOT' },
                    { id: 'p2', title: 'Canva Pro 1 Year', price: 450, type: 'saas', category: 'Design', image: 'https://i.postimg.cc/Y25ZD1tW/images-(1).jpg', rating: 4.8, salesCount: 3400 },
                    { id: 'p3', title: 'SaaS Dashboard UI Kit', price: 1500, type: 'digital', category: 'UI Kits', image: 'https://i.postimg.cc/prR8yGDh/images-(3).jpg', rating: 4.9, salesCount: 500 },
                    { id: 'p4', title: 'Wireless Streaming Mic', price: 4500, type: 'physical', category: 'Gear', image: 'https://i.postimg.cc/fTHXTvkj/images.jpg', rating: 4.7, salesCount: 890 }
                ];

                try {
                    let products = [];
                    if (window.supabaseClient) {
                        const res = await window.supabaseClient.from('products').select('*').eq('visible', true);
                        if(res.data && res.data.length > 0) products = res.data;
                    }
                    if (products.length === 0 && window.db) {
                        const snap = await window.db.collection('products').where('visible', '==', true).get();
                        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    }

                    this.state.allProducts = products.length > 0 ? products : fallbackProducts;
                    
                    // Initial render decision based on URL params
                    if(this.state.filters.search !== '' || this.state.filters.category !== 'all') {
                        this.applyFilters();
                    } else {
                        this.renderSwimlanes();
                    }

                } catch (e) {
                    console.warn("Using Product Fallback.", e);
                    this.state.allProducts = fallbackProducts;
                    this.renderSwimlanes();
                }
            },

            /* --- 3. FILTERING ENGINE --- */
            setFilterAndSwitch: function(key, value) {
                const radio = document.querySelector(`input[name="${key}"][value="${value}"]`);
                if(radio) radio.checked = true;
                this.applyFilters();
                window.scrollTo({top: 0, behavior: 'smooth'});
            },

            applyFilters: function() {
                // Read states from UI
                const typeRadio = document.querySelector('input[name="type"]:checked');
                if (typeRadio) this.state.filters.type = typeRadio.value;
                
                const catRadio = document.querySelector('input[name="category"]:checked');
                if (catRadio) this.state.filters.category = catRadio.value;

                const sortRadio = document.querySelector('input[name="sort"]:checked');
                if (sortRadio) this.state.filters.sort = sortRadio.value;

                // Are we filtering?
                const isFiltering = this.state.filters.search !== '' || this.state.filters.type !== 'all' || this.state.filters.category !== 'all';
                
                if (!isFiltering && this.state.filters.sort === 'newest') {
                    // Back to Swimlane view
                    this.renderSwimlanes();
                    return;
                }

                // Switch UI to Grid View
                document.getElementById('swimlanes-view').style.display = 'none';
                document.getElementById('filtered-view').style.display = 'block';
                this.state.isFilteredView = true;

                // Process Data
                let result = [...this.state.allProducts];

                if (this.state.filters.search) {
                    const query = this.state.filters.search;
                    result = result.filter(p => 
                        (p.title && p.title.toLowerCase().includes(query)) || 
                        (p.category && p.category.toLowerCase().includes(query))
                    );
                }

                if (this.state.filters.type !== 'all') result = result.filter(p => p.type === this.state.filters.type);
                if (this.state.filters.category !== 'all') result = result.filter(p => p.category === this.state.filters.category);

                // Sort
                if (this.state.filters.sort === 'price_low') result.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
                else if (this.state.filters.sort === 'price_high') result.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));

                this.state.filtered = result;
                this.renderMasterGrid(result);
            },

            resetFilters: function() {
                document.getElementById('market-search').value = '';
                this.state.filters.search = '';
                document.querySelector('input[name="type"][value="all"]').checked = true;
                document.querySelector('input[name="category"][value="all"]').checked = true;
                document.querySelector('input[name="sort"][value="newest"]').checked = true;
                this.applyFilters();
            },

            /* --- 4. RENDER PIPELINE --- */
            renderSwimlanes: function() {
                document.getElementById('swimlanes-view').style.display = 'block';
                document.getElementById('filtered-view').style.display = 'none';
                this.state.isFilteredView = false;

                const all = this.state.allProducts;
                
                // Segregate
                const saas = all.filter(p => p.type === 'saas');
                const digital = all.filter(p => p.type === 'digital');
                const physical = all.filter(p => p.type === 'physical');

                document.getElementById('track-saas').innerHTML = saas.length ? saas.map(p => this.buildCard(p)).join('') : '<p style="color:var(--text-300);">No SaaS Tools currently.</p>';
                document.getElementById('track-digital').innerHTML = digital.length ? digital.map(p => this.buildCard(p)).join('') : '<p style="color:var(--text-300);">No Digital Assets currently.</p>';
                document.getElementById('track-physical').innerHTML = physical.length ? physical.map(p => this.buildCard(p)).join('') : '<p style="color:var(--text-300);">No Physical Gear currently.</p>';

                // Personalization (Recently Viewed logic)
                if(this.state.viewedIds.length > 0) {
                    const recSection = document.getElementById('section-recommended');
                    const recTrack = document.getElementById('track-recommended');
                    const recs = all.filter(p => this.state.viewedIds.includes(p.id) || p.rating >= 4.9).slice(0, 6);
                    if(recs.length) {
                        recSection.style.display = 'block';
                        recTrack.innerHTML = recs.map(p => this.buildCard(p)).join('');
                    }
                }
            },

            renderMasterGrid: function(products) {
                const grid = document.getElementById('master-grid');
                document.getElementById('result-count').innerText = products.length;

                if (products.length === 0) {
                    grid.innerHTML = `
                        <div class="nx-empty-state">
                            <i class="fa-solid fa-ghost"></i>
                            <h2 style="font-family:'Space Grotesk'; font-size:24px; margin-bottom:10px;">No Assets Found</h2>
                            <p style="color:var(--text-200); font-size:14px;">Try adjusting your search or filters.</p>
                            <button class="search-btn" style="margin-top:20px; background:var(--brand-main); color:#fff;" onclick="NX_SHOP.resetFilters()">Clear Filters</button>
                        </div>
                    `;
                    grid.classList.remove('active');
                    return;
                }

                grid.innerHTML = products.map(p => this.buildCard(p)).join('');
                grid.classList.add('active');
            },

            // DYNAMIC CARD BUILDER WITH WATERMARK INJECTION
            buildCard: function(p) {
                const price = parseFloat(p.price || 0).toLocaleString();
                const oldPriceHtml = p.oldPrice ? `<span class="nx-card-price-old">Rs. ${parseFloat(p.oldPrice).toLocaleString()}</span>` : '';
                const badgeHtml = p.badge ? `<span class="nx-card-badge">${p.badge}</span>` : '';
                
                // Route binding
                const productUrl = window.NexraRoutes ? window.NexraRoutes.generateURL('product', `?id=${p.id}`) : `product-detail.html?id=${p.id}`;
                const safeTitle = (p.title || '').replace(/'/g, "\\'");
                
                // Fetch dynamic watermark from NexraBrand
                const watermarkUrl = window.NexraBrand ? window.NexraBrand.getAsset('watermark') : '';

                return `
                    <div class="nx-card" onclick="NX_SHOP.viewProduct('${p.id}')">
                        <div class="nx-card-img-wrap">
                            ${badgeHtml}
                            <button class="nx-card-wishlist" aria-label="Add to Wishlist" onclick="event.stopPropagation(); NX_SHOP.addToWishlist('${p.id}')">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                            <img src="${p.image}" class="nx-card-img" alt="${p.title}" loading="lazy">
                            <img src="${watermarkUrl}" class="nx-card-watermark nx-brand-watermark" alt="watermark">
                        </div>
                        
                        <div class="nx-card-meta">
                            <span class="nx-card-stars"><i class="fa-solid fa-star"></i> ${p.rating || '5.0'}</span>
                            <span><i class="fa-solid fa-bolt" style="color:var(--gold); font-size:10px;"></i> ${p.salesCount || 0} Sold</span>
                        </div>
                        
                        <h3 class="nx-card-title">${p.title}</h3>
                        
                        <div class="nx-card-price-row">
                            ${oldPriceHtml}
                            <span class="nx-card-price">Rs. ${price}</span>
                        </div>
                        
                        <div class="nx-card-actions">
                            <button class="nx-card-btn-icon" aria-label="Add to Cart" onclick="event.stopPropagation(); NX_SHOP.addToCart('${p.id}', '${safeTitle}', ${p.price}, '${p.image}', '${p.type}')">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                            <button class="nx-card-btn-main" onclick="event.stopPropagation(); NX_SHOP.buyNow('${p.id}', '${safeTitle}', ${p.price}, '${p.image}', '${p.type}')">
                                Buy Now
                            </button>
                        </div>
                    </div>
                `;
            },

            /* --- 5. USER ACTIONS --- */
            viewProduct: function(id) {
                // Personalization Tracking
                let views = this.state.viewedIds;
                if(!views.includes(id)) {
                    views.push(id);
                    if(views.length > 15) views.shift();
                    localStorage.setItem('nx_viewed_products', JSON.stringify(views));
                }
                
                // Deep Link Route
                const url = window.NexraRoutes ? window.NexraRoutes.generateURL('product', `?id=${id}`) : `product-detail.html?id=${id}`;
                window.location.href = url;
            },

            addToCart: function(id, title, price, image, type) {
                if (window.Nexra && typeof Nexra.showToast === 'function') {
                    Nexra.showToast(`${title} added to cart!`, 'success');
                } else {
                    alert(`${title} added to cart`);
                }
                // Centralized cart logic injection point
                // window.NexraCart.add({ id, title, price, image, type });
            },

            buyNow: function(id, title, price, image, type) {
                this.addToCart(id, title, price, image, type);
                const checkoutUrl = window.NexraRoutes ? window.NexraRoutes.generateURL('checkout') : 'checkout.html';
                window.location.href = checkoutUrl;
            },

            addToWishlist: async function(id) {
                if (!window.auth || !auth.currentUser) {
                    if (window.Nexra && typeof Nexra.showToast === 'function') {
                        Nexra.showToast("Please login to save items", "error");
                    }
                    return;
                }
                try {
                    await window.db.collection('users').doc(auth.currentUser.uid).collection('wishlist').doc(id).set({ addedAt: Date.now() });
                    if (window.Nexra) Nexra.showToast("Saved to your Vault Wishlist", "success");
                } catch(e) { console.error("Wishlist error:", e); }
            },

            toggleMobileFilters: function() {
                const sidebar = document.getElementById('filter-sidebar');
                const bg = document.getElementById('mobile-filter-bg');
                const header = document.getElementById('mobile-filter-header');
                
                sidebar.classList.toggle('active');
                bg.classList.toggle('active');
                if(window.innerWidth < 1024) header.style.display = 'flex';
            }
        };

        // Ignition
        window.addEventListener('DOMContentLoaded', () => NX_SHOP.init());
    </script>
</body>
</html>
