<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- DYNAMIC SEO (OG Tags for Social Media) -->
    <title id="page-title">Loading Elite Asset... | Nexra PK</title>
    <meta name="description" id="meta-desc" content="Premium Digital Asset from Nexra Tech PK.">
    <meta property="og:title" id="og-title" content="Nexra Tech PK">
    <meta property="og:description" id="og-desc" content="Premium Digital Asset">
    <meta property="og:image" id="og-image" content="">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../firebaseconfig.js"></script>

    <style>
        :root {
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.25);
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --radius-lg: 32px;
            --radius-md: 20px;
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507; --bg-surface: #0a0a0f; --bg-elevated: #12121a;
            --text-100: #ffffff; --text-200: #a1a1aa; --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; user-select: none; }

        /* Navigation */
        .pd-nav-bar { position: fixed; top: 85px; left: 0; width: 100%; z-index: 100; padding: 0 5%; pointer-events: none; }
        .back-btn { pointer-events: auto; background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-soft); transition: 0.3s; }
        .back-btn:hover { transform: translateX(-5px); border-color: var(--brand-main); color: var(--brand-main); }

        /* Grid */
        .pd-grid { max-width: 1400px; margin: 0 auto; padding: 150px 5% 100px; display: grid; gap: 40px; }
        @media(min-width: 1024px) { .pd-grid { grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: start; } }

        /* Media Stage */
        .pd-sticky-media { position: sticky; top: 110px; }
        @media(max-width: 1023px) { .pd-sticky-media { position: relative; top: 0; } }
        .media-viewer { position: relative; width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg); background: var(--bg-surface); border: 1px solid var(--glass-border); overflow: hidden; box-shadow: var(--shadow-soft); }
        .media-viewer img, .media-viewer video { width: 100%; height: 100%; object-fit: cover; }

        /* Content */
        .pd-title { font-family: 'Space Grotesk'; font-size: clamp(24px, 5vw, 42px); font-weight: 900; line-height: 1.1; margin: 15px 0; }
        .price-box { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 30px; border-radius: var(--radius-md); box-shadow: var(--shadow-float); margin: 25px 0; }
        .price-now { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; color: var(--brand-main); }

        /* Floating AI */
        #ai-btn { position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--brand-main); color: var(--brand-main); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: var(--shadow-float); z-index: 9999; }
        .ai-box { position: fixed; bottom: 170px; right: 25px; width: 350px; max-width: 90vw; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow-float); display: none; flex-direction: column; overflow: hidden; z-index: 9999; }
        .ai-box.active { display: flex; animation: slideUp 0.3s forwards; }
        .ai-chat { height: 300px; overflow-y: auto; padding: 15px; background: var(--bg-elevated); display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { padding: 10px 14px; border-radius: 15px; font-size: 13px; max-width: 80%; }
        .ai-msg.bot { background: var(--bg-surface); align-self: flex-start; }
        .ai-msg.user { background: var(--brand-main); color: #fff; align-self: flex-end; }
        
        /* Floating Island */
        .island { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; background: var(--bg-base); border: 1px solid var(--glass-border); border-radius: 50px; padding: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 9000; backdrop-filter: blur(20px); }
        .island-buy { flex: 1; height: 50px; border-radius: 50px; background: var(--text-100); color: #fff; border: none; font-weight: 800; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="mount-header"></div>
    
    <div class="pd-nav-bar">
        <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> MARKETPLACE</button>
    </div>

    <main class="pd-grid">
        <!-- Media -->
        <div class="pd-sticky-media">
            <div class="media-viewer" id="main-viewer">
                <div id="media-content"></div>
            </div>
            <div id="pd-thumbs" style="display:flex; gap:10px; margin-top:15px; overflow-x:auto;"></div>
            
            <button class="back-btn" style="margin-top:20px; width:100%; justify-content:center;" onclick="NX_DETAIL.downloadWithWatermark()">
                <i class="fa-solid fa-cloud-arrow-down"></i> DOWNLOAD BRANDED IMAGE
            </button>
        </div>

        <!-- Info -->
        <div class="pd-info">
            <div id="pd-badge" class="back-btn" style="display:inline-flex; border:none; background:var(--brand-dim); color:var(--brand-main); margin-bottom:10px;">PRO ASSET</div>
            <h1 class="pd-title" id="pd-title">...</h1>
            
            <div style="display:flex; gap:20px; font-size:12px; font-weight:800; color:var(--text-300);">
                <span>SKU: <span id="pd-sku" class="text-brand"></span></span>
                <span><i class="fa-solid fa-star" style="color:var(--gold)"></i> <span id="pd-rating"></span></span>
            </div>

            <div class="price-box">
                <div style="font-size:14px; text-decoration:line-through; color:var(--text-300);" id="pd-old-price"></div>
                <div class="price-now" id="pd-price">Rs. 0</div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="island-buy" style="background:var(--brand-main)" onclick="NX_DETAIL.buyNow()">BUY SECURELY</button>
                    <button class="back-btn" onclick="NX_DETAIL.shareProduct()"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
            </div>

            <div id="pd-desc" style="line-height:1.7; color:var(--text-200); font-size:15px;"></div>
        </div>
    </main>

    <!-- AI -->
    <div id="ai-btn" onclick="NX_DETAIL.toggleAI()"><i class="fa-solid fa-robot"></i></div>
    <div class="ai-box" id="ai-box">
        <div style="padding:15px; background:var(--brand-main); color:#fff; font-weight:800; display:flex; justify-content:space-between;">
            <span>Nexra AI</span>
            <i class="fa-solid fa-xmark" onclick="NX_DETAIL.toggleAI()" style="cursor:pointer;"></i>
        </div>
        <div class="ai-chat" id="chat-flow">
            <div class="ai-msg bot">Hello! Ask me about this product.</div>
        </div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="ai-in" class="back-btn" style="flex:1; border-radius:10px;" placeholder="Is this permanent?">
            <button class="back-btn" style="padding:10px;" onclick="NX_DETAIL.askAI()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Island -->
    <div class="island">
        <div style="padding-left:15px;">
            <div style="font-size:10px; font-weight:800; color:var(--text-300);">TOTAL</div>
            <div id="island-price" style="font-size:16px; font-weight:900;">Rs. 0</div>
        </div>
        <button class="island-buy" onclick="NX_DETAIL.buyNow()">PURCHASE NOW</button>
        <a id="wa-link" href="#" target="_blank" style="background:#25D366; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px;"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <canvas id="wm-canvas" style="display:none;"></canvas>

    <script>
        window.NX_DETAIL = {
            state: {
                id: new URLSearchParams(window.location.search).get('id'),
                data: null,
                aiKey: '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'
            },

            init: async function() {
                if(!this.state.id) return window.location.href = 'shop.html';
                
                // Mount Components
                fetch('../components/header.html').then(r => r.text()).then(h => document.getElementById('mount-header').innerHTML = h);

                this.waitForBackend(async () => {
                    await this.fetchProduct();
                });
            },

            waitForBackend: function(cb) {
                const t = setInterval(() => {
                    if(window.db) { clearInterval(t); cb(); }
                }, 100);
            },

            fetchProduct: async function() {
                try {
                    // Try Firestore directly for speed and reliability
                    const doc = await db.collection('products').doc(this.state.id).get();
                    if(!doc.exists) return window.location.href = 'shop.html';
                    
                    this.state.data = { id: doc.id, ...doc.data() };
                    this.render();
                } catch(e) { console.error("Fetch Error:", e); }
            },

            render: function() {
                const p = this.state.data;
                const content = document.getElementById('media-content');
                
                // Fix for the 'null' innerText error - check existence
                const els = {
                    title: document.getElementById('pd-title'),
                    sku: document.getElementById('pd-sku'),
                    price: document.getElementById('pd-price'),
                    iprice: document.getElementById('island-price'),
                    rating: document.getElementById('pd-rating'),
                    desc: document.getElementById('pd-desc')
                };

                if(els.title) els.title.innerText = p.title;
                if(els.sku) els.sku.innerText = p.sku || 'NEXRA-001';
                if(els.price) els.price.innerText = `Rs. ${p.price}`;
                if(els.iprice) els.iprice.innerText = `Rs. ${p.price}`;
                if(els.rating) els.rating.innerText = p.rating || '5.0';
                if(els.desc) els.desc.innerHTML = p.description || '';

                if(p.image.endsWith('.mp4')) {
                    content.innerHTML = `<video src="${p.image}" autoplay loop muted playsinline></video>`;
                } else {
                    content.innerHTML = `<img src="${p.image}" id="target-img" crossorigin="anonymous">`;
                }

                // WhatsApp
                document.getElementById('wa-link').href = `https://wa.me/923000000000?text=I am interested in ${p.title}`;
                
                // SEO Metadata
                document.title = p.title + " | Nexra PK";
                document.getElementById('og-image').content = p.image;
            },

            toggleAI: function() {
                document.getElementById('ai-box').classList.toggle('active');
            },

            askAI: async function() {
                const input = document.getElementById('ai-in');
                const flow = document.getElementById('chat-flow');
                const query = input.value.trim();
                if(!query) return;

                flow.innerHTML += `<div class="ai-msg user">${query}</div>`;
                input.value = '';
                flow.scrollTop = flow.scrollHeight;

                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${this.state.aiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            "model": "google/gemma-2-9b-it:free",
                            "messages": [
                                {"role": "system", "content": `You are Nexra AI. Help the user about this product: ${this.state.data.title}. Price is ${this.state.data.price}.`},
                                {"role": "user", "content": query}
                            ]
                        })
                    });
                    const res = await response.json();
                    const text = res.choices[0].message.content;
                    flow.innerHTML += `<div class="ai-msg bot">${text}</div>`;
                    flow.scrollTop = flow.scrollHeight;
                } catch(e) {
                    flow.innerHTML += `<div class="ai-msg bot" style="color:red;">AI is busy. Please try again.</div>`;
                }
            },

            downloadWithWatermark: function() {
                const img = document.getElementById('target-img');
                if(!img) return alert("Video cannot be watermarked.");

                const canvas = document.getElementById('wm-canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;

                // Draw Base
                ctx.drawImage(img, 0, 0);

                // Add Center Watermark (20% Opacity)
                ctx.globalAlpha = 0.2;
                ctx.font = `${canvas.width / 10}px Space Grotesk`;
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText("NEXRA TECH PK", canvas.width / 2, canvas.height / 2);

                // Add Corner Logo (TikTok Style)
                ctx.globalAlpha = 0.8;
                ctx.font = `${canvas.width / 25}px Space Grotesk`;
                ctx.fillStyle = "#FF4A17";
                ctx.textAlign = "right";
                ctx.fillText("@nexratechpk", canvas.width - 20, canvas.height - 20);

                // Download
                const link = document.createElement('a');
                link.download = `Nexra_${this.state.data.title}.png`;
                link.href = canvas.toDataURL();
                link.click();
            },

            shareProduct: function() {
                if(navigator.share) {
                    navigator.share({
                        title: this.state.data.title,
                        text: `Check out this premium asset on Nexra PK!`,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Link Copied!");
                }
            },

            buyNow: function() {
                window.location.href = `checkout.html?id=${this.state.id}`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => NX_DETAIL.init());
    </script>
</body>
</html>
