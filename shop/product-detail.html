
<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <!-- ==========================================================================
         1. ENTERPRISE SEO & DYNAMIC OG TAGS
         ========================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Asset Details | Nexra Tech PK</title>
    <meta name="description" id="meta-description" content="Premium digital asset details on Nexra Tech PK. Secure delivery and verified keys.">
    <meta name="theme-color" id="browser-theme-color" content="#ffffff">
    <link rel="icon" id="dynamic-favicon" href="" type="image/png">

    <!-- JSON-LD for Google Rich Snippets -->
    <script type="application/ld+json" id="json-ld-product"></script>

    <!-- ==========================================================================
         2. FONTS & EXTERNAL SDKS
         ========================================================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Hybrid Engines -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../firebaseconfig.js"></script>

    <style>
        :root {
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.25);
            --brand-dim: rgba(255, 74, 23, 0.1);
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.04);
            --shadow-float: 0 20px 60px rgba(0,0,0,0.08);
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0a0a0f;
            --bg-elevated: #12121a;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; user-select: none; }
        
        .nx-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        .text-gradient { background: linear-gradient(135deg, var(--brand-main) 0%, #ff8a00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ==========================================================================
           LAYOUT & COMPONENTS
           ========================================================================== */
        .pd-layout { display: grid; gap: 40px; grid-template-columns: 1fr; padding-top: 130px; }
        @media(min-width: 1024px) { .pd-layout { grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: start; } }

        /* 1. Breadcrumbs & Smart Back */
        .pd-top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .breadcrumb { display: flex; gap: 10px; font-size: 11px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 1px; }

        /* 2. Gallery Sticky & Protection */
        .pd-gallery-sticky { position: sticky; top: 110px; }
        .pd-main-wrap { 
            position: relative; width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg); 
            background: var(--bg-surface); border: 1px solid var(--glass-border); 
            overflow: hidden; box-shadow: var(--shadow-soft);
        }
        .pd-main-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s var(--transition); }
        .wm-logo { position: absolute; top: 20px; right: 20px; width: 60px; opacity: 0.5; z-index: 5; pointer-events: none; }
        .wm-title { position: absolute; bottom: 20px; left: 20px; width: 120px; opacity: 0.3; z-index: 5; pointer-events: none; }

        /* 3. Pricing & Rewards */
        .price-card { 
            background: var(--bg-surface); border: 1px solid var(--glass-border); 
            padding: 35px; border-radius: var(--radius-md); box-shadow: var(--shadow-float);
            margin: 30px 0; position: relative;
        }
        .coin-hook { 
            display: inline-flex; align-items: center; gap: 8px; background: var(--brand-dim); 
            color: var(--brand-main); padding: 8px 16px; border-radius: 50px; 
            font-size: 11px; font-weight: 800; margin-bottom: 20px; border: 1px solid var(--brand-glow);
        }

        /* 4. Floating Action Island (Mobile-First) */
        .floating-island {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; background: var(--bg-base);
            border: 1px solid var(--glass-border); border-radius: 50px;
            padding: 10px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 9000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity: 0; transform: translate(-50%, 100px); transition: 0.5s var(--transition);
        }
        .floating-island.active { opacity: 1; transform: translate(-50%, 0); }
        .island-buy-btn { flex: 1; height: 55px; border-radius: 50px; background: var(--text-100); color: var(--bg-base); border: none; font-weight: 800; font-size: 14px; cursor: pointer; }
        .island-wa-btn { width: 55px; height: 55px; border-radius: 50%; background: #25D366; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; }

        /* 5. AI Assistant & Chat */
        #ai-trigger {
            position: fixed; right: 25px; bottom: 100px; width: 60px; height: 60px;
            border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--brand-main);
            color: var(--brand-main); display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: var(--shadow-float); z-index: 8500;
        }
        .ai-chat-box {
            position: fixed; bottom: 170px; right: 25px; width: 350px; max-width: 85vw;
            height: 450px; background: var(--bg-surface); border: 1px solid var(--glass-border);
            border-radius: 24px; box-shadow: var(--shadow-float); z-index: 8501;
            display: none; flex-direction: column; overflow: hidden; animation: slideUp 0.4s;
        }
        .ai-header { background: var(--brand-main); color: #fff; padding: 15px 20px; font-weight: 800; display: flex; justify-content: space-between; }
        .ai-messages { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; display: flex; flex-direction: column; gap: 15px; }
        .ai-msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .ai-msg.bot { background: var(--bg-elevated); align-self: flex-start; }
        .ai-msg.user { background: var(--brand-main); color: #fff; align-self: flex-end; }
        .ai-input-area { padding: 15px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .ai-input { flex: 1; border: none; background: var(--bg-elevated); padding: 10px 15px; border-radius: 50px; outline: none; }

        /* 6. Live Sales Ticker */
        .live-ticker {
            position: fixed; left: 20px; bottom: 100px; background: var(--bg-surface);
            border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 15px;
            display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-soft);
            transform: translateX(-150%); transition: 0.5s var(--transition); z-index: 8500;
        }
        .live-ticker.active { transform: translateX(0); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Protection */
        img { -webkit-user-drag: none; }
        .skeleton { background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-surface) 50%, var(--bg-elevated) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- MOUNT POINTS -->
    <div id="header-container"></div>
    <div id="slider-container"></div>

    <!-- AI CHAT BOX -->
    <div class="ai-chat-box" id="ai-chat-window">
        <div class="ai-header">
            <span>NX-AI ASSISTANT</span>
            <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="NX_DETAIL.toggleAIChat()"></i>
        </div>
        <div class="ai-messages" id="ai-msg-flow">
            <div class="ai-msg bot">Hi! I'm analyzing this product for you. How can I help?</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-user-input" class="ai-input" placeholder="Ask about this tool...">
            <button onclick="NX_DETAIL.askAI()" style="background:none; border:none; color:var(--brand-main); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- AI TRIGGER -->
    <div id="ai-trigger" onclick="NX_DETAIL.toggleAIChat()">
        <i class="fa-solid fa-robot"></i>
    </div>

    <!-- FOMO TICKER -->
    <div id="fomo-ticker" class="live-ticker">
        <div style="width:35px; height:35px; border-radius:50%; background:var(--brand-main); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;" id="fomo-initial">A</div>
        <div style="font-size: 11px; font-weight:600;">
            <span id="fomo-name">Someone</span> from <span id="fomo-city">Pakistan</span><br>
            <span style="color:var(--text-300)">Just unlocked this asset!</span>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <main class="pd-layout nx-container">
        
        <!-- LEFT: GALLERY & PROTECTION -->
        <div class="pd-gallery-sticky">
            <!-- Smart Back -->
            <div class="pd-top-nav">
                <div class="breadcrumb">
                    <a href="javascript:void(0)" onclick="Nexra.navTo('home')">Home</a>
                    <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i>
                    <a href="javascript:void(0)" onclick="Nexra.navTo('shop')">Market</a>
                    <i class="fa-solid fa-chevron-right" style="font-size:8px;"></i>
                    <span id="bc-title" class="text-brand">Loading...</span>
                </div>
            </div>

            <div class="pd-main-wrap">
                <img id="main-img" class="pd-main-img" src="" alt="Product Image">
                <!-- Injected Watermarks -->
                <img id="wm-top" class="wm-top-right nx-brand-logo" src="" alt="logo">
                <img id="wm-bottom" class="wm-bottom-left nx-brand-title" src="" alt="title">
            </div>

            <!-- Adsterra Slot 1 -->
            <div id="ad-slot-top" class="ad-slot"></div>
            
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:20px;" id="thumb-grid">
                <!-- Skeletons -->
                <div class="skeleton" style="height:80px;"></div>
                <div class="skeleton" style="height:80px;"></div>
                <div class="skeleton" style="height:80px;"></div>
            </div>
        </div>

        <!-- RIGHT: PRODUCT ENGINE -->
        <div class="pd-content">
            <div id="p-badge" class="badge" style="background:var(--brand-main); color:#fff; border:none; margin-bottom:15px;">PREMIUM</div>
            <h1 id="p-title" class="tech-font" style="font-size: clamp(28px, 5vw, 46px); font-weight:900; line-height:1.1; margin-bottom:20px;">Fetching Details...</h1>
            
            <div style="display:flex; gap:15px; margin-bottom:35px;">
                <span class="badge" style="background:var(--bg-elevated); color:var(--text-200); border:none;"><i class="fa-solid fa-eye"></i> <span id="v-count">14</span> Watching</span>
                <span class="badge" style="background:var(--bg-elevated); color:var(--text-200); border:none;"><i class="fa-solid fa-bolt"></i> INSTANT DELIVERY</span>
            </div>

            <div class="price-card">
                <div class="coin-hook">
                    <i class="fa-solid fa-coins"></i> EARN 100 NEXRA COINS
                </div>
                <div style="display:flex; align-items:flex-end; gap:15px; margin-bottom:30px;">
                    <div>
                        <div id="p-old-price" style="font-size:18px; text-decoration:line-through; color:var(--text-300); font-weight:600;"></div>
                        <div id="p-price" style="font-size:48px; font-weight:900; font-family:'Space Grotesk';">Rs. 0</div>
                    </div>
                    <div id="p-usd" style="font-size:14px; font-weight:800; color:var(--success); font-family:'JetBrains Mono'; margin-bottom:10px;">$0.00</div>
                </div>
                
                <div style="display:flex; gap:15px;">
                    <button class="island-buy-btn" style="background:var(--brand-main); color:#fff;" onclick="NX_DETAIL.buyNow()">PURCHASE NOW</button>
                    <button class="island-buy-btn" style="width:60px; flex:none; background:var(--bg-elevated); color:var(--text-100);" onclick="NX_DETAIL.addToCart()"><i class="fa-solid fa-cart-plus"></i></button>
                </div>
            </div>

            <!-- Adsterra Slot 2 -->
            <div id="ad-slot-mid" class="ad-slot"></div>

            <div id="p-description" style="line-height:1.8; color:var(--text-200); font-size:16px;"></div>

            <!-- Trust Badges -->
            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:15px; margin-top:40px;">
                <div class="skeleton" style="height:60px;"></div>
                <div class="skeleton" style="height:60px;"></div>
            </div>
        </div>
    </main>

    <!-- MOBILE FLOATING ACTION ISLAND -->
    <div class="floating-island" id="action-island">
        <div style="padding-left:15px;">
            <div style="font-size:10px; font-weight:800; color:var(--text-300);">TOTAL PRICE</div>
            <div id="island-price" style="font-size:16px; font-weight:900;">Rs. 0</div>
        </div>
        <button class="island-buy-btn" onclick="NX_DETAIL.buyNow()">BUY NOW</button>
        <a id="wa-link" href="" target="_blank" class="island-wa-btn"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <!-- RELATED PRODUCTS -->
    <section class="nx-container" style="padding-bottom:100px;">
        <h3 class="tech-font" style="font-size:24px; margin-bottom:30px;">PEOPLE ALSO <span class="text-gradient">VIEWED</span></h3>
        <div class="grid-2" id="related-grid">
            <div class="skeleton" style="height:250px;"></div>
            <div class="skeleton" style="height:250px;"></div>
        </div>
    </section>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <!-- ==========================================================================
         PRODUCT DETAIL LOGIC ENGINE
         ========================================================================== -->
    <script>
        window.NX_DETAIL = {
            state: {
                productId: new URLSearchParams(window.location.search).get('id'),
                data: null,
                isAIChatOpen: false
            },

            init: async function() {
                if(!this.state.productId) { window.location.href = 'shop.html'; return; }
                
                await this.loadUI();
                
                // Wait for Hybrid Engine (firebaseconfig.js)
                const checkEngine = setInterval(async () => {
                    if(window.db && window.NexraBrand) {
                        clearInterval(checkEngine);
                        await this.fetchProduct();
                        this.startFOMO();
                        this.initScrollIsland();
                        window.NexraBrand.refreshDOMAssets();
                    }
                }, 100);
            },

            loadUI: async function() {
                const mods = [
                    { id: 'header-container', file: '../components/header.html' },
                    { id: 'footer-container', file: '../components/footer.html' }
                ];
                for(const m of mods) {
                    try {
                        const res = await fetch(m.file);
                        if(res.ok) document.getElementById(m.id).innerHTML = await res.text();
                    } catch(e) {}
                }
            },

            fetchProduct: async function() {
                try {
                    const doc = await db.collection('products').doc(this.state.productId).get();
                    if(!doc.exists) { window.location.href = 'shop.html'; return; }
                    
                    this.state.data = { id: doc.id, ...doc.data() };
                    this.render();
                    this.trackRecentView();
                    this.fetchRelated();
                } catch(e) { console.error(e); }
            },

            render: function() {
                const p = this.state.data;
                document.title = `${p.title} | Nexra Tech PK`;
                document.getElementById('p-title').innerText = p.title;
                document.getElementById('bc-title').innerText = p.title;
                document.getElementById('main-img').src = p.image;
                document.getElementById('p-price').innerText = `Rs. ${parseFloat(p.price).toLocaleString()}`;
                document.getElementById('island-price').innerText = `Rs. ${parseFloat(p.price).toLocaleString()}`;
                document.getElementById('p-usd').innerText = `$${(p.price / 278).toFixed(2)}`;
                document.getElementById('p-description').innerHTML = p.description || 'Premium Asset Verified by Nexra Tech.';
                
                if(p.oldPrice) {
                    document.getElementById('p-old-price').innerText = `Rs. ${parseFloat(p.oldPrice).toLocaleString()}`;
                }

                // WhatsApp Link Generator
                const msg = encodeURIComponent(`Hi Nexra! I want to buy "${p.title}". URL: ${window.location.href}`);
                document.getElementById('wa-link').href = `https://wa.me/923000000000?text=${msg}`;

                // Schema.org
                document.getElementById('json-ld-product').textContent = JSON.stringify({
                    "@context": "https://schema.org/",
                    "@type": "Product",
                    "name": p.title,
                    "image": p.image,
                    "offers": { "@type": "Offer", "price": p.price, "priceCurrency": "PKR" }
                });
            },

            // --- FOMO ENGINE ---
            startFOMO: function() {
                const names = ['Ali', 'Sara', 'Zain', 'Hamza', 'Dua', 'Bilal'];
                const cities = ['Lahore', 'Karachi', 'Islamabad', 'Peshawar'];
                
                setInterval(() => {
                    if(Math.random() > 0.6) {
                        const ticker = document.getElementById('fomo-ticker');
                        const name = names[Math.floor(Math.random()*names.length)];
                        document.getElementById('fomo-name').innerText = name;
                        document.getElementById('fomo-initial').innerText = name[0];
                        document.getElementById('fomo-city').innerText = cities[Math.floor(Math.random()*cities.length)];
                        
                        ticker.classList.add('active');
                        setTimeout(() => ticker.classList.remove('active'), 4000);
                    }
                }, 15000);
            },

            // --- FLOATING ISLAND ---
            initScrollIsland: function() {
                window.addEventListener('scroll', () => {
                    const island = document.getElementById('action-island');
                    if(window.scrollY > 500) island.classList.add('active');
                    else island.classList.remove('active');
                });
            },

            // --- AI ASSISTANT (OPENROUTER) ---
            toggleAIChat: function() {
                const box = document.getElementById('ai-chat-window');
                this.state.isAIChatOpen = !this.state.isAIChatOpen;
                box.style.display = this.state.isAIChatOpen ? 'flex' : 'none';
            },

            askAI: async function() {
                const input = document.getElementById('ai-user-input');
                const flow = document.getElementById('ai-msg-flow');
                const text = input.value.trim();
                if(!text) return;

                flow.innerHTML += `<div class="ai-msg user">${text}</div>`;
                input.value = '';
                flow.scrollTop = flow.scrollHeight;

                try {
                    // This is a bridge to your Cloud Function or API route
                    // We send the product data so AI knows the context
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer YOUR_OPENROUTER_KEY',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'google/gemini-pro-1.5',
                            messages: [
                                { role: 'system', content: `You are an expert for Nexra Tech PK. Product: ${this.state.data.title}. Description: ${this.state.data.description}. Help the user decide.` },
                                { role: 'user', content: text }
                            ]
                        })
                    });
                    const data = await response.json();
                    const botMsg = data.choices[0].message.content;
                    flow.innerHTML += `<div class="ai-msg bot">${botMsg}</div>`;
                    flow.scrollTop = flow.scrollHeight;
                } catch(e) {
                    flow.innerHTML += `<div class="ai-msg bot">Sorry, AI is currently syncing. Please try again.</div>`;
                }
            },

            trackRecentView: function() {
                let views = JSON.parse(localStorage.getItem('nx_viewed_products') || '[]');
                views = views.filter(id => id !== this.state.productId);
                views.unshift(this.state.productId);
                localStorage.setItem('nx_viewed_products', JSON.stringify(views.slice(0, 10)));
            },

            fetchRelated: async function() {
                const grid = document.getElementById('related-grid');
                if(!window.supabaseClient) return;
                const { data } = await window.supabaseClient.from('products').select('*').limit(2);
                if(data) {
                    grid.innerHTML = data.map(p => `
                        <div class="skeleton" style="height:auto; padding:15px; background:var(--bg-surface); border:1px solid var(--glass-border); border-radius:20px;" onclick="window.location.href='?id=${p.id}'">
                            <img src="${p.image}" style="width:100%; border-radius:12px; margin-bottom:10px;">
                            <div style="font-weight:800; font-size:14px;">${p.title}</div>
                            <div style="color:var(--brand-main); font-weight:900; margin-top:5px;">Rs. ${p.price}</div>
                        </div>
                    `).join('');
                }
            },

            buyNow: function() {
                window.location.href = `checkout.html?id=${this.state.productId}`;
            },

            copyAffiliateLink: function() {
                const link = `${window.location.origin}${window.location.pathname}?id=${this.state.productId}&ref=${auth.currentUser ? auth.currentUser.uid : 'GUEST'}`;
                navigator.clipboard.writeText(link);
                if(window.Nexra) Nexra.showToast("Affiliate Link Copied!", "success");
            }
        };

        window.addEventListener('DOMContentLoaded', () => NX_DETAIL.init());
    </script>
</body>
</html>
