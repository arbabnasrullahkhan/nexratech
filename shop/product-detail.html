<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Elite Asset Detail | Nexra Tech PK</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" id="dynamic-desc" content="Premium digital asset details on Nexra Tech PK.">
    <meta name="theme-color" id="browser-theme-color" content="#ffffff">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Backend Config -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../firebaseconfig.js"></script>

    <style>
        :root {
            --brand-main: #FF4A17; 
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --text-100: #0f172a;
            --text-200: #475569;
            --glass-border: rgba(0, 0, 0, 0.06);
            --radius-md: 20px;
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507; --bg-surface: #0a0a0f; --text-100: #ffffff; --text-200: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* 1. SMART SIDEBAR (LEFT) */
        .pd-sidebar {
            position: fixed; left: 20px; top: 120px; width: 60px; display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .side-btn { width: 50px; height: 50px; border-radius: 15px; background: var(--bg-surface); border: 1px solid var(--glass-border); color: var(--text-100); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow-soft); }
        .side-btn:hover { background: var(--brand-main); color: #fff; transform: scale(1.1); }

        /* 2. MAIN LAYOUT (STICKY GALLERY) */
        .pd-grid { max-width: 1400px; margin: 0 auto; padding: 130px 5% 100px; display: grid; gap: 40px; }
        @media(min-width: 1024px) { .pd-grid { grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; } }

        .pd-gallery { position: sticky; top: 120px; } /* Sticky fix */
        .pd-media-viewer { 
            width: 100%; aspect-ratio: 1; border-radius: 30px; background: var(--bg-surface); border: 1px solid var(--glass-border); 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.05); position: relative;
        }
        .main-media { width: 100%; height: 100%; object-fit: cover; }

        /* 3. AI CHAT SYSTEM (PREMIUM UI) */
        #ai-chat-window {
            position: fixed; bottom: 100px; right: 25px; width: 350px; max-width: 90vw; height: 500px;
            background: var(--bg-base); border: 1px solid var(--brand-main); border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); z-index: 9999; display: none; flex-direction: column; overflow: hidden;
        }
        .ai-header { background: var(--brand-main); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; font-weight: 800; font-size: 14px; }
        .ai-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .msg.ai { background: var(--bg-elevated); color: var(--text-100); align-self: flex-start; }
        .msg.user { background: var(--brand-main); color: #fff; align-self: flex-end; }
        .ai-input-area { padding: 15px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .ai-input-area input { flex: 1; background: var(--bg-elevated); border: none; padding: 10px 15px; border-radius: 12px; color: var(--text-100); font-family: inherit; }

        /* 4. PRODUCT INFO (COMPACT FOR MOBILE) */
        .pd-info { padding-bottom: 50px; }
        .pd-title { font-family: 'Space Grotesk'; font-size: clamp(24px, 5vw, 42px); font-weight: 900; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1.5px; }
        
        /* Mobile Scaling */
        @media(max-width: 768px) {
            .pd-grid { padding: 100px 15px 120px; }
            .pd-gallery { position: relative; top: 0; }
            .pd-sidebar { left: 10px; top: 90px; }
        }

        /* Watermark Overlay (Real-time) */
        .wm-layer { position: absolute; pointer-events: none; z-index: 10; opacity: 0.4; }
        .wm-logo { top: 15px; right: 15px; width: 40px; }
        .wm-text { bottom: 15px; left: 15px; font-size: 10px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* Sections */
        .related-box { margin-top: 50px; border-top: 1px solid var(--glass-border); padding-top: 40px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- MOUNT POINTS -->
    <div id="mount-header"></div>

    <!-- LEFT SIDEBAR -->
    <div class="pd-sidebar">
        <button class="side-btn" title="Go Back" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="side-btn" title="Download Image" onclick="NX_DETAIL.downloadWithWatermark()"><i class="fa-solid fa-download"></i></button>
        <button class="side-btn" title="Share" onclick="NX_DETAIL.share()"><i class="fa-solid fa-share-nodes"></i></button>
    </div>

    <!-- MAIN PRODUCT GRID -->
    <main class="pd-grid">
        
        <!-- LEFT: MEDIA GALLERY (STICKY) -->
        <div class="pd-gallery">
            <div class="pd-media-viewer" id="media-viewer">
                <div id="media-content">
                    <!-- Image or Video injected here -->
                    <img id="pd-main-img" class="main-media" src="" alt="Asset">
                </div>
                <!-- Branding Overlays -->
                <img class="wm-layer wm-logo nx-brand-logo" src="">
                <div class="wm-layer wm-text">NEXRA TECH PK</div>
            </div>
            
            <div id="extra-thumbs" style="display:flex; gap:10px; margin-top:15px; overflow-x:auto;">
                <!-- Optional Thumbs -->
            </div>
        </div>

        <!-- RIGHT: PRODUCT DETAILS -->
        <div class="pd-info">
            <div id="pd-badge" class="badge" style="background:var(--brand-main); color:#fff; border:none; margin-bottom:15px;">PREMIUM</div>
            <h1 id="pd-title" class="pd-title">Asset Name Loading...</h1>
            
            <div style="display:flex; gap:15px; margin-bottom: 25px; font-size:12px; font-weight:800; color:var(--text-300);">
                <span><i class="fa-solid fa-star" style="color:var(--gold)"></i> <span id="pd-rating">5.0</span></span>
                <span><i class="fa-solid fa-bolt"></i> INSTANT DELIVERY</span>
                <span><i class="fa-solid fa-shield-check"></i> SECURED</span>
            </div>

            <div style="background:var(--bg-surface); padding:30px; border-radius:24px; border:1px solid var(--glass-border); box-shadow:var(--shadow-soft); margin-bottom:30px;">
                <div style="font-size:16px; text-decoration:line-through; color:var(--text-300); margin-bottom:5px;" id="pd-old"></div>
                <div style="font-size:42px; font-weight:900; font-family:'Space Grotesk';" id="pd-price">Rs. 0</div>
                
                <div style="display:flex; gap:12px; margin-top:25px;">
                    <button class="side-btn" style="flex:1; background:var(--text-100); color:#fff; border:none; font-weight:800;" onclick="NX_DETAIL.buyNow()">BUY NOW</button>
                    <button class="side-btn" onclick="NX_DETAIL.addToCart()"><i class="fa-solid fa-cart-plus"></i></button>
                </div>
            </div>

            <!-- Adsterra Spot -->
            <div style="background:var(--bg-elevated); border:1.5px dashed var(--text-300); padding:20px; text-align:center; border-radius:20px; margin-bottom:30px; font-size:11px; color:var(--text-300);">ADSTERRA PREMIUM PLACEMENT</div>

            <div id="pd-content-html" style="line-height:1.8; color:var(--text-200); font-size:15px;">
                <!-- Description -->
            </div>

            <!-- Related Sections -->
            <div class="related-box">
                <h3 class="tech-font" style="font-size:20px; margin-bottom:20px;">Premium Alternatives</h3>
                <div id="related-products" class="nx-grid" style="grid-template-columns: repeat(2, 1fr); gap:15px;">
                    <!-- Firestore Related -->
                </div>
            </div>
        </div>
    </main>

    <!-- AI CHAT WINDOW -->
    <div id="ai-chat-window">
        <div class="ai-header">
            <span>NEXRA AI ASSISTANT</span>
            <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="NX_DETAIL.toggleAIChat()"></i>
        </div>
        <div class="ai-messages" id="ai-messages">
            <div class="msg ai">Hello! I've analyzed this asset. Ask me anything about its features or installation.</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-query" placeholder="Ask about this product...">
            <button class="side-btn" style="width:40px; height:40px; border-radius:10px;" onclick="NX_DETAIL.askAI()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- AI Trigger -->
    <button id="ai-trigger" style="position:fixed; bottom:25px; right:25px; width:60px; height:60px; border-radius:50%; background:var(--brand-main); color:#fff; border:none; box-shadow:0 10px 30px var(--brand-glow); cursor:pointer; font-size:24px; z-index:9000;" onclick="NX_DETAIL.toggleAIChat()"><i class="fa-solid fa-robot"></i></button>

    <!-- HIDDEN CANVAS FOR WATERMARKING -->
    <canvas id="wm-canvas" style="display:none;"></canvas>

    <script>
        window.NX_DETAIL = {
            state: {
                id: new URLSearchParams(window.location.search).get('id'),
                product: null,
                aiActive: false,
                // APIs
                geminiKey: 'AQ.Ab8RN6JuMq7D-pUyP0LO9NAfxhoKxDCwcAtSSN6i8-5itOKEpw',
                openRouterKey: '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'
            },

            init: async function() {
                if(!this.state.id) return window.location.href = '../index.html';
                
                // Fetch & Render
                const timer = setInterval(async () => {
                    if(window.db || window.supabaseClient) {
                        clearInterval(timer);
                        await this.fetchProduct();
                        if(window.NexraBrand) window.NexraBrand.refreshDOMAssets();
                    }
                }, 100);
            },

            fetchProduct: async function() {
                try {
                    let p = null;
                    if(window.supabaseClient) {
                        const { data } = await window.supabaseClient.from('products').select('*').eq('id', this.state.id).single();
                        p = data;
                    }
                    if(!p && window.db) {
                        const doc = await db.collection('products').doc(this.state.id).get();
                        if(doc.exists) p = { id: doc.id, ...doc.data() };
                    }
                    if(!p) return window.location.href = 'shop.html';
                    this.state.product = p;
                    this.render();
                } catch(e) { console.error(e); }
            },

            render: function() {
                const p = this.state.product;
                document.getElementById('pd-title').innerText = p.title;
                document.getElementById('bc-current').innerText = p.title;
                document.getElementById('pd-price').innerText = `Rs. ${p.price}`;
                document.getElementById('pd-content-html').innerHTML = p.description || 'Verified Asset.';
                
                // Media Logic (Video vs Image)
                const mediaBox = document.getElementById('media-content');
                if(p.image.endsWith('.mp4')) {
                    mediaBox.innerHTML = `<video class="main-media" src="${p.image}" autoplay loop muted playsinline></video>`;
                } else {
                    document.getElementById('pd-main-img').src = p.image;
                }
            },

            toggleAIChat: function() {
                const win = document.getElementById('ai-chat-window');
                this.state.aiActive = !this.state.aiActive;
                win.style.display = this.state.aiActive ? 'flex' : 'none';
            },

            // --- TRIPLE ENGINE AI LOGIC ---
            askAI: async function() {
                const query = document.getElementById('ai-query').value.trim();
                if(!query) return;
                
                this.appendMsg(query, 'user');
                document.getElementById('ai-query').value = '';

                // Prompt: Strictly limit to current product
                const sysPrompt = `You are Nexra AI. Only answer questions about the product: ${this.state.product.title}. Price: ${this.state.product.price}. If asked about anything else, say you only provide analysis for this product. Keep it short.`;

                // Try 1: Gemini
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${this.state.geminiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: sysPrompt + "\nUser: " + query }] }] })
                    });
                    const data = await response.json();
                    this.appendMsg(data.candidates[0].content.parts[0].text, 'ai');
                } catch(e) {
                    // Try 2: OpenRouter Gemma
                    try {
                        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: "POST",
                            headers: { "Authorization": `Bearer ${this.state.openRouterKey}`, "Content-Type": "application/json" },
                            body: JSON.stringify({ model: "google/gemma-4-31b-it:free", messages: [{role:"system", content:sysPrompt}, {role:"user", content:query}] })
                        });
                        const data = await response.json();
                        this.appendMsg(data.choices[0].message.content, 'ai');
                    } catch(e) {
                        this.appendMsg("AI Engines are currently syncing. Please try again in 5 minutes.", 'ai');
                    }
                }
            },

            appendMsg: function(txt, sender) {
                const box = document.getElementById('ai-messages');
                box.innerHTML += `<div class="msg ${sender}">${txt}</div>`;
                box.scrollTop = box.scrollHeight;
            },

            // --- AUTO WATERMARK ENGINE ---
            downloadWithWatermark: function() {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = this.state.product.image;
                
                img.onload = () => {
                    const canvas = document.getElementById('wm-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // 1. Draw Main Image
                    ctx.drawImage(img, 0, 0);
                    
                    // 2. Add Logo (Top Right)
                    const logo = new Image();
                    logo.crossOrigin = "anonymous";
                    logo.src = window.NexraBrand.getAsset('logo');
                    logo.onload = () => {
                        ctx.globalAlpha = 0.5;
                        ctx.drawImage(logo, canvas.width - 150, 40, 100, 100);
                        
                        // 3. Add Text (Bottom Left)
                        ctx.globalAlpha = 0.8;
                        ctx.font = "bold 40px Plus Jakarta Sans";
                        ctx.fillStyle = "white";
                        ctx.fillText("NEXRA TECH PK", 40, canvas.height - 40);
                        
                        // 4. Trigger Download
                        const link = document.createElement('a');
                        link.download = `Nexra_${this.state.product.title}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                    };
                };
            },

            share: function() {
                if(navigator.share) navigator.share({ title: this.state.product.title, url: window.location.href });
            },

            addToCart: function() {
                if(window.Nexra) Nexra.showToast("Added to Vault Cart", "success");
            },

            buyNow: function() {
                window.location.href = 'checkout.html?id=' + this.state.id;
            }
        };

        window.addEventListener('DOMContentLoaded', () => NX_DETAIL.init());
    </script>
</body>
</html>
