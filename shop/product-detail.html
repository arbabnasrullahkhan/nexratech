<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <!-- 1. SEO & META (Injected Dynamically via JS) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Product Details | Nexra Tech PK</title>
    
    <!-- MASTER CONFIGURATION -->
    <script src="../firebaseconfig.js"></script>

    <style>
        /* ==========================================================================
           PRODUCT DETAIL SPECIFIC UI
           ========================================================================== */
        .pd-layout {
            max-width: 1300px; margin: 0 auto;
            padding: 140px 5% 80px;
            display: grid; grid-template-columns: 1fr; gap: 40px;
        }
        @media(min-width: 1024px) { .pd-layout { grid-template-columns: 1.1fr 1fr; gap: 80px; align-items: start; } }

        /* Gallery System */
        .pd-gallery { position: sticky; top: 120px; }
        .pd-main-img-wrap {
            width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg);
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            overflow: hidden; position: relative; margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
        }
        .pd-main-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s var(--transition); }
        .pd-main-img-wrap:hover .pd-main-img { transform: scale(1.05); }
        
        .pd-thumbs { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
        .pd-thumb {
            width: 80px; height: 80px; border-radius: 12px; border: 2px solid transparent;
            cursor: pointer; transition: 0.3s; background: var(--bg-elevated); flex-shrink: 0;
            overflow: hidden;
        }
        .pd-thumb.active { border-color: var(--brand-main); transform: translateY(-3px); }
        .pd-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Content Area */
        .pd-badge { margin-bottom: 15px; }
        .pd-title { font-family: 'Space Grotesk'; font-size: clamp(28px, 5vw, 48px); font-weight: 900; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1.5px; }
        
        .pd-price-card {
            background: var(--bg-surface); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: var(--radius-md); margin: 30px 0;
            box-shadow: var(--shadow-soft);
        }
        .pd-price-row { display: flex; align-items: flex-end; gap: 15px; margin-bottom: 25px; }
        .pd-price-main { font-family: 'Space Grotesk'; font-size: 42px; font-weight: 900; color: var(--text-100); line-height: 1; }
        .pd-price-old { font-size: 18px; text-decoration: line-through; color: var(--text-300); font-weight: 600; margin-bottom: 5px; }
        .pd-price-usd { background: var(--brand-dim); color: var(--brand-main); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; font-family: 'JetBrains Mono'; }

        /* Purchase Controls */
        .pd-actions { display: flex; gap: 15px; flex-wrap: wrap; }
        .pd-qty {
            display: flex; align-items: center; background: var(--bg-elevated);
            border-radius: 50px; padding: 5px; border: 1px solid var(--glass-border);
        }
        .qty-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: transparent; cursor: pointer; color: var(--text-100); font-size: 18px; }
        .qty-btn:hover { background: var(--bg-surface); }
        .qty-num { width: 40px; text-align: center; font-weight: 800; font-size: 16px; }

        /* Tabs System */
        .pd-tabs { border-bottom: 1px solid var(--glass-border); display: flex; gap: 30px; margin-bottom: 30px; }
        .pd-tab-btn { padding: 15px 5px; border: none; background: none; font-weight: 800; font-size: 13px; color: var(--text-300); cursor: pointer; position: relative; text-transform: uppercase; letter-spacing: 1px; }
        .pd-tab-btn.active { color: var(--brand-main); }
        .pd-tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--brand-main); border-radius: 5px; }
        
        .pd-tab-content { display: none; line-height: 1.8; color: var(--text-200); font-size: 15px; animation: fadeIn 0.4s; }
        .pd-tab-content.active { display: block; }
        .pd-tab-content h3 { color: var(--text-100); margin: 20px 0 10px; }

        /* Ad Zones */
        .ad-slot { background: var(--bg-elevated); border: 1px dashed var(--text-300); padding: 15px; text-align: center; border-radius: 12px; margin-bottom: 30px; font-size: 11px; font-weight: 700; color: var(--text-300); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- COMPONENT MOUNT POINTS -->
    <div id="mount-header" class="nx-mount-point"></div>
    <div id="mount-slider" class="nx-mount-point"></div>
    <div id="mount-notifications" class="nx-mount-point"></div>

    <main class="pd-layout">
        
        <!-- LEFT: GALLERY -->
        <div class="pd-gallery">
            <div class="pd-main-img-wrap">
                <img id="pd-view-img" class="pd-main-img" src="" alt="Product">
                <img class="nx-brand-watermark pd-watermark" src="" alt="watermark" style="position:absolute; bottom:20px; right:20px; width:80px; opacity:0.3; pointer-events:none;">
            </div>
            <div class="pd-thumbs" id="pd-thumbs-container">
                <!-- Injected via JS -->
            </div>
            
            <!-- Ad Slot (Below Gallery) -->
            <div class="ad-slot" id="ad-pd-left">ADSTERRA NATIVE SLOT</div>
        </div>

        <!-- RIGHT: INFORMATION -->
        <div class="pd-content">
            <div id="pd-type-badge" class="badge pd-badge">LOADING...</div>
            <h1 id="pd-view-title" class="pd-title">Fetching Product...</h1>
            
            <div style="display:flex; gap:20px; font-size:12px; font-weight:800; color:var(--text-300); text-transform:uppercase;">
                <span><i class="fa-solid fa-barcode"></i> SKU: <span id="pd-view-sku" class="text-brand">...</span></span>
                <span><i class="fa-solid fa-star" style="color:var(--gold)"></i> <span id="pd-view-rating">0.0</span> Rating</span>
                <span id="pd-stock-status" style="color:var(--success)"><i class="fa-solid fa-circle-check"></i> SECURED STOCK</span>
            </div>

            <!-- Pricing Area -->
            <div class="pd-price-card">
                <div class="pd-price-row">
                    <div>
                        <div id="pd-view-old" class="pd-price-old"></div>
                        <div id="pd-view-price" class="pd-price-main">Rs. 0</div>
                    </div>
                    <div id="pd-view-usd" class="pd-price-usd">$0.00</div>
                </div>

                <div class="pd-actions">
                    <div class="pd-qty">
                        <button class="qty-btn" onclick="NX_DETAIL.updateQty(-1)"><i class="fa-solid fa-minus"></i></button>
                        <div class="qty-num" id="pd-qty-display">1</div>
                        <button class="qty-btn" onclick="NX_DETAIL.updateQty(1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <button class="nx-btn nx-btn-primary" style="flex:1;" onclick="NX_DETAIL.handleBuyNow()">
                        <i class="fa-solid fa-bolt"></i> PURCHASE NOW
                    </button>
                    <button class="nx-card-btn-icon" style="width:60px; height:55px; border-radius:50px;" onclick="NX_DETAIL.handleAddToCart()">
                        <i class="fa-solid fa-cart-arrow-down" style="font-size:20px;"></i>
                    </button>
                </div>
            </div>

            <!-- Ad Slot (Inside Content) -->
            <div class="ad-slot" id="ad-pd-right">ADSTERRA SOCIAL BAR</div>

            <!-- Tabs System -->
            <div class="pd-tabs">
                <button class="pd-tab-btn active" onclick="NX_DETAIL.switchTab(event, 'tab-desc')">Description</button>
                <button class="pd-tab-btn" onclick="NX_DETAIL.switchTab(event, 'tab-specs')">Technical Info</button>
                <button class="pd-tab-btn" onclick="NX_DETAIL.switchTab(event, 'tab-reviews')">Real-time Reviews</button>
            </div>

            <div id="tab-desc" class="pd-tab-content active">
                <div id="pd-view-desc">
                    <div class="skeleton" style="height:20px; width:100%; margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:20px; width:90%; margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:20px; width:70%;"></div>
                </div>
            </div>

            <div id="tab-specs" class="pd-tab-content">
                <div id="pd-view-specs">
                    <!-- Dynamic Attributes from DB -->
                </div>
            </div>

            <div id="tab-reviews" class="pd-tab-content">
                <div id="pd-view-reviews">
                    <!-- Real-time Firestore Reviews -->
                    <p style="text-align:center; padding:20px;">No reviews yet for this asset.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER MOUNT -->
    <div id="mount-footer" class="nx-mount-point"></div>

    <!-- ==========================================================================
         PRODUCT DETAIL ENGINE
         ========================================================================== -->
    <script>
        window.NX_DETAIL = {
            state: {
                productId: new URLSearchParams(window.location.search).get('id'),
                currentProduct: null,
                quantity: 1
            },

            init: async function() {
                if(!this.state.productId) { window.location.href = '../index.html'; return; }
                console.log(`[NX_DETAIL] Loading Product ID: ${this.state.productId}`);

                // 1. Load Modules
                await this.loadSharedUI();

                // 2. Fetch Data
                this.waitForBackend(async () => {
                    if(window.NexraBrand) window.NexraBrand.refreshDOMAssets();
                    await this.fetchProductData();
                });
            },

            loadSharedUI: async function() {
                const components = [
                    { id: 'mount-header', path: '../components/header.html' },
                    { id: 'mount-slider', path: '../components/slider.html' },
                    { id: 'mount-footer', path: '../components/footer.html' },
                    { id: 'mount-notifications', path: '../components/ui-notifications.html' }
                ];
                for (const comp of components) {
                    try {
                        const res = await fetch(comp.path);
                        if (res.ok) {
                            const mount = document.getElementById(comp.id);
                            mount.innerHTML = await res.text();
                            mount.querySelectorAll('script').forEach(s => {
                                const ns = document.createElement('script');
                                Array.from(s.attributes).forEach(attr => ns.setAttribute(attr.name, attr.value));
                                if (s.src) ns.src = s.src; else ns.textContent = s.textContent;
                                document.body.appendChild(ns);
                            });
                        }
                    } catch (e) {}
                }
            },

            waitForBackend: function(callback, tries = 0) {
                if (window.supabaseClient || window.db) callback();
                else if (tries < 50) setTimeout(() => this.waitForBackend(callback, tries + 1), 100);
            },

            fetchProductData: async function() {
                try {
                    let product = null;

                    // 1. Attempt Supabase (Master SQL Data)
                    if (window.supabaseClient) {
                        const { data, error } = await window.supabaseClient.from('products').select('*').eq('id', this.state.productId).single();
                        if (!error) product = data;
                    }

                    // 2. Attempt Firestore (Fallback/Direct)
                    if (!product && window.db) {
                        const doc = await db.collection('products').doc(this.state.productId).get();
                        if (doc.exists) product = { id: doc.id, ...doc.data() };
                    }

                    if(!product) {
                        alert("Product not found in ecosystem.");
                        window.location.href = '../index.html';
                        return;
                    }

                    this.state.currentProduct = product;
                    this.renderProduct();

                } catch (e) { console.error(e); }
            },

            renderProduct: function() {
                const p = this.state.currentProduct;
                
                // SEO & Title
                document.title = `${p.title} | Nexra Tech PK`;
                
                // UI Elements
                document.getElementById('pd-view-img').src = p.image;
                document.getElementById('pd-view-title').innerText = p.title;
                document.getElementById('pd-view-sku').innerText = p.sku || 'NEXRA-ASSET';
                document.getElementById('pd-view-rating').innerText = p.rating || '5.0';
                document.getElementById('pd-view-price').innerText = `Rs. ${parseFloat(p.price).toLocaleString()}`;
                
                if(p.oldPrice) {
                    document.getElementById('pd-view-old').innerText = `Rs. ${parseFloat(p.oldPrice).toLocaleString()}`;
                }
                
                document.getElementById('pd-view-usd').innerText = `$${(p.price / 278).toFixed(2)}`;
                document.getElementById('pd-view-desc').innerHTML = p.description || 'No description available.';
                document.getElementById('pd-type-badge').innerText = p.type ? p.type.toUpperCase() : 'DIGITAL ASSET';

                // Render Thumbs
                const thumbBox = document.getElementById('pd-thumbs-container');
                const images = p.extra_images ? [p.image, ...p.extra_images] : [p.image];
                thumbBox.innerHTML = images.map((img, i) => `
                    <div class="pd-thumb ${i===0?'active':''}" onclick="NX_DETAIL.changeMainImg(this, '${img}')">
                        <img src="${img}" alt="Thumb">
                    </div>
                `).join('');

                // Render Specs
                if(p.specifications) {
                    let specHTML = '<ul style="list-style:none; display:grid; gap:10px;">';
                    Object.entries(p.specifications).forEach(([key, val]) => {
                        specHTML += `<li style="background:var(--bg-elevated); padding:12px 20px; border-radius:10px; display:flex; justify-content:space-between;"><strong style="color:var(--text-100)">${key}:</strong> <span>${val}</span></li>`;
                    });
                    specHTML += '</ul>';
                    document.getElementById('pd-view-specs').innerHTML = specHTML;
                }
            },

            changeMainImg: function(el, src) {
                document.getElementById('pd-view-img').src = src;
                document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            },

            updateQty: function(val) {
                this.state.quantity = Math.max(1, this.state.quantity + val);
                document.getElementById('pd-qty-display').innerText = this.state.quantity;
            },

            switchTab: function(e, tabId) {
                document.querySelectorAll('.pd-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.pd-tab-content').forEach(c => c.classList.remove('active'));
                e.currentTarget.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            },

            handleAddToCart: function() {
                const p = this.state.currentProduct;
                if(window.Nexra && typeof Nexra.showToast === 'function') {
                    Nexra.showToast(`${p.title} added to cart!`, 'success');
                }
            },

            handleBuyNow: function() {
                this.handleAddToCart();
                window.location.href = window.NexraRoutes ? window.NexraRoutes.generateURL('checkout') : 'checkout.html';
            }
        };

        // Ignition
        window.addEventListener('DOMContentLoaded', () => NX_DETAIL.init());
    </script>
</body>
</html>
