<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>Nexra PK | Loading Elite Asset...</title>
    
    <meta name="description" id="meta-desc" content="Premium Digital Asset from Nexra Tech PK. Secure delivery and verified keys.">
    <meta name="theme-color" id="browser-theme-color" content="#ffffff">

    <!-- JSON-LD for Google Snippets -->
    <script type="application/ld+json" id="ld-json-data"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Hybrid Engines -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- External Master Config -->
    <script src="../firebaseconfig.js"></script>

    <style>
        :root {
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.25);
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --radius-lg: 32px;
            --radius-md: 20px;
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0a0a0f;
            --bg-elevated: #12121a;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; user-select: none; }

        /* ---------------------------------------------------------
           PREMIUM LAYOUT
           --------------------------------------------------------- */
        .pd-main-grid { 
            max-width: 1400px; margin: 0 auto; 
            padding: 130px 5% 120px; 
            display: grid; gap: 40px; grid-template-columns: 1fr;
        }

        @media(min-width: 1024px) { 
            .pd-main-grid { grid-template-columns: 1fr 0.8fr; gap: 80px; align-items: start; } 
        }

        /* ---------------------------------------------------------
           STICKY MEDIA STAGE (TikTok Inspired)
           --------------------------------------------------------- */
        .pd-gallery-container { position: sticky; top: 110px; }
        @media(max-width: 1023px) { .pd-gallery-container { position: relative; top: 0; margin-bottom: 30px; } }

        .pd-media-stage { 
            position: relative; width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg); 
            background: var(--bg-surface); border: 1px solid var(--glass-border); 
            overflow: hidden; box-shadow: var(--shadow-soft); 
        }
        
        .pd-media-stage img, .pd-media-stage video { width: 100%; height: 100%; object-fit: cover; transition: 0.6s var(--transition); }
        .pd-media-stage:hover img { transform: scale(1.05); }

        .pd-thumbs-track { display: flex; gap: 12px; margin-top: 20px; overflow-x: auto; scrollbar-width: none; }
        .pd-thumb { width: 70px; height: 70px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; background: var(--bg-elevated); overflow: hidden; transition: 0.3s; }
        .pd-thumb.active { border-color: var(--brand-main); transform: translateY(-3px); }

        /* ---------------------------------------------------------
           CONTENT & PRICING
           --------------------------------------------------------- */
        .smart-back-btn { display: inline-flex; align-items: center; gap: 10px; color: var(--brand-main); font-weight: 800; font-size: 13px; text-transform: uppercase; cursor: pointer; margin-bottom: 25px; transition: 0.3s; }
        .smart-back-btn:hover { transform: translateX(-8px); }

        .pd-title { font-family: 'Space Grotesk'; font-size: clamp(24px, 5vw, 42px); font-weight: 900; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1px; }
        
        .price-card { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 30px; border-radius: 24px; box-shadow: var(--shadow-float); margin: 25px 0; }
        .price-main { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; line-height: 1; color: var(--brand-main); }
        .price-old { font-size: 16px; color: var(--text-300); text-decoration: line-through; font-weight: 600; margin-bottom: 5px; }

        /* ---------------------------------------------------------
           AI CHAT UI
           --------------------------------------------------------- */
        #ai-chatbot { position: fixed; bottom: 100px; right: 25px; z-index: 9999; }
        .ai-fab { width: 60px; height: 60px; border-radius: 50%; background: var(--bg-surface); border: 1.5px solid var(--brand-main); color: var(--brand-main); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: var(--shadow-float); transition: 0.4s; }
        .ai-fab.active { background: var(--brand-main); color: #fff; transform: rotate(90deg); }

        .ai-window { position: absolute; bottom: 80px; right: 0; width: 350px; max-width: 88vw; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow-float); display: none; flex-direction: column; overflow: hidden; }
        .ai-window.active { display: flex; animation: slideUp 0.4s var(--transition); }
        .ai-header { background: var(--brand-main); color: #fff; padding: 18px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .ai-messages { height: 320px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: var(--bg-elevated); }
        .ai-msg { padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 85%; line-height: 1.5; }
        .ai-msg.bot { background: var(--bg-surface); color: var(--text-100); align-self: flex-start; border-radius: 14px 14px 14px 0; border: 1px solid var(--glass-border); }
        .ai-msg.user { background: var(--brand-main); color: #fff; align-self: flex-end; border-radius: 14px 14px 0 14px; }

        /* Floating Buy Island */
        .buy-island { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 50px; padding: 8px 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 9000; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .island-buy-btn { flex: 1; height: 50px; border-radius: 50px; background: var(--text-100); color: #fff; font-weight: 900; border: none; cursor: pointer; transition: 0.3s; font-size: 13px; letter-spacing: 1px; }
        .island-buy-btn:hover { background: var(--brand-main); transform: scale(1.02); }
        .island-wa-btn { width: 50px; height: 50px; border-radius: 50%; background: #25D366; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; text-decoration: none; box-shadow: 0 5px 15px rgba(37,211,102,0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Hidden canvas for TikTok Watermark logic */
        #watermark-canvas { display: none; }

        .badge-premium { display: inline-flex; align-items: center; gap: 6px; background: var(--brand-dim); color: var(--brand-main); padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; border: 1px solid var(--brand-glow); }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- MOUNT POINTS -->
    <div id="mount-header"></div>
    <div id="mount-slider"></div>

    <!-- Hidden Canvas for Watermark Generation -->
    <canvas id="watermark-canvas"></canvas>

    <main class="pd-main-grid">
        
        <!-- LEFT: MEDIA -->
        <div class="pd-gallery-container">
            <div class="smart-back-btn" onclick="NX_DETAIL.goBack()">
                <i class="fa-solid fa-chevron-left"></i> Market Inventory
            </div>

            <div class="pd-media-stage" id="media-stage">
                <!-- Content injected via JS -->
            </div>

            <div class="pd-thumbs-track" id="pd-thumbs"></div>
            
            <div style="margin-top:40px; display:flex; gap:15px;">
                <button class="btn btn-outline" style="flex:1; padding:15px; border-radius:15px;" onclick="NX_DETAIL.downloadWithWatermark()">
                    <i class="fa-solid fa-cloud-arrow-down"></i> SAVE PHOTO
                </button>
                <button class="btn btn-outline" style="flex:1; padding:15px; border-radius:15px;" onclick="NX_DETAIL.shareProduct()">
                    <i class="fa-solid fa-share-nodes"></i> SHARE ASSET
                </button>
            </div>
        </div>

        <!-- RIGHT: SPECS -->
        <div class="pd-info">
            <div class="badge-premium" id="pd-cat-badge">SaaS Ecosystem</div>
            <h1 class="pd-title tech-font" id="pd-title">Elite Software License</h1>
            
            <div style="display:flex; gap:15px; font-size:12px; font-weight:800; color:var(--text-300); text-transform:uppercase; margin-bottom:25px;">
                <span><i class="fa-solid fa-barcode"></i> <span id="pd-sku">...</span></span>
                <span><i class="fa-solid fa-eye"></i> <span id="live-users">...</span> WATCHING</span>
            </div>

            <div class="price-card">
                <div class="price-old" id="pd-old-price"></div>
                <div style="display:flex; align-items:flex-end; gap:15px; margin-bottom:25px;">
                    <div class="price-main" id="pd-price">Rs. 0</div>
                    <div id="pd-usd" style="font-size:14px; font-weight:800; color:var(--success); font-family:'JetBrains Mono'; margin-bottom:8px;">$0.00</div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="island-buy-btn" onclick="NX_DETAIL.buyNow()" style="background:var(--brand-main); box-shadow:0 10px 25px var(--brand-glow);">
                        <i class="fa-solid fa-bolt-lightning"></i> BUY SECURELY
                    </button>
                    <button class="island-buy-btn" style="width:60px; flex:none; background:var(--bg-elevated); color:var(--text-100); border:1px solid var(--glass-border);" onclick="NX_DETAIL.addToCart()">
                        <i class="fa-solid fa-cart-plus"></i>
                    </button>
                </div>
            </div>

            <div style="border-top:1px solid var(--glass-border); padding-top:30px;">
                <h3 class="tech-font" style="font-size:18px; margin-bottom:15px; color:var(--brand-main);">DESCRIPTION</h3>
                <div id="pd-desc" style="line-height:1.8; color:var(--text-200); font-size:15px;"></div>
            </div>

            <!-- Related -->
            <div style="margin-top:50px; border-top:1px solid var(--glass-border); padding-top:40px;">
                <h3 class="tech-font" style="font-size:20px; margin-bottom:20px;">RELATED <span class="text-gradient">ASSETS</span></h3>
                <div id="related-assets" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </div>
        </div>

    </main>

    <!-- FLOATING ELEMENTS -->
    <div id="ai-chatbot">
        <div class="ai-fab" id="ai-fab" onclick="NX_DETAIL.toggleAI()">
            <i class="fa-solid fa-robot"></i>
        </div>
        <div class="ai-window" id="ai-window">
            <div class="ai-header">
                <span>Nexra AI Assistant</span>
                <i class="fa-solid fa-xmark" onclick="NX_DETAIL.toggleAI()" style="cursor:pointer;"></i>
            </div>
            <div class="ai-messages" id="ai-msg-box">
                <div class="ai-msg bot">Hi! I am the Nexra AI. I have analyzed this asset. Ask me anything!</div>
            </div>
            <div class="ai-input-area">
                <input type="text" class="ai-input" id="ai-input" placeholder="Is this a lifetime key?">
                <button class="ai-fab" style="width:40px; height:40px; font-size:14px;" onclick="NX_DETAIL.askAI()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="buy-island">
        <div style="padding-left:10px;">
            <div style="font-size:9px; font-weight:800; color:var(--text-300);">TOTAL</div>
            <div id="island-price" style="font-size:15px; font-weight:900;">Rs. 0</div>
        </div>
        <button class="island-buy-btn" onclick="NX_DETAIL.buyNow()">BUY NOW</button>
        <a id="island-wa-link" href="#" target="_blank" class="island-wa-btn"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <script>
        window.NX_DETAIL = {
            state: {
                id: new URLSearchParams(window.location.search).get('id'),
                data: null,
                aiOpen: false,
                aiConfigs: [
                    { model: "google/gemini-flash-1.5:free", key: "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" },
                    { model: "cohere/command-r-plus-08-2024:free", key: "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" }
                ],
                keyIdx: 0
            },

            init: async function() {
                if(!this.state.id) return window.location.href = '../shop/shop.html';
                
                await this.loadUI();
                this.waitForBackend(async () => {
                    await this.fetchProduct();
                    this.simulateLiveActivity();
                    if(window.NexraBrand) window.NexraBrand.refreshDOMAssets();
                });
            },

            waitForBackend: function(cb) {
                const check = setInterval(() => {
                    if(window.db || window.supabaseClient) { clearInterval(check); cb(); }
                }, 100);
            },

            loadUI: async function() {
                const mods = [
                    { id: 'mount-header', path: '../components/header.html' },
                    { id: 'mount-slider', path: '../components/slider.html' }
                ];
                for(const m of mods) {
                    try {
                        const res = await fetch(m.path);
                        if(res.ok) document.getElementById(m.id).innerHTML = await res.text();
                    } catch(e) {}
                }
            },

            fetchProduct: async function() {
                try {
                    let product = null;
                    // Fix: Correct Supabase Table query
                    if(window.supabaseClient) {
                        const { data, error } = await window.supabaseClient.from('products').select('*').eq('id', this.state.id).maybeSingle();
                        if(data) product = data;
                    }
                    if(!product && window.db) {
                        const doc = await db.collection('products').doc(this.state.id).get();
                        if(doc.exists) product = { id: doc.id, ...doc.data() };
                    }

                    if(!product) return window.location.href = 'shop.html';
                    this.state.data = product;
                    this.render();
                } catch(e) { console.error("Fetch Error:", e); }
            },

            render: function() {
                const p = this.state.data;
                document.title = `${p.title} | Nexra PK`;
                document.getElementById('pd-title').innerText = p.title;
                document.getElementById('pd-sku').innerText = p.sku || 'NEX-GEN-ASSET';
                document.getElementById('pd-price').innerText = `Rs. ${p.price.toLocaleString()}`;
                document.getElementById('island-price').innerText = `Rs. ${p.price.toLocaleString()}`;
                document.getElementById('pd-usd').innerText = `$${(p.price / 278).toFixed(2)}`;
                document.getElementById('pd-desc').innerHTML = p.description || 'Verified Nexra Tool.';
                document.getElementById('pd-rating').innerText = p.rating || '5.0';
                document.getElementById('pd-cat-badge').innerText = p.category || 'Digital';

                if(p.oldPrice) document.getElementById('pd-old-price').innerText = `Rs. ${p.oldPrice.toLocaleString()}`;

                const stage = document.getElementById('media-stage');
                const isVid = p.image.endsWith('.mp4');
                stage.innerHTML = isVid ? `<video src="${p.image}" autoplay loop muted playsinline></video>` : `<img id="main-image" src="${p.image}" crossOrigin="anonymous">`;

                // WhatsApp
                const msg = encodeURIComponent(`I want to buy: ${p.title}\nPrice: Rs. ${p.price}\nLink: ${window.location.href}`);
                document.getElementById('island-wa-link').href = `https://wa.me/923000000000?text=${msg}`;

                this.fetchRelated(p.category);
            },

            /* --- TikTok Style Watermark Engine --- */
            downloadWithWatermark: function() {
                const img = document.getElementById('main-image');
                if(!img || img.tagName === 'VIDEO') return alert("Saving video not supported yet.");

                const canvas = document.getElementById('watermark-canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;

                // Draw Base Image
                ctx.drawImage(img, 0, 0);

                // 1. Center Large Watermark (20% Opacity)
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.font = `bold ${canvas.width / 10}px Space Grotesk`;
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.rotate(-Math.PI / 4);
                ctx.fillText("NEXRA TECH PK", 0, 0);
                ctx.restore();

                // 2. Corner Logo (Alpha/Beta Sync)
                const brandLogo = new Image();
                brandLogo.crossOrigin = "anonymous";
                brandLogo.src = window.NexraBrand ? window.NexraBrand.getAsset('logo') : '';
                
                brandLogo.onload = () => {
                    ctx.globalAlpha = 0.6;
                    const lw = canvas.width * 0.15;
                    ctx.drawImage(brandLogo, canvas.width - lw - 20, 20, lw, lw);
                    
                    // Final Export
                    const link = document.createElement('a');
                    link.download = `Nexra_${this.state.data.title}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    if(window.Nexra) Nexra.showToast("Branded Image Saved!", "success");
                };
            },

            shareProduct: function() {
                const p = this.state.data;
                const shareText = `🔥 Check out this Elite Asset on Nexra PK!\n📦 ${p.title}\n💰 Rs. ${p.price}\n\nLink: ${window.location.href}`;
                if(navigator.share) {
                    navigator.share({ title: p.title, text: shareText, url: window.location.href });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Link copied to clipboard!");
                }
            },

            /* --- Triple-AI Engine (Fixed 404) --- */
            askAI: async function() {
                const input = document.getElementById('ai-input');
                const box = document.getElementById('ai-msg-box');
                const q = input.value.trim();
                if(!q) return;

                box.innerHTML += `<div class="ai-msg user">${q}</div>`;
                input.value = '';
                box.scrollTop = box.scrollHeight;

                try {
                    const p = this.state.data;
                    const config = this.state.aiConfigs[this.state.keyIdx];
                    
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${config.key}`,
                            "Content-Type": "application/json",
                            "HTTP-Referer": "https://nexrapk.com",
                            "X-Title": "Nexra PK AI"
                        },
                        body: JSON.stringify({
                            "model": config.model,
                            "messages": [
                                { "role": "system", "content": `You are a professional assistant for Nexra Tech PK. Product: ${p.title}, Price: Rs. ${p.price}, Description: ${p.description}. Keep answers very short and helpful.` },
                                { "role": "user", "content": q }
                            ]
                        })
                    });

                    if(!res.ok) throw new Error("API Error");

                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    box.innerHTML += `<div class="ai-msg bot">${reply}</div>`;
                } catch(e) {
                    this.state.keyIdx = (this.state.keyIdx + 1) % this.state.aiConfigs.length;
                    box.innerHTML += `<div class="ai-msg bot" style="color:red">Switching to backup model... Please re-send.</div>`;
                }
                box.scrollTop = box.scrollHeight;
            },

            toggleAI: function() {
                this.state.aiOpen = !this.state.aiOpen;
                document.getElementById('ai-window').classList.toggle('active', this.state.aiOpen);
                document.getElementById('ai-fab').classList.toggle('active', this.state.aiOpen);
            },

            simulateLiveActivity: function() {
                document.getElementById('live-users').innerText = Math.floor(Math.random() * 25 + 5);
            },

            fetchRelated: async function(cat) {
                const grid = document.getElementById('related-assets');
                try {
                    const snap = await db.collection('products').where('category', '==', cat).limit(4).get();
                    grid.innerHTML = snap.docs.map(doc => {
                        const d = doc.data();
                        return `<div class="pd-thumb" style="width:100%; height:120px;" onclick="window.location.href='?id=${doc.id}'">
                            <img src="${d.image}">
                            <div style="font-size:10px; font-weight:800; padding:5px;">Rs. ${d.price}</div>
                        </div>`;
                    }).join('');
                } catch(e) {}
            },

            goBack: function() { window.location.href = '../shop/shop.html'; },
            buyNow: function() { window.location.href = '../shop/checkout.html?id=' + this.state.id; },
            addToCart: function() { if(window.Nexra) Nexra.showToast("Added to Cart", "success"); }
        };

        window.addEventListener('DOMContentLoaded', () => NX_DETAIL.init());
    </script>
</body>
</html>
