<!-- ==========================================================================
     MODULE: NEXRA TECH PK — FLOATING ISLAND HEADER
     UX/UI: PREMIUM SaaS, GLASSMORPHISM, FULL SVG ICONS
     ========================================================================== -->

<!-- Header Specific CSS -->
<style>
    /* ==========================================================================
       FLOATING ISLAND HEADER WRAPPER
       ========================================================================== */
    .nx-header-wrap {
        position: fixed;
        top: 15px; 
        left: 0;
        width: 100%;
        z-index: 9999;
        padding: 0 4%;
        pointer-events: none; /* Let clicks pass through empty space */
        animation: nx-slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nx-island-nav {
        max-width: 1400px;
        margin: 0 auto;
        background: var(--nav-blur, rgba(255, 255, 255, 0.85));
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border, rgba(0, 0, 0, 0.06));
        border-radius: 50px;
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow-premium, 0 15px 35px rgba(0,0,0,0.08));
        pointer-events: auto; /* Re-enable clicks */
        transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
    }

    [data-theme="dark"] .nx-island-nav {
        background: rgba(12, 12, 18, 0.85);
        border-color: rgba(255, 255, 255, 0.06);
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    /* 1. DYNAMIC LOGO SECTION */
    .nx-logo-sec {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        padding: 4px 14px 4px 4px;
        border-radius: 40px;
        transition: 0.3s ease;
    }
    .nx-logo-sec:hover { background: var(--bg-elevated, #f1f5f9); }
    .nx-logo-sec:active { transform: scale(0.95); }

    .nx-logo-icon {
        width: 40px; height: 40px;
        background: #ffffff;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--glass-border, rgba(0,0,0,0.06));
        box-shadow: 0 4px 15px var(--brand-glow, rgba(255,74,23,0.2));
        overflow: hidden;
        flex-shrink: 0;
    }
    .nx-logo-icon img { width: 100%; height: 100%; object-fit: contain; padding: 4px; transition: 0.3s; }
    
    .nx-title-img { height: 15px; filter: brightness(0); opacity: 0.9; transition: 0.3s; }
    [data-theme="dark"] .nx-title-img { filter: invert(1); }

    /* 2. DYNAMIC DESKTOP NAVIGATION (CENTER) */
    .nx-desktop-links {
        display: none;
        align-items: center;
        gap: 5px;
        background: var(--bg-elevated, #f1f5f9);
        padding: 6px;
        border-radius: 50px;
        border: 1px solid var(--glass-border, rgba(0,0,0,0.06));
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }
    [data-theme="dark"] .nx-desktop-links { background: #16161e; border-color: rgba(255, 255, 255, 0.06); }

    .nx-d-nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-200, #475569);
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 40px;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
    }
    .nx-d-nav-item svg { width: 14px; height: 14px; opacity: 0.7; transition: 0.3s; }
    
    .nx-d-nav-item:hover { color: var(--brand-main, #FF4A17); background: var(--bg-surface, #ffffff); }
    .nx-d-nav-item:hover svg { opacity: 1; transform: scale(1.1); stroke: var(--brand-main, #FF4A17); }
    
    .nx-d-nav-item.active { 
        color: #ffffff; 
        background: var(--brand-main, #FF4A17); 
        box-shadow: 0 5px 15px var(--brand-glow, rgba(255,74,23,0.3)); 
    }
    .nx-d-nav-item.active svg { opacity: 1; stroke: #ffffff; }

    /* Skeleton for Nav */
    .nx-nav-skeleton { width: 80px; height: 35px; border-radius: 40px; background: var(--glass-border, rgba(0,0,0,0.06)); animation: nx-pulse 1.5s infinite; }

    /* 3. ACTION BUTTONS (RIGHT) */
    .nx-actions { display: flex; align-items: center; gap: 8px; }

    .nx-di-btn {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: var(--bg-surface, #ffffff);
        border: 1px solid var(--glass-border, rgba(0,0,0,0.06));
        color: var(--text-100, #0f172a);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
    }
    .nx-di-btn svg { width: 20px; height: 20px; transition: 0.3s; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .nx-di-btn:hover { 
        background: var(--brand-main, #FF4A17); 
        color: #ffffff; 
        border-color: var(--brand-main, #FF4A17); 
        transform: translateY(-2px); 
        box-shadow: 0 5px 15px var(--brand-glow, rgba(255,74,23,0.3)); 
    }

    /* Profile Avatar inside Button */
    .nx-auth-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }

    /* Badges (Notif & Cart) */
    .nx-action-badge {
        position: absolute;
        top: -2px; right: -2px;
        background: var(--danger, #ef4444);
        color: #ffffff;
        font-size: 9px; font-weight: 800;
        width: 18px; height: 18px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid var(--bg-surface, #ffffff);
        box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        opacity: 0; transform: scale(0); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nx-action-badge.show { opacity: 1; transform: scale(1); }
    .nx-cart-badge { background: var(--brand-main, #FF4A17); box-shadow: 0 4px 10px var(--brand-glow, rgba(255,74,23,0.3)); }

    /* 4. THEME COLOR PALETTE (LONG PRESS) */
    .nx-theme-palette {
        position: absolute; top: 70px; right: 20px;
        background: var(--bg-surface, #ffffff);
        border: 1px solid var(--glass-border, rgba(0,0,0,0.06));
        padding: 15px; border-radius: 20px;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        box-shadow: var(--shadow-premium, 0 15px 35px rgba(0,0,0,0.08));
        opacity: 0; visibility: hidden; transform: translateY(10px);
        transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
    }
    .nx-theme-palette.active { opacity: 1; visibility: visible; transform: translateY(0); }
    
    .nx-color-dot {
        width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
        border: 2px solid transparent; transition: 0.2s;
    }
    .nx-color-dot:hover { transform: scale(1.15); border-color: var(--text-100, #0f172a); }

    /* RESPONSIVE LOGIC */
    @media(min-width: 992px) {
        .nx-desktop-links { display: flex; }
        .nx-mobile-menu-btn { display: none !important; }
    }
    @media(max-width: 991px) {
        .nx-hide-mobile { display: none !important; }
    }

    /* Keyframes */
    @keyframes nx-slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes nx-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
</style>

<!-- HTML STRUCTURE -->
<div class="nx-header-wrap">
    <header class="nx-island-nav">
        
        <!-- 1. DYNAMIC BRAND LOGO (Firebase Synced & Smart Refresh) -->
        <div class="nx-logo-sec" id="h-logo-trigger" onclick="NexraHeader.handleLogoClick()">
            <div class="nx-logo-icon">
                <img id="h-logo-img" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            </div>
            <img id="h-title-img" class="nx-title-img" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech">
        </div>
        
        <!-- 2. DYNAMIC NAVIGATION (Firebase Synced) -->
        <nav class="nx-desktop-links" id="h-dynamic-nav">
            <!-- Skeletons for Loading State -->
            <div class="nx-nav-skeleton"></div>
            <div class="nx-nav-skeleton"></div>
            <div class="nx-nav-skeleton"></div>
        </nav>

        <!-- 3. ACTIONS & MODULE TRIGGERS -->
        <div class="nx-actions">
            
            <!-- A. Theme Controller (Click: B&W, Hold: Color Palette) -->
            <div style="position: relative;">
                <button class="nx-di-btn nx-hide-mobile" id="h-theme-btn" aria-label="Theme Controller">
                    <!-- Default SVG: Moon (Will be updated by JS) -->
                    <svg class="nx-theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <!-- Long Press Palette -->
                <div class="nx-theme-palette" id="h-theme-palette">
                    <div class="nx-color-dot" style="background: #FF4A17;" onclick="NexraHeader.setCustomColor('#FF4A17')"></div>
                    <div class="nx-color-dot" style="background: #10b981;" onclick="NexraHeader.setCustomColor('#10b981')"></div>
                    <div class="nx-color-dot" style="background: #3b82f6;" onclick="NexraHeader.setCustomColor('#3b82f6')"></div>
                    <div class="nx-color-dot" style="background: #a855f7;" onclick="NexraHeader.setCustomColor('#a855f7')"></div>
                    <div class="nx-color-dot" style="background: #ec4899;" onclick="NexraHeader.setCustomColor('#ec4899')"></div>
                    <div class="nx-color-dot" style="background: #f59e0b;" onclick="NexraHeader.setCustomColor('#f59e0b')"></div>
                </div>
            </div>

            <!-- B. Notification Center -->
            <button class="nx-di-btn nx-hide-mobile" onclick="Nexra.navTo('notifications')" aria-label="Notifications">
                <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="nx-action-badge" id="h-notif-badge">0</span>
            </button>

            <!-- C. Global Cart / Wallet -->
            <button class="nx-di-btn" onclick="Nexra.ui.toggleCart()" aria-label="Cart">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <span class="nx-action-badge nx-cart-badge show" id="h-cart-badge">0</span>
            </button>

            <!-- D. Profile / Auth System -->
            <button class="nx-di-btn nx-hide-mobile" id="h-profile-btn" onclick="Nexra.navTo('profile')" aria-label="User Profile">
                <svg id="h-profile-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <img id="h-profile-avatar" class="nx-auth-avatar" src="" alt="User">
            </button>

            <!-- E. Sidebar Trigger (Mobile/Tablet Only) -->
            <button class="nx-di-btn nx-mobile-menu-btn" onclick="Nexra.ui.toggleSidebar()" aria-label="Open Sidebar">
                <svg viewBox="0 0 24 24" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

        </div>
    </header>
</div>

<!-- ==========================================================================
     HEADER ENGINE LOGIC (INTEGRATED WITH NEXRA GLOBAL)
     ========================================================================== -->
<script>
    window.NexraHeader = {
        db: null,
        init: function() {
            // Wait for Firebase to initialize from global.html/firebaseconfig.js
            const checkDb = setInterval(() => {
                if(window.firebase && firebase.firestore) {
                    clearInterval(checkDb);
                    this.db = firebase.firestore();
                    this.syncBranding();
                    this.syncNavigation();
                    this.syncNotifications();
                    this.initThemeController();
                    this.monitorAuth();
                    this.updateCartBadge(); // Initial Cart Count
                }
            }, 100);
        },

        // 1. SMART LOGO ACTION (Refresh or Home)
        handleLogoClick: function() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentView = urlParams.get('view') || 'home';
            
            if (currentView === 'home') {
                // Already on Home -> Smart Refresh / Scroll to Top
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if(window.Nexra && typeof window.Nexra.navTo === 'function') {
                    // Re-trigger home to simulate refresh without full reload
                    window.Nexra.navTo('home');
                }
            } else {
                // Navigate to Home
                if(window.Nexra) window.Nexra.navTo('home');
                else window.location.href = 'index.html?view=home';
            }
        },

        // 2. FIREBASE REAL-TIME BRANDING
        syncBranding: function() {
            this.db.collection('settings').doc('appearance').onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    if(data.logoUrl) document.getElementById('h-logo-img').src = data.logoUrl;
                    if(data.titleImgUrl) document.getElementById('h-title-img').src = data.titleImgUrl;
                    
                    // Only apply DB color if user hasn't set a custom one
                    if(data.accentColor && !localStorage.getItem('custom-accent')) {
                        document.documentElement.style.setProperty('--brand-main', data.accentColor);
                    }
                }
            });
        },

        // 3. DYNAMIC NAVIGATION (ADMIN CONTROLLED)
        syncNavigation: function() {
            this.db.collection('settings').doc('homepage').onSnapshot(doc => {
                const navContainer = document.getElementById('h-dynamic-nav');
                if(doc.exists) {
                    const data = doc.data();
                    
                    // Pure SVGs for Desktop Nav
                    const icons = {
                        home: `<svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>`,
                        shop: `<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>`,
                        freebies: `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
                        blog: `<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>`
                    };

                    navContainer.innerHTML = `
                        <div class="nx-d-nav-item" data-view="home" onclick="Nexra.navTo('home')">${icons.home} ${data.navHome || 'Home'}</div>
                        <div class="nx-d-nav-item" data-view="shop" onclick="Nexra.navTo('shop')">${icons.shop} ${data.navShop || 'Market'}</div>
                        <div class="nx-d-nav-item" data-view="freebies" onclick="Nexra.navTo('freebies')">${icons.freebies} ${data.navFreebies || 'Vault'}</div>
                        <div class="nx-d-nav-item" data-view="blog" onclick="Nexra.navTo('blog')">${icons.blog} ${data.navBlog || 'Insights'}</div>
                    `;
                    this.updateActiveTab();
                }
            });
        },

        // 4. THEME CONTROLLER (Click & Long-Press)
        initThemeController: function() {
            const btn = document.getElementById('h-theme-btn');
            if(!btn) return;

            const palette = document.getElementById('h-theme-palette');
            const icon = btn.querySelector('.nx-theme-icon');
            let pressTimer;

            // SVGs
            const svgSun = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
            const svgMoon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

            // Initial Sync
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            icon.innerHTML = isDark ? svgSun : svgMoon;

            // Long Press Logic
            const startPress = () => {
                pressTimer = setTimeout(() => {
                    palette.classList.add('active');
                    window.isPaletteOpen = true;
                }, 600); // 0.6s hold to open colors
            };
            const endPress = () => {
                clearTimeout(pressTimer);
                if(!window.isPaletteOpen) this.toggleBWTheme(icon, svgSun, svgMoon);
                setTimeout(() => window.isPaletteOpen = false, 200);
            };

            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('touchstart', startPress, {passive: true});
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('touchend', endPress);

            // Close palette on outside click
            document.addEventListener('click', (e) => {
                if(!btn.contains(e.target) && !palette.contains(e.target)) {
                    palette.classList.remove('active');
                }
            });

            // Apply saved custom color
            const savedColor = localStorage.getItem('custom-accent');
            if(savedColor) this.setCustomColor(savedColor, true);
        },

        toggleBWTheme: function(icon, svgSun, svgMoon) {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const target = isDark ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('nx-theme', target);
            
            // Switch Icon
            icon.innerHTML = target === 'dark' ? svgSun : svgMoon;
            
            if(window.Nexra && Nexra.ui) Nexra.ui.toast(`Switched to ${target.toUpperCase()} Mode`, 'fa-solid fa-palette');
        },

        setCustomColor: function(color, quiet = false) {
            document.documentElement.style.setProperty('--brand-main', color);
            localStorage.setItem('custom-accent', color);
            document.getElementById('h-theme-palette').classList.remove('active');
            
            if(!quiet && window.Nexra && Nexra.ui) Nexra.ui.toast("Custom Theme Applied", "fa-solid fa-droplet");
        },

        // 5. NOTIFICATION CENTER SYNC (Firebase)
        syncNotifications: function() {
            const badge = document.getElementById('h-notif-badge');
            firebase.auth().onAuthStateChanged(user => {
                if(user) {
                    // Example query: Fetch unread notifications for this user
                    this.db.collection('notifications').limit(5).onSnapshot(snap => {
                        const count = snap.size; // Simulated count
                        if(count > 0) {
                            badge.innerText = count;
                            badge.classList.add('show');
                        } else {
                            badge.classList.remove('show');
                        }
                    });
                } else {
                    badge.classList.remove('show');
                }
            });
        },

        // 6. CART BADGE SYNC (Local Storage)
        updateCartBadge: function(count = null) {
            const badge = document.getElementById('h-cart-badge');
            if(!badge) return;

            let finalCount = count;
            if (finalCount === null) {
                const cartData = JSON.parse(localStorage.getItem('nx-cart') || '[]');
                finalCount = cartData.length;
            }

            badge.innerText = finalCount;
            if(finalCount > 0) {
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        },

        // 7. PROFILE AUTH SYNC (Avatar)
        monitorAuth: function() {
            const icon = document.getElementById('h-profile-icon');
            const avatar = document.getElementById('h-profile-avatar');

            firebase.auth().onAuthStateChanged(user => {
                if (user && user.photoURL) {
                    icon.style.display = 'none';
                    avatar.src = user.photoURL;
                    avatar.style.display = 'block';
                } else {
                    icon.style.display = 'block';
                    avatar.style.display = 'none';
                }
            });
        },

        // 8. ACTIVE TAB SYNC (For SPA Router)
        updateActiveTab: function() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentView = urlParams.get('view') || 'home';
            
            document.querySelectorAll('.nx-d-nav-item').forEach(item => {
                if(item.dataset.view === currentView) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
    };

    // Initialize Header Engine (Waiting for DOM to ensure elements exist)
    setTimeout(() => NexraHeader.init(), 200);

    // Listen for SPA Route Changes to update Active Tab in Desktop Header
    window.addEventListener('popstate', () => NexraHeader.updateActiveTab());

</script>
