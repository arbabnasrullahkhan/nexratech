<!-- ==========================================================================
     NEXRA TECH PK - MASTER GLOBAL CONFIGURATION
     Contains Design System, Brand Identity, and Core JS Helpers
     ========================================================================== -->

<style>
    /* 1. MASTER DESIGN TOKENS (SaaS Standard) */
    :root {
        /* BRAND IDENTITY */
        --brand-main: #FF4A17; 
        --brand-glow: rgba(255, 74, 23, 0.25);
        --brand-surface: #FFF5F2;

        /* LIGHT MODE (DEFAULT PREMIUM) */
        --bg-base: #F8FAFC;
        --bg-surface: #FFFFFF;
        --bg-elevated: #F1F5F9;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(0, 0, 0, 0.06);
        
        /* TEXT SYSTEM */
        --text-100: #0F172A;
        --text-200: #475569;
        --text-300: #94A3B8;
        
        /* UTILS */
        --nav-blur: rgba(255, 255, 255, 0.85);
        --shadow-soft: 0 12px 30px -10px rgba(0,0,0,0.05);
        --shadow-float: 0 25px 50px -12px rgba(0,0,0,0.1);
        --radius-sm: 12px;
        --radius-md: 20px;
        --radius-lg: 32px;
        
        /* STATUS */
        --success: #10B981;
        --warning: #F59E0B;
        --danger: #EF4444;
        --overlay: rgba(255, 255, 255, 0.8);
    }

    /* DARK MODE (CINEMATIC LUXURY) */
    [data-theme="dark"] {
        --bg-base: #020202;
        --bg-surface: #0A0A0A;
        --bg-elevated: #121212;
        --glass-bg: rgba(255, 255, 255, 0.02);
        --glass-border: rgba(255, 255, 255, 0.05);
        --brand-glow: rgba(255, 74, 23, 0.35);
        --text-100: #FFFFFF;
        --text-200: #A1A1AA;
        --text-300: #52525B;
        --nav-blur: rgba(2, 2, 2, 0.85);
        --shadow-soft: 0 20px 40px rgba(0,0,0,0.6);
        --shadow-float: 0 30px 60px rgba(0,0,0,0.8);
        --overlay: rgba(0, 0, 0, 0.8);
    }

    /* GLOBAL CLASS UTILS */
    .tech-font { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.5px; }
    .text-gradient { background: linear-gradient(135deg, var(--brand-main) 0%, #FF8A00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .text-brand { color: var(--brand-main); }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>

<script>
    /**
     * CORE ENGINE EXTENSIONS
     * Integrated with index.html Nexra Object
     */
    
    // Brand Data
    Nexra.brand = {
        name: "Nexra Tech PK",
        icon: "https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png",
        titleImg: "https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg"
    };

    // 1. CORE UTILITIES
    Nexra.utils = {
        // Price Formatter (Rs 1,000)
        formatPrice: (num) => {
            return 'Rs ' + Number(num).toLocaleString();
        },

        // Time Formatter
        formatDate: (timestamp) => {
            if(!timestamp) return '...';
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-PK', { day: 'numeric', month: 'short', year: 'numeric' });
        },

        // Copy to Clipboard
        copy: function(text, msg = "Copied to clipboard!") {
            navigator.clipboard.writeText(text).then(() => {
                Nexra.ui.toast(msg, "fa-solid fa-copy");
            });
        },

        // Image Placeholder (Broken Links Fix)
        handleImgError: function(img) {
            img.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3E%3Cpath d='M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z'/%3E%3C/svg%3E";
            img.onerror = null;
        }
    };

    // 2. AUTHENTICATION HUB (Action-Based)
    Nexra.auth = {
        user: null,
        
        init: function() {
            auth.onAuthStateChanged(user => {
                this.user = user;
                if(user) {
                    this.syncProfile(user);
                }
                // Global Event for profile updates
                document.dispatchEvent(new CustomEvent('nx-auth-changed', { detail: user }));
            });
        },

        syncProfile: async function(user) {
            const docRef = db.collection('users').doc(user.uid);
            const doc = await docRef.get();
            if(!doc.exists) {
                await docRef.set({
                    uid: user.uid,
                    name: user.displayName || 'Ecosystem User',
                    email: user.email,
                    coins: 0,
                    tier: 'Free',
                    createdAt: Date.now()
                });
            }
        },

        // Triggered when clicking Buy/Wallet without login
        requireAuth: function(callback) {
            if(this.user) {
                callback();
            } else {
                Nexra.ui.modal(
                    "Account Required", 
                    "Please connect your Google account to secure your Digital Vault and track orders.", 
                    "fa-solid fa-shield-halved", 
                    "Login with Google", 
                    () => this.loginWithGoogle(callback)
                );
            }
        },

        loginWithGoogle: async function(successCallback) {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const res = await auth.signInWithPopup(provider);
                if(res.user && successCallback) successCallback();
                Nexra.ui.toast("Access Granted", "fa-solid fa-circle-check");
            } catch(e) {
                Nexra.ui.toast("Auth Failed", "fa-solid fa-triangle-exclamation");
            }
        }
    };

    // 3. UI ENGINE (Toasts & Modals)
    Nexra.ui = {
        toast: function(msg, icon = "fa-solid fa-check") {
            const container = document.getElementById('nx-notifications');
            if(!container) return;
            
            const toast = document.createElement('div');
            toast.className = 'premium-toast';
            toast.innerHTML = `<i class="${icon}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        },

        modal: function(title, desc, icon, btnText, callback) {
            const container = document.getElementById('nx-notifications');
            if(!container) return;

            const modal = document.createElement('div');
            modal.className = 'modal-overlay active';
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon"><i class="${icon}"></i></div>
                    <h3 class="tech-font">${title}</h3>
                    <p>${desc}</p>
                    <button class="btn-modal-action">${btnText}</button>
                    <button class="btn-modal-close">Dismiss</button>
                </div>
            `;
            container.appendChild(modal);

            modal.querySelector('.btn-modal-action').onclick = () => {
                modal.remove();
                if(callback) callback();
            };
            modal.querySelector('.btn-modal-close').onclick = () => modal.remove();
        }
    };

    // Ignite Auth
    Nexra.auth.init();
</script>

<style>
    /* GLOBAL COMPONENTS CSS (FOR TOASTS/MODALS) */
    .premium-toast {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: var(--bg-surface); border: 1px solid var(--glass-border);
        padding: 14px 24px; border-radius: 50px; box-shadow: var(--shadow-float);
        display: flex; align-items: center; gap: 12px; z-index: 10000;
        animation: toastUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        font-weight: 700; font-size: 13px; color: var(--text-100);
    }
    .premium-toast i { color: var(--brand-main); font-size: 16px; }
    .premium-toast.fade-out { opacity: 0; transform: translate(-50%, 20px); transition: 0.4s; }

    @keyframes toastUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

    .modal-overlay { position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(10px); z-index: 10001; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--bg-surface); padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--glass-border); width: 90%; max-width: 400px; text-align: center; box-shadow: var(--shadow-float); animation: modalIn 0.4s; }
    .modal-icon { width: 70px; height: 70px; border-radius: 50%; background: var(--brand-surface); color: var(--brand-main); font-size: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .modal-box h3 { font-size: 22px; margin-bottom: 10px; color: var(--text-100); }
    .modal-box p { font-size: 14px; color: var(--text-200); line-height: 1.6; margin-bottom: 30px; }
    
    .btn-modal-action { width: 100%; padding: 16px; border-radius: 50px; border: none; background: var(--brand-main); color: #fff; font-weight: 800; font-family: inherit; cursor: pointer; margin-bottom: 10px; }
    .btn-modal-close { background: none; border: none; font-size: 12px; color: var(--text-300); font-weight: 700; cursor: pointer; }

    @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
</style>
