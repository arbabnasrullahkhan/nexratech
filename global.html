<!-- 
  NEXRA TECH PK - GLOBAL CONFIGURATION
  VERSION: 2.0 (PREMIUM ENTERPRISE)
  DO NOT REMOVE CORE LOGIC
-->

<style>
    /* ==========================================================================
       1. CORE DESIGN SYSTEM (PREMIUM SAAS)
       ========================================================================== */
    :root {
        /* LIGHT MODE (DEFAULT - APPLE STYLE) */
        --bg-base: #f8fafc;
        --bg-surface: #ffffff;
        --bg-elevated: #f1f5f9;
        --glass-bg: rgba(255, 255, 255, 0.8);
        --glass-border: rgba(0, 0, 0, 0.06);
        --brand-main: #FF4A17; 
        --brand-glow: rgba(255, 74, 23, 0.2);
        --text-100: #0f172a;
        --text-200: #475569;
        --text-300: #94a3b8;
        --nav-blur: rgba(255, 255, 255, 0.9);
        --shadow-soft: 0 12px 30px -10px rgba(0,0,0,0.04);
        --shadow-float: 0 25px 50px -12px rgba(0,0,0,0.08);
        --radius-sm: 12px;
        --radius-md: 22px;
        --radius-lg: 32px;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --overlay: rgba(255, 255, 255, 0.85);
        --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
        /* DARK MODE (CINEMATIC LUXURY) */
        --bg-base: #050507;
        --bg-surface: #0c0c12;
        --bg-elevated: #16161e;
        --glass-bg: rgba(12, 12, 18, 0.7);
        --glass-border: rgba(255, 255, 255, 0.05);
        --text-100: #ffffff;
        --text-200: #a1a1aa;
        --text-300: #52525b;
        --nav-blur: rgba(5, 5, 7, 0.85);
        --shadow-soft: 0 20px 40px rgba(0,0,0,0.4);
        --shadow-float: 0 30px 60px rgba(0,0,0,0.6);
        --overlay: rgba(0, 0, 0, 0.85);
    }

    /* TYPOGRAPHY UTILS */
    .text-gradient { 
        background: linear-gradient(135deg, var(--brand-main) 0%, #ff8a00 100%); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
    }
    
    /* GLASSMORPHISM 2.0 */
    .glass-card { 
        background: var(--glass-bg); 
        backdrop-filter: blur(20px); 
        -webkit-backdrop-filter: blur(20px); 
        border: 1px solid var(--glass-border); 
        border-radius: var(--radius-md); 
        box-shadow: var(--shadow-soft); 
        transition: var(--transition); 
    }

    /* PREMIUM SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--text-300); border-radius: 10px; }
</style>

<script>
    /* ==========================================================================
       2. GLOBAL ENGINE (NEXRA CORE)
       ========================================================================== */
    
    window.Nexra = {
        // Core State
        state: {
            isLoaded: false,
            currentView: 'home',
            adsEnabled: true
        },

        // Initialize Global Logic
        initGlobal: function() {
            console.log("🚀 Nexra Global Engine Initialized");
            this.syncBrandSettings();
            this.handleAdsterra();
        },

        /* --- 1. BRAND SETTINGS SYNC (FROM FIRESTORE) --- */
        syncBrandSettings: function() {
            if(!window.db) return;
            
            db.collection('settings').doc('appearance').onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    if(data.accentColor) {
                        document.documentElement.style.setProperty('--brand-main', data.accentColor);
                    }
                    // Update Page Title and Logo globally if needed
                }
            });
        },

        /* --- 2. ADSTERRA DYNAMIC LOADER --- */
        // ایڈسٹیرا کے اسکرپٹس کو یہاں سے ہینڈل کیا جائے گا
        handleAdsterra: function() {
            if(!this.state.adsEnabled) return;

            db.collection('settings').doc('ads').get().then(doc => {
                if(doc.exists) {
                    const ads = doc.data();
                    // اگر ایڈمن پینل سے اسکرپٹ موجود ہے تو اسے باڈی میں شامل کریں
                    if(ads.global_header_script) {
                        this.injectScript(ads.global_header_script);
                    }
                }
            });
        },

        injectScript: function(htmlString) {
            const div = document.createElement('div');
            div.innerHTML = htmlString.trim();
            Array.from(div.querySelectorAll("script")).forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                document.body.appendChild(newScript);
            });
        },

        /* --- 3. PREMIUM UI NOTIFICATIONS (TOASTS) --- */
        showToast: function(msg, type = 'success') {
            const container = document.getElementById('toast-stack');
            if(!container) return;

            const toast = document.createElement('div');
            toast.className = `toast-message ${type}`;
            
            // SVG Icons based on type
            const icons = {
                success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
                error: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
                info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`
            };

            toast.innerHTML = `
                <div class="toast-icon">${icons[type]}</div>
                <div class="toast-text">${msg}</div>
            `;

            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        },

        /* --- 4. DATA FETCHING HELPER (ABSTRACTION) --- */
        // تمام پیجز اس فنکشن کو ڈیٹا لینے کے لیے استعمال کریں گے
        fetchData: async function(collection, limit = 10) {
            try {
                const snapshot = await db.collection(collection).limit(limit).get();
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                this.showToast("Database Connection Error", "error");
                return [];
            }
        }
    };

    // Auto-run on load
    window.addEventListener('DOMContentLoaded', () => Nexra.initGlobal());
</script>

<!-- TOAST STACK CONTAINER -->
<div id="toast-stack" style="position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 100005; pointer-events: none; display: flex; flex-direction: column; gap: 10px;"></div>

<style>
    /* Toast Styling */
    .toast-message {
        background: var(--nav-blur);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        padding: 12px 20px;
        border-radius: 50px;
        box-shadow: var(--shadow-float);
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        animation: toastSlideUp 0.5s var(--transition) forwards;
    }
    .toast-message.success .toast-icon { color: var(--success); }
    .toast-message.error .toast-icon { color: var(--danger); }
    .toast-message.info .toast-icon { color: var(--brand-main); }
    
    .toast-icon svg { width: 18px; height: 18px; }
    .toast-text { font-size: 13px; font-weight: 700; color: var(--text-100); }
    .toast-message.fade-out { opacity: 0; transform: translateY(10px); transition: 0.5s; }

    @keyframes toastSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
