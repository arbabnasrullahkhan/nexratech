 <!-- ==========================================================================
     NEXRA PK - GLOBAL CORE (global.html)
     Contains: Theme Variables, Global UI (Cart, Modals, Toasts) & Core JS Engine
     Optimized for: 90% Mobile, 3% Tablet, 7% Desktop
     ========================================================================== -->

<!-- 1. GLOBAL CSS & THEME SYSTEM -->
<style>
    /* Premium SaaS Design Tokens */
    :root {
        /* Light Mode Default */
        --bg-base: #f8fafc;
        --bg-surface: #ffffff;
        --bg-elevated: #f1f5f9;
        
        --text-100: #0f172a;
        --text-200: #475569;
        --text-300: #94a3b8;
        
        --brand-main: #FF4A17; 
        --brand-glow: rgba(255, 74, 23, 0.25);
        --brand-dim: rgba(255, 74, 23, 0.1);
        
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;

        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(0, 0, 0, 0.06);
        --overlay: rgba(255, 255, 255, 0.85);
        
        --shadow-soft: 0 10px 30px -10px rgba(0,0,0,0.06);
        --shadow-float: 0 25px 50px -12px rgba(0,0,0,0.15);
        
        --radius-sm: 12px;
        --radius-md: 20px;
        --radius-lg: 32px;
        
        --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        --font-body: 'Plus Jakarta Sans', sans-serif;
        --font-heading: 'Space Grotesk', sans-serif;
    }

    /* Dark Mode (Cinematic Luxury) */
    [data-theme="dark"] {
        --bg-base: #020202;
        --bg-surface: #0a0a0a;
        --bg-elevated: #121212;
        
        --text-100: #ffffff;
        --text-200: #a1a1aa;
        --text-300: #52525b;
        
        --glass-bg: rgba(20, 20, 20, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --overlay: rgba(0, 0, 0, 0.85);
        
        --shadow-soft: 0 20px 40px rgba(0,0,0,0.5);
        --shadow-float: 0 30px 60px rgba(0,0,0,0.8);
    }

    /* Global Reset & Utilities */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { background-color: var(--bg-base); color: var(--text-100); font-family: var(--font-body); transition: background-color var(--transition), color var(--transition); }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    button { font-family: inherit; border: none; background: none; cursor: pointer; }
    
    .tech-font { font-family: var(--font-heading); letter-spacing: -0.5px; }
    .text-brand { color: var(--brand-main); }
    .text-gradient { background: linear-gradient(135deg, var(--brand-main) 0%, #ff8a00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .container { padding: 0 5%; max-width: 1350px; margin: 0 auto; width: 100%; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }

    /* Premium Buttons */
    .btn { padding: 16px 32px; border-radius: 50px; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); }
    .btn-primary { background: var(--brand-main); color: #fff; box-shadow: 0 8px 25px var(--brand-glow); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 35px var(--brand-glow); }
    .btn-outline { background: var(--bg-surface); color: var(--text-100); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); }
    .btn-outline:hover { background: var(--bg-elevated); border-color: var(--brand-main); transform: translateY(-2px); }

    /* SPA Routing Classes */
    .spa-view { display: none; opacity: 0; padding: 120px 0; min-height: 100vh; animation: viewEnter 0.5s var(--transition) forwards; }
    .spa-view.active { display: block; }
    @keyframes viewEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; background: var(--bg-surface); border: 1px dashed var(--glass-border); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; }
    .empty-icon { font-size: 45px; color: var(--brand-main); margin-bottom: 20px; opacity: 0.9; }

    /* ==========================================================================
       GLOBAL UI: TOASTS, MODALS, CART (MOBILE FIRST)
       ========================================================================== */
    
    /* 1. Toast Notifications */
    #global-toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
    .nx-toast { background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 16px 24px; border-radius: 50px; color: var(--text-100); font-size: 13px; font-weight: 700; box-shadow: var(--shadow-float); display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: slideDownToast 0.4s var(--transition) forwards; }
    .nx-toast.hide { animation: slideUpToast 0.4s var(--transition) forwards; }
    @keyframes slideDownToast { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpToast { to { opacity: 0; transform: translateY(-20px); } }

    /* 2. Custom Secure Modal */
    .nx-modal-overlay { position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(10px); z-index: 99999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: var(--transition); padding: 20px; }
    .nx-modal-overlay.active { opacity: 1; visibility: visible; }
    .nx-modal-box { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 40px 30px; border-radius: var(--radius-lg); width: 100%; max-width: 420px; transform: scale(0.95) translateY(20px); opacity: 0; transition: var(--transition); box-shadow: var(--shadow-float); text-align: center; }
    .nx-modal-overlay.active .nx-modal-box { transform: scale(1) translateY(0); opacity: 1; }
    .nx-modal-icon { width: 70px; height: 70px; border-radius: 50%; background: var(--brand-dim); color: var(--brand-main); font-size: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

    /* 3. Cart Drawer (Mobile Bottom Sheet / Desktop Side Panel) */
    .nx-cart-overlay { position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(5px); z-index: 9999; opacity: 0; visibility: hidden; transition: var(--transition); }
    .nx-cart-overlay.active { opacity: 1; visibility: visible; }
    
    /* Mobile First: Bottom Sheet */
    .nx-cart-drawer { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 85vh; background: var(--bg-surface); z-index: 10000; padding: 30px 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -20px 50px rgba(0,0,0,0.15); transition: var(--transition); display: flex; flex-direction: column; border-top: 1px solid var(--glass-border); }
    .nx-cart-drawer.active { bottom: 0; }
    
    /* Desktop: Slide from Right */
    @media(min-width: 768px) {
        .nx-cart-drawer { bottom: auto; top: 0; right: -450px; left: auto; width: 420px; height: 100vh; max-height: 100vh; border-radius: 0; border-top: none; border-left: 1px solid var(--glass-border); box-shadow: -20px 0 50px rgba(0,0,0,0.15); }
        .nx-cart-drawer.active { right: 0; }
    }

    .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--bg-base); border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 12px; }
    .cart-item-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: var(--bg-elevated); }
    .cart-del-btn { width: 35px; height: 35px; border-radius: 50%; background: rgba(239,68,68,0.1); color: var(--danger); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .cart-del-btn:hover { background: var(--danger); color: #fff; }
</style>

<!-- 2. GLOBAL UI HTML COMPONENTS -->

<!-- Toast Container -->
<div id="global-toast-container"></div>

<!-- Secure Action Modal -->
<div class="nx-modal-overlay" id="global-modal">
    <div class="nx-modal-box">
        <div class="nx-modal-icon"><i id="modal-icon-class" class="fa-solid fa-shield-halved"></i></div>
        <h2 class="tech-font" id="modal-title" style="font-size: 24px; margin-bottom: 15px;">System Alert</h2>
        <p id="modal-desc" style="color: var(--text-200); font-size: 14px; margin-bottom: 30px; line-height: 1.6;">Processing request...</p>
        <button class="btn btn-primary" id="modal-action-btn" style="width: 100%;">ACKNOWLEDGE</button>
    </div>
</div>

<!-- Smart Cart Drawer -->
<div class="nx-cart-overlay" id="cart-overlay" onclick="NexraApp.toggleCart()"></div>
<div class="nx-cart-drawer" id="cart-drawer">
    <!-- Mobile Drag Handle -->
    <div style="width: 40px; height: 5px; background: var(--glass-border); border-radius: 10px; margin: -10px auto 20px; display: block;"></div>
    
    <div class="flex-between" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; margin-bottom: 20px;">
        <h3 class="tech-font" style="font-size: 22px;"><i class="fa-solid fa-bag-shopping text-brand"></i> YOUR CART</h3>
        <button class="btn-outline flex-center" onclick="NexraApp.toggleCart()" style="width:40px; height:40px; border-radius:50%; padding:0;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <div id="cart-items-container" style="flex: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;">
        <div class="empty-state" style="border:none; padding:40px 10px; background:transparent;">
            <i class="fa-solid fa-basket-shopping empty-icon" style="font-size:40px;"></i>
            <h4 class="tech-font">Cart is Empty</h4>
            <p style="font-size:13px; color:var(--text-200); margin-top:10px;">Explore the market to add tools.</p>
        </div>
    </div>
    
    <div style="border-top: 1px solid var(--glass-border); padding-top: 20px;">
        <div class="flex-between" style="margin-bottom: 20px; font-size: 18px; font-weight: 800; font-family: var(--font-heading);">
            <span>SUBTOTAL:</span>
            <span class="text-brand" id="cart-drawer-total">Rs. 0</span>
        </div>
        <button class="btn btn-primary" onclick="NexraApp.checkoutProceed()" style="width: 100%; padding: 20px;"><i class="fa-solid fa-lock"></i> SECURE CHECKOUT</button>
    </div>
</div>

<!-- 3. CORE JAVASCRIPT ENGINE -->
<script>
    /* ==========================================================
       NEXRA CORE ENGINE (Guest First, Action-Based Auth)
       ========================================================== */
    
    // 1. Safe Firebase Initialization
    const firebaseConfig = {
        apiKey: "AIzaSyDeNZBtVQ5iX5PjV5Gj4xXgxqB3KaJ4cZw",
        authDomain: "nexrapk.firebaseapp.com",
        projectId: "nexrapk",
        storageBucket: "nexrapk.firebasestorage.app",
        messagingSenderId: "958761878252",
        appId: "1:958761878252:web:099246eb11de0e08755bc9"
    };

    if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    // 2. Global App Object
    window.NexraApp = {
        db: typeof firebase !== 'undefined' ? firebase.firestore() : null,
        auth: typeof firebase !== 'undefined' ? firebase.auth() : null,
        user: null,
        cart: [],
        
        init: function() {
            this.loadLocalCart();
            if(this.auth) {
                this.auth.onAuthStateChanged(user => {
                    this.user = user;
                    // Trigger custom event for Profile Module (when it loads)
                    window.dispatchEvent(new CustomEvent('NexraAuthStateChanged', { detail: user }));
                });
            }
        },

        // --- UI HELPERS ---
        showToast: function(message, iconClass = "fa-solid fa-check") {
            const container = document.getElementById('global-toast-container');
            if(!container) return;
            
            const toast = document.createElement('div');
            toast.className = 'nx-toast';
            toast.innerHTML = `<i class="${iconClass}" style="color:var(--brand-main); font-size:16px;"></i> <span style="flex:1;">${message}</span>`;
            
            container.appendChild(toast);
            
            // Mobile Haptic Feedback (if supported)
            if(navigator.vibrate) navigator.vibrate(50);

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        },

        showModal: function(title, desc, iconClass, btnText, actionCallback) {
            const overlay = document.getElementById('global-modal');
            if(!overlay) return;
            
            document.getElementById('modal-icon-class').className = iconClass;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            
            const btn = document.getElementById('modal-action-btn');
            btn.innerText = btnText;
            btn.onclick = () => {
                overlay.classList.remove('active');
                if(typeof actionCallback === 'function') actionCallback();
            };
            
            overlay.classList.add('active');
        },

        // --- ROUTING ENGINE (SPA) ---
        navTo: function(viewId, documentId = null) {
            // Hide all views
            document.querySelectorAll('.spa-view').forEach(v => v.classList.remove('active'));
            
            // Handle Navigation Dock Active States (Will connect with nav.html)
            document.querySelectorAll('.nx-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll(`[data-target="${viewId}"]`).forEach(btn => btn.classList.add('active'));
            
            // Show Target View
            const targetView = document.getElementById(`view-${viewId}`);
            if(targetView) {
                targetView.classList.add('active');
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
            
            // Close sidebar/cart if open
            const sb = document.getElementById('sidebar-drawer');
            if(sb) sb.classList.remove('active');
            const overlay = document.getElementById('sidebar-overlay');
            if(overlay) overlay.classList.remove('active');
            
            // Execute module specific init functions if they exist in window
            const initFunc = `init_${viewId.replace(/-/g, '_')}`;
            if(typeof window[initFunc] === 'function') {
                window[initFunc](documentId);
            }
        },

        // --- CART SYSTEM ---
        loadLocalCart: function() {
            const saved = localStorage.getItem('nx_cart');
            if(saved) {
                this.cart = JSON.parse(saved);
                this.updateCartUI();
            }
        },
        
        saveLocalCart: function() {
            localStorage.setItem('nx_cart', JSON.stringify(this.cart));
        },

        addToCart: function(e, id, title, price, image, type) {
            if(e) e.stopPropagation();
            
            // Prevent duplicate SaaS/Digital keys
            if(this.cart.find(i => i.id === id && i.type === 'digital')) {
                this.showToast("Item already in cart!", "fa-solid fa-triangle-exclamation");
                return;
            }

            this.cart.push({ id, title, price: Number(price), image, type });
            this.saveLocalCart();
            this.updateCartUI();
            
            this.showToast(`${title} added to Vault Cart`, "fa-solid fa-cart-arrow-down");
            // Auto open cart on mobile for immediate feedback
            if(window.innerWidth < 768) this.toggleCart(true);
        },

        removeFromCart: function(index) {
            this.cart.splice(index, 1);
            this.saveLocalCart();
            this.updateCartUI();
            this.showToast("Item removed.", "fa-solid fa-trash");
        },

        updateCartUI: function() {
            // Update Badges in Navigation (To be created in nav.html)
            document.querySelectorAll('.nx-cart-badge').forEach(b => b.innerText = this.cart.length);
            
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-drawer-total');
            if(!container) return;
            
            if(this.cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="border:none; background:transparent;">
                        <i class="fa-solid fa-basket-shopping empty-icon" style="font-size:40px;"></i>
                        <h4 class="tech-font">Cart is Empty</h4>
                        <p style="font-size:13px; color:var(--text-200); margin-top:10px;">Explore the market to add tools.</p>
                    </div>`;
                if(totalEl) totalEl.innerText = 'Rs. 0';
                return;
            }
            
            container.innerHTML = '';
            let subtotal = 0;
            
            this.cart.forEach((item, index) => {
                subtotal += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
                            <img src="${item.image}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/50'"/>
                            <div style="flex:1; min-width:0;">
                                <div style="font-size:13px; font-weight:700; color:var(--text-100); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</div>
                                <div style="font-size:13px; color:var(--brand-main); font-weight:800; margin-top:4px;">Rs. ${item.price}</div>
                            </div>
                        </div>
                        <button class="cart-del-btn" onclick="NexraApp.removeFromCart(${index})"><i class="fa-solid fa-trash" style="font-size:12px;"></i></button>
                    </div>`;
            });
            
            if(totalEl) totalEl.innerText = `Rs. ${subtotal}`;
        },

        toggleCart: function(forceShow = false) {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            if(!drawer || !overlay) return;
            
            if(forceShow || !drawer.classList.contains('active')) {
                drawer.classList.add('active');
                overlay.classList.add('active');
            } else {
                drawer.classList.remove('active');
                overlay.classList.remove('active');
            }
        },

        // Action-Based Auth Trigger
        checkoutProceed: function() {
            this.toggleCart(false);
            if(this.cart.length === 0) {
                this.showToast("Your cart is empty!", "fa-solid fa-triangle-exclamation");
                return;
            }
            
            if(!this.user) {
                // Trigger Guest Lock
                this.showModal(
                    "Account Required", 
                    "To securely deliver digital assets to your Vault, please connect your account first.", 
                    "fa-solid fa-shield-halved", 
                    "LOGIN TO CONTINUE", 
                    () => { this.navTo('profile'); } // Navigates to auth screen
                );
            } else {
                this.navTo('checkout');
            }
        },

        // --- THEME ENGINE ---
        toggleTheme: function() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if(isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('nexra_theme', 'light');
                document.getElementById('meta-theme-color').setAttribute('content', '#f8fafc');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('nexra_theme', 'dark');
                document.getElementById('meta-theme-color').setAttribute('content', '#020202');
            }
            // Update icons in nav.html
            document.querySelectorAll('.theme-icon-toggle').forEach(icon => {
                icon.className = isDark ? 'fa-solid fa-moon theme-icon-toggle' : 'fa-solid fa-sun theme-icon-toggle';
            });
        }
    };

    // Initialize Global App once DOM is ready
    window.addEventListener('DOMContentLoaded', () => {
        NexraApp.init();
    });

</script>
