    <!-- 2. PREMIUM ASSETS PRELOAD -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- 3. FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <!-- 4. CORE ENGINE CSS -->
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.15);
            --brand-soft: rgba(255, 74, 23, 0.08);
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            --radius-md: 24px;
            --radius-lg: 40px;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; }

        /* TOP PROGRESS LOADER */
        #top-loader { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 200000; pointer-events: none; opacity: 0; }
        #top-loader-fill { height: 100%; width: 0; background: var(--brand-main); box-shadow: 0 0 15px var(--brand-main); transition: width 0.4s ease, opacity 0.4s; }

        /* ELITE SPLASH INTERFACE */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }
        .splash-glow { position: absolute; width: 60vw; height: 60vw; background: var(--brand-main); filter: blur(140px); opacity: 0.08; border-radius: 50%; animation: pulseGlow 5s infinite alternate; }
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .sp-logo { width: clamp(80px, 20vw, 100px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); }
        .sp-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); }
        [data-theme="dark"] .sp-title { filter: none; }
        
        .sp-progress-box { width: 200px; margin-top: 60px; text-align: center; }
        .sp-bar { width: 100%; height: 2px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.3s ease; }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* SPA VIEW PORT */
        #spa-main { width: 100%; min-height: 100vh; opacity: 1; transition: opacity 0.4s var(--transition), transform 0.4s var(--transition); }
        .view-hidden { opacity: 0 !important; transform: translateY(10px); }

        /* MAINTENANCE MODE */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-base); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md);
        }

        /* ANIMATIONS */
        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
    </style>
</head>
<body>

    <!-- TOP-LEVEL UI -->
    <div id="top-loader"><div id="top-loader-fill"></div></div>
    
    <!-- SYSTEM MOUNT POINTS -->
    <div id="global-logic-container"></div>
    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <!-- 1. SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            <img class="sp-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech PK Branding">
            
            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Synchronizing Ecosystem...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">© 2026 Nexra Tech PK</div>
    </div>

    <!-- 2. MAINTENANCE LAYER -->
    <div id="maintenance">
        <div class="m-card">
            <div style="width: 80px; height: 80px; background: var(--brand-soft); color: var(--brand-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 30px; border: 1px solid var(--brand-glow);">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <h1 style="font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; margin-bottom: 15px;">System Optimization</h1>
            <p style="color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px;">Our engineers are fine-tuning the platform for elite performance. We will be back online in a moment.</p>
            <div id="m-socials" style="display:flex; justify-content:center; gap:15px;"></div>
        </div>
    </div>

    <!-- 3. SPA VIEW PORT (The Content Engine) -->
    <main id="spa-main"></main>

    <!-- 4. PERSISTENT UI -->
    <div id="footer-container"></div>
    <div id="dock-container"></div>
    <div id="ui-notifications-container"></div>

    <!-- 5. JAVASCRIPT ENGINE (SMART PROJECT ROUTER) -->
    <script src="firebaseconfig.js"></script>
    <script>
        window.Nexra = {
            db: null,
            
            // PROJECT DIRECTORY ARCHITECTURE MAPPING
            routes: {
                '/': 'discovery/home.html',
                '/home': 'discovery/home.html',
                '/community': 'discovery/community-feed.html',
                '/onboarding': 'discovery/onboarding.html',
                '/search': 'discovery/search-results.html',
                '/shop': 'shop/shop.html',
                '/product': 'shop/product-detail.html',
                '/checkout': 'shop/checkout.html',
                '/bundle': 'shop/bundle-builder.html',
                '/success': 'shop/checkout-success.html',
                '/track': 'shop/order-tracking.html',
                '/receipt': 'shop/order-receipt.html',
                '/freebies': 'freebies/freebies.html',
                '/freebie': 'freebies/freebie-detail.html',
                '/giveaway': 'freebies/giveaway-live.html',
                '/blog': 'academy/blog.html',
                '/article': 'academy/blog-detail.html',
                '/auth': 'user/auth-gate.html',
                '/profile': 'user/profile-dashboard.html',
                '/vault': 'user/user-vault.html',
                '/wallet': 'user/user-wallet.html',
                '/wishlist': 'user/user-wishlist.html',
                '/reseller': 'reseller/reseller-landing.html',
                '/reseller-dashboard': 'reseller/reseller-dashboard.html',
                '/vip': 'vip/vip-tiers.html',
                '/vip-dashboard': 'vip/vip-dashboard.html',
                '/support': 'support/support-hub.html',
                '/404': 'system/error-404.html',
                '/about': 'system/about.html',
                '/policies': 'system/policies.html'
            },

            /* --- 1. SPA ROUTER WITH DEEP-LINK RESTORATION --- */
            navTo: async function(path, params = {}, pushState = true) {
                const loader = document.getElementById('top-loader-fill');
                const loaderParent = document.getElementById('top-loader');
                const main = document.getElementById('spa-main');
                
                // Route Resolution
                const basePath = path.startsWith('/') ? path : '/' + path;
                const fileToLoad = this.routes[basePath] || this.routes['/404'];

                // Start Loading UI
                loaderParent.style.opacity = '1';
                loader.style.width = '40%';
                main.classList.add('view-hidden');

                try {
                    const response = await fetch(fileToLoad);
                    if(!response.ok) throw new Error("Module Fetch Failed");
                    const html = await response.text();
                    
                    loader.style.width = '80%';

                    setTimeout(() => {
                        main.innerHTML = html;
                        
                        // Executive Script Injection
                        const scripts = main.querySelectorAll('script');
                        scripts.forEach(s => {
                            const newScript = document.createElement('script');
                            if (s.src) {
                                newScript.src = s.src;
                            } else {
                                newScript.text = s.innerHTML;
                            }
                            document.body.appendChild(newScript).parentNode.removeChild(newScript);
                        });

                        // Dynamic URL Restoration (Clean Path)
                        if (pushState) {
                            let cleanUrl = basePath;
                            const query = new URLSearchParams(params).toString();
                            if (query) cleanUrl += '?' + query;
                            window.history.pushState({ path: basePath, params: params }, '', cleanUrl);
                        }

                        // Complete Animation
                        loader.style.width = '100%';
                        main.classList.remove('view-hidden');
                        
                        setTimeout(() => {
                            loaderParent.style.opacity = '0';
                            setTimeout(() => loader.style.width = '0', 400);
                        }, 300);

                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 400);

                } catch(e) {
                    console.error("Router Breach:", e);
                    loaderParent.style.opacity = '0';
                    if(basePath !== '/404') this.navTo('/404', {}, false);
                }
            },

            /* --- 2. THE BOOT ENGINE --- */
            boot: async function() {
                // Initialize Theme Memory
                const savedTheme = localStorage.getItem('theme') || 'light';
                if(savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');

                // Step 1: Firebase Bridge
                fill.style.width = '30%';
                status.innerText = "Connecting to Firebase Cloud...";

                const checkFirebase = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFirebase);
                        this.db = firebase.firestore();
                        
                        fill.style.width = '60%';
                        status.innerText = "Mounting Project Modules...";
                        
                        // Concurrent Module Loading
                        await this.mountSharedModules();

                        status.innerText = "Restoring Session...";
                        try {
                            const config = await this.db.collection('splash_settings').doc('config').get();
                            const data = config.exists ? config.data() : {};

                            if(data.maintenance_mode) {
                                this.showMaintenance(data);
                            } else {
                                this.launch();
                            }
                        } catch(e) { this.launch(); }
                    }
                }, 100);
            },

            /* --- 3. DYNAMIC REDIRECT & LAUNCHER --- */
            launch: async function() {
                const splash = document.getElementById('splash');
                document.getElementById('sp-fill').style.width = '100%';
                document.getElementById('sp-status').innerText = "Access Granted";

                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        
                        // PARSE DEEP LINKS & EXTERNAL REFERRALS
                        const urlParams = new URLSearchParams(window.location.search);
                        const currentPath = window.location.pathname;
                        
                        // Priority 1: Direct Path (Clean URLs)
                        let targetView = this.routes[currentPath] ? currentPath : '/';
                        
                        // Priority 2: Query View (Fallback/Ads)
                        if(urlParams.has('view')) targetView = '/' + urlParams.get('view');

                        // Collect all current Params (ID, Ref, Campaign)
                        const params = {};
                        urlParams.forEach((val, key) => params[key] = val);

                        this.navTo(targetView, params, false);
                    }, 800);
                }, 600);
            },

            /* --- 4. PROJECT MODULE CONTEXT MAPPING --- */
            mountSharedModules: async function() {
                const modules = [
                    { id: 'global-logic-container', file: 'global.html' },
                    { id: 'header-container', file: 'header.html' },
                    { id: 'footer-container', file: 'footer.html' },
                    { id: 'dock-container', file: 'navigation.html' },
                    { id: 'ui-notifications-container', file: 'ui-notifications.html' }
                ];
                
                await Promise.all(modules.map(async (m) => {
                    try {
                        const res = await fetch(m.file);
                        if(res.ok) {
                            const container = document.getElementById(m.id);
                            container.innerHTML = await res.text();
                            // Script safety
                            const scripts = container.querySelectorAll('script');
                            scripts.forEach(s => {
                                const newScript = document.createElement('script');
                                newScript.text = s.innerHTML;
                                document.body.appendChild(newScript).parentNode.removeChild(newScript);
                            });
                        }
                    } catch(e) { console.warn(`Module ${m.file} is missing in root.`); }
                }));
            },

            showMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);
            }
        };

        // GLOBAL LINK INTERCEPTOR (SPA Connectivity)
        document.addEventListener('click', e => {
            const el = e.target.closest('a');
            if(el && el.href.startsWith(window.location.origin) && !el.hasAttribute('download') && el.target !== '_blank') {
                e.preventDefault();
                const url = new URL(el.href);
                const path = url.pathname;
                const params = {};
                url.searchParams.forEach((v, k) => params[k] = v);
                window.Nexra.navTo(path, params);
            }
        });

        // Browser Navigation Persistence
        window.onpopstate = (e) => {
            if(e.state && e.state.path) window.Nexra.navTo(e.state.path, e.state.params, false);
            else window.location.reload();
        };

        // Boot System
        document.addEventListener('DOMContentLoaded', () => Nexra.boot());
        
        // Offline Detection UX
        window.addEventListener('offline', () => Nexra.showToast ? Nexra.showToast("Connection Lost. Working Offline.", "warning") : null);
        window.addEventListener('online', () => Nexra.showToast ? Nexra.showToast("Connection Restored.", "success") : null);
    </script>
</body>
</html>
