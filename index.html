    <!-- ==========================================================================
         4. SPLASH SCREEN STYLES (PREMIUM UI/UX)
         ========================================================================== -->
    <style>
        :root {
            /* Fallback Colors (Dynamically overridden by JS based on Edition) */
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.15);
            --brand-soft: rgba(255, 74, 23, 0.05);
            
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            --radius-lg: 40px;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; min-height: 100vh; }
        
        .tech-font { font-family: 'Space Grotesk', sans-serif; }

        /* --- THE SPLASH INTERFACE --- */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }
        
        .splash-glow {
            position: absolute; width: 60vw; height: 60vw; background: var(--brand-main);
            filter: blur(140px); opacity: 0.08; border-radius: 50%; 
            animation: pulseGlow 5s infinite alternate; pointer-events: none;
        }
        
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        
        /* DYNAMIC LOGOS (Loaded via NexraBrand) */
        .nx-brand-logo { width: clamp(80px, 20vw, 110px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); animation: logoFloat 4s ease-in-out infinite; }
        .nx-brand-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); }
        [data-theme="dark"] .nx-brand-title { filter: none; }
        
        /* Security Badge */
        .sp-secure-badge {
            margin-top: 20px; display: inline-flex; align-items: center; gap: 8px;
            background: var(--brand-soft); color: var(--brand-main);
            padding: 6px 16px; border-radius: 50px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid var(--brand-glow);
        }

        /* Progress Engine */
        .sp-progress-box { width: 240px; margin-top: 50px; text-align: center; }
        .sp-bar { width: 100%; height: 3px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.3s ease; box-shadow: 0 0 10px var(--brand-main); }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* --- THE MAINTENANCE / ERROR INTERFACE --- */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-surface); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md); position: relative; overflow: hidden;
        }
        .m-icon { 
            width: 80px; height: 80px; background: var(--brand-soft); color: var(--brand-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 30px; border: 1px solid var(--brand-glow);
            animation: pulseGlow 2s infinite alternate;
        }
        .m-title { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .m-desc { color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        /* Animations */
        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <!-- 1. SPLASH SCREEN (SMART GATEWAY) -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            
            <!-- Dynamic Brand Assets (Controlled by NexraBrand in firebaseconfig.js) -->
            <img class="nx-brand-logo sp-logo" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Nexra Logo">
            <img class="nx-brand-title sp-title" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Nexra Tech PK">
            
            <div class="sp-secure-badge">
                <i class="fa-solid fa-shield-halved"></i> Enterprise Hybrid Ecosystem
            </div>

            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Core Architecture...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">Engineered by Nexra Tech PK</div>
    </div>

    <!-- 2. MAINTENANCE / ERROR OVERLAY -->
    <div id="maintenance">
        <div class="m-card">
            <div class="m-icon" id="m-icon-box">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <h1 class="m-title" id="m-title">Optimizing Ecosystem</h1>
            <p class="m-desc" id="m-desc">Our engineers are fine-tuning the platform for elite performance. We will be back online in a moment.</p>
            <div id="m-socials" style="display:flex; justify-content:center; gap:15px; margin-top:20px;"></div>
        </div>
    </div>

    <!-- ==========================================================================
         5. MASTER BOOTLOADER & DEEP-LINK ROUTER SCRIPT
         ========================================================================== -->
    <script>
        /**
         * NEXRA MASTER BOOTLOADER
         * Role: Initializes UI branding, connects to DB, parses URL, and securely redirects to the standalone page.
         */
        window.NexraGateway = {
            
            // Central Configuration
            config: {
                targetRoute: 'home',
                targetParams: ''
            },

            /* --- 1. UI PROGRESS & BRANDING --- */
            updateProgress: function(percent, message) {
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');
                if(fill) fill.style.width = percent + '%';
                if(status) status.innerText = message;
            },

            initTheme: function() {
                const saved = localStorage.getItem('theme') || 'light';
                if(saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            },

            /* --- 2. THE BOOT SEQUENCE --- */
            boot: async function() {
                this.initTheme();
                this.updateProgress(10, "Mounting Branding Assets...");

                // Wait for the Centralized Brand Config (firebaseconfig.js) to load
                const checkConfig = setInterval(async () => {
                    if (window.NexraBrand && window.NexraRoutes) {
                        clearInterval(checkConfig);
                        
                        // Apply dynamic branding instantly to the Splash Screen
                        window.NexraBrand.refreshDOMAssets();
                        document.documentElement.style.setProperty('--brand-main', window.NexraBrand.assets[window.NexraBrand.activeEdition].themeColor);

                        this.updateProgress(30, "Syncing Dual-Database Architecture...");
                        this.connectDatabases();
                    }
                }, 50);
            },

            /* --- 3. DATABASE CONNECTION CHECK --- */
            connectDatabases: function() {
                const checkDb = setInterval(async () => {
                    // We wait for Firebase (Auth/NoSQL) and Supabase (PostgreSQL) to be available
                    if (window.db && window.supabaseClient) {
                        clearInterval(checkDb);
                        
                        this.updateProgress(60, "Verifying System Integrity...");
                        
                        try {
                            // Check Maintenance Status from Firestore
                            const configSnap = await window.db.collection('splash_settings').doc('config').get();
                            const data = configSnap.exists ? configSnap.data() : {};

                            if (data.maintenance_mode) {
                                this.showMaintenance(data);
                            } else {
                                this.parseDeepLinksAndLaunch();
                            }
                        } catch(e) { 
                            console.warn("[Nexra Gateway] Config fetch failed. Launching anyway.");
                            this.parseDeepLinksAndLaunch(); 
                        }
                    }
                }, 100);
            },

            /* --- 4. SMART DEEP-LINK ROUTER --- */
            parseDeepLinksAndLaunch: function() {
                this.updateProgress(85, "Resolving Secure Route...");

                // Parse the URL. We support two formats:
                // Format 1: nexrapk.com/?view=product&id=123 (Query based)
                // Format 2: nexrapk.com/product/123 (Path based - requires server redirect rules to point to index.html)
                
                const urlParams = new URLSearchParams(window.location.search);
                const pathSegments = window.location.pathname.split('/').filter(Boolean);

                let requestedRoute = 'home';
                let queryString = window.location.search; // Preserve UTMs, Ref codes, etc.

                // If Query Parameter exists (e.g. ?view=blog)
                if (urlParams.has('view')) {
                    requestedRoute = urlParams.get('view');
                } 
                // Else if Path exists (e.g. /blog)
                else if (pathSegments.length > 0 && pathSegments[0] !== 'index.html') {
                    requestedRoute = pathSegments[0];
                    // Append ID to query if it's a deep path (e.g., /product/123 -> ?id=123)
                    if (pathSegments.length > 1) {
                        const newParams = new URLSearchParams(queryString);
                        newParams.set('id', pathSegments[1]);
                        queryString = '?' + newParams.toString();
                    }
                }

                this.config.targetRoute = requestedRoute;
                this.config.targetParams = queryString;

                this.updateProgress(100, "Gateway Open. Redirecting...");
                
                // Cinematic Hold before Redirect
                setTimeout(() => this.executeRedirect(), 800);
            },

            /* --- 5. REDIRECT EXECUTION --- */
            executeRedirect: function() {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.1)';

                // Generate the definitive physical file URL using the Route Registry
                const finalUrl = window.NexraRoutes.generateURL(this.config.targetRoute, this.config.targetParams);

                setTimeout(() => {
                    // HARD REDIRECT TO THE STANDALONE PAGE
                    window.location.href = finalUrl;
                }, 600); // Wait for fade out animation
            },

            /* --- 6. ERROR & MAINTENANCE HANDLER --- */
            showMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);

                if (data.m_title) document.getElementById('m-title').innerText = data.m_title;
                if (data.m_desc) document.getElementById('m-desc').innerText = data.m_desc;
            }
        };

        // --- IGNITE GATEWAY ---
        document.addEventListener('DOMContentLoaded', () => window.NexraGateway.boot());
    </script>
</body>
