<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Nexra Tech PK - Elite Digital Ecosystem">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>

    <!-- Favicon -->
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">

    <!-- Fonts: Plus Jakarta for SaaS feel & Space Grotesk for Tech branding -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- SVG Library (FontAwesome for consistent SVGs) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDKs (v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        /* ==========================================================================
           1. NEXRA DESIGN SYSTEM (PRODUCTION READY)
           ========================================================================== */
        :root {
            /* GLOBAL BRAND COLORS */
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.2);
            
            /* LIGHT THEME (DEFAULT) */
            --bg-base: #FFFFFF;
            --bg-surface: #F8FAFC;
            --bg-elevated: #FFFFFF;
            --text-100: #0F172A;
            --text-200: #475569;
            --text-300: #94A3B8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --shadow-premium: 0 10px 40px rgba(0, 0, 0, 0.04);
            --radius-md: 20px;
            --radius-lg: 32px;
        }

        [data-theme="dark"] {
            --bg-base: #020202;
            --bg-surface: #0A0A0A;
            --bg-elevated: #111111;
            --text-100: #FFFFFF;
            --text-200: #A1A1AA;
            --text-300: #52525B;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html {
            width: 100%; height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-100);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* Prevent scrolling during splash */
            transition: background-color 0.4s ease;
        }

        /* ==========================================================================
           2. ENTERPRISE SPLASH SCREEN (MOBILE-FIRST)
           ========================================================================== */
        #nx-splash {
            position: fixed; inset: 0; z-index: 100000;
            background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .splash-bg-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.08; z-index: 0; filter: blur(5px); }
        .splash-glow { position: absolute; width: 60vw; height: 60vw; background: var(--brand-main); filter: blur(120px); opacity: 0.1; border-radius: 50%; z-index: 1; animation: pulseGlow 4s infinite alternate; }

        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; padding: 0 30px; }
        
        .splash-logo { width: 90px; height: auto; filter: drop-shadow(0 15px 30px var(--brand-glow)); margin-bottom: 25px; animation: floatLogo 4s ease-in-out infinite; }
        .splash-title { height: 20px; opacity: 0.9; margin-bottom: 50px; }
        [data-theme="dark"] .splash-title { filter: invert(1); }

        .splash-loader-box { width: 100%; max-width: 240px; }
        .splash-bar { width: 100%; height: 3px; background: var(--glass-border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .splash-fill { width: 0%; height: 100%; background: var(--brand-main); box-shadow: 0 0 15px var(--brand-main); transition: width 0.4s ease; }
        .splash-status-row { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 1px; }

        .splash-powered { position: absolute; bottom: 40px; font-size: 9px; font-weight: 800; color: var(--text-300); letter-spacing: 4px; }

        /* ==========================================================================
           3. MAINTENANCE SCREEN (OVERLAY)
           ========================================================================== */
        #maintenance-screen {
            position: fixed; inset: 0; z-index: 100001;
            background: var(--bg-base); display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .m-card { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 50px 30px; border-radius: var(--radius-lg); text-align: center; max-width: 500px; box-shadow: var(--shadow-premium); }
        .m-title { font-family: 'Space Grotesk'; font-size: 28px; margin: 20px 0 10px; color: var(--brand-main); }
        .m-desc { font-size: 15px; color: var(--text-200); line-height: 1.6; margin-bottom: 30px; }
        .m-socials { display: flex; gap: 15px; justify-content: center; }
        .m-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--bg-base); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-100); transition: 0.3s; }

        /* ==========================================================================
           4. MAIN APP SHELL
           ========================================================================== */
        #nx-app-shell { display: none; opacity: 0; height: 100vh; flex-direction: column; }
        #nx-app-shell.ready { display: flex; opacity: 1; transition: opacity 0.5s ease; }

        #spa-main {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding-top: 75px; padding-bottom: 95px; /* Mobile safe-areas */
        }

        /* ROUTE TRANSITION LOADER */
        #nx-route-loader {
            position: fixed; inset: 0; z-index: 9000;
            background: var(--bg-base); display: none;
            align-items: center; justify-content: center;
        }
        #nx-route-loader.active { display: flex; }
        .route-ring { width: 40px; height: 40px; border: 3px solid var(--glass-border); border-top-color: var(--brand-main); border-radius: 50%; animation: spin 0.8s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulseGlow { from { transform: scale(1); opacity: 0.1; } to { transform: scale(1.2); opacity: 0.2; } }
    </style>
</head>
<body>

    <!-- 1. INTEGRATED SPLASH SYSTEM -->
    <div id="nx-splash">
        <div id="splash-media-container"></div>
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra" class="splash-logo">
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech" class="splash-title">
            
            <div class="splash-loader-box">
                <div class="splash-bar"><div class="splash-fill" id="sp-fill"></div></div>
                <div class="splash-status-row">
                    <span id="sp-status">Initializing Ecosystem...</span>
                    <span id="sp-pct">0%</span>
                </div>
            </div>
        </div>
        <div class="splash-powered">POWERED BY NEXRA TECH PK</div>
    </div>

    <!-- 2. MAINTENANCE OVERLAY -->
    <div id="maintenance-screen">
        <div class="m-card">
            <div style="font-size: 50px; color: var(--brand-main);"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1 class="m-title" id="m-title">Optimizing System</h1>
            <p class="m-desc" id="m-desc">We are upgrading our digital vault for a better experience. We'll be back online in a moment.</p>
            <div class="m-socials" id="m-socials"></div>
        </div>
    </div>

    <!-- 3. MASTER APP SHELL -->
    <div id="nx-app-shell">
        <!-- Persistent Navigation (Loaded from navigation.html) -->
        <div id="nx-header"></div>

        <!-- Dynamic SPA View -->
        <main id="spa-main"></main>

        <!-- Persistent Bottom Dock (Loaded from navigation.html) -->
        <div id="nx-dock"></div>

        <!-- Global Overlays (Toasts, Modals) -->
        <div id="nx-notifications"></div>

        <!-- Transition Loader -->
        <div id="nx-route-loader"><div class="route-ring"></div></div>
    </div>

    <script>
        /**
         * NEXRA MASTER ENGINE v3.0
         * Handles Booting, Firebase Handshake, Maintenance, and SPA Routing.
         */
        window.Nexra = {
            // Configuration & Routes
            routes: {
                'home': 'discovery/home.html',
                'shop': 'shop/shop.html',
                'product': 'shop/product-detail.html',
                'freebies': 'freebies/freebies.html',
                'freebie-detail': 'freebies/freebie-detail.html',
                'blog': 'academy/blog.html',
                'blog-detail': 'academy/blog-detail.html',
                'profile': 'user/profile-dashboard.html',
                'checkout': 'shop/checkout.html',
                'giveaway': 'freebies/giveaway-live.html',
                'vip': 'vip/vip-tiers.html',
                'reseller': 'reseller/reseller-landing.html'
            },

            // 1. BOOT SEQUENCE
            async boot() {
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');
                const pct = document.getElementById('sp-pct');

                const updateProgress = (p, msg) => {
                    fill.style.width = p + '%';
                    pct.innerText = p + '%';
                    status.innerText = msg;
                };

                updateProgress(20, "Verifying Connection...");

                // Set Initial Theme
                const theme = localStorage.getItem('nx-theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);

                try {
                    // Start Global Config Load (Firebase Initialization)
                    // We'll create global.html in the next step
                    updateProgress(40, "Syncing with Cloud...");
                    
                    // Check Maintenance via Firebase (Placeholder until global.html exists)
                    // if(maintenance) { this.showMaintenance(data); return; }

                    updateProgress(70, "Assembling UI...");
                    await this.loadComponent('nx-header', 'navigation.html'); // Navigation & Dock
                    await this.loadComponent('nx-notifications', 'ui-notifications.html');

                    updateProgress(100, "System Ready");

                    // Handle Deep Links
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetView = urlParams.get('view') || 'home';
                    const targetId = urlParams.get('id') || null;

                    // Finalize Transition
                    setTimeout(() => {
                        const splash = document.getElementById('nx-splash');
                        splash.style.opacity = '0';
                        setTimeout(() => {
                            splash.style.display = 'none';
                            document.getElementById('nx-app-shell').classList.add('ready');
                            document.body.style.overflow = 'auto';
                            this.navTo(targetView, targetId);
                        }, 800);
                    }, 500);

                } catch(e) {
                    console.error("Boot Error:", e);
                    updateProgress(100, "Proceeding in Fallback Mode...");
                }
            },

            // 2. SPA ROUTER
            async navTo(view, id = null) {
                const main = document.getElementById('spa-main');
                const loader = document.getElementById('nx-route-loader');
                const file = this.routes[view] || 'system/error-404.html';

                loader.classList.add('active');

                // Update URL
                const newUrl = id ? `?view=${view}&id=${id}` : `?view=${view}`;
                window.history.pushState({view, id}, '', newUrl);

                try {
                    const response = await fetch(file);
                    if(!response.ok) throw new Error("404");
                    const html = await response.text();

                    main.style.opacity = '0';
                    setTimeout(() => {
                        main.innerHTML = html;
                        this.executeScripts(main);
                        main.style.opacity = '1';
                        loader.classList.remove('active');
                        main.scrollTo({top: 0, behavior: 'smooth'});
                    }, 300);

                } catch(e) {
                    main.innerHTML = `<div style="padding:100px 30px; text-align:center;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:40px; color:var(--brand-main);"></i>
                        <h2 style="margin-top:20px;">Module ${view} Loading...</h2>
                        <p style="color:var(--text-300); font-size:13px; margin-top:10px;">This file will be integrated in the next development step.</p>
                    </div>`;
                    loader.classList.remove('active');
                }
            },

            // 3. UTILITIES
            async loadComponent(id, file) {
                try {
                    const res = await fetch(file);
                    if(res.ok) {
                        const html = await res.text();
                        document.getElementById(id).innerHTML = html;
                    }
                } catch(e) { console.warn(`Component ${file} pending creation.`); }
            },

            executeScripts(container) {
                const scripts = container.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            },

            showMaintenance(data) {
                document.getElementById('nx-splash').style.display = 'none';
                const m = document.getElementById('maintenance-screen');
                m.style.display = 'flex';
                if(data.title) document.getElementById('m-title').innerText = data.title;
                if(data.desc) document.getElementById('m-desc').innerText = data.desc;
            }
        };

        // Initialize Engine
        window.addEventListener('DOMContentLoaded', () => Nexra.boot());
        window.onpopstate = (e) => e.state && Nexra.navTo(e.state.view, e.state.id);
    </script>
</body>
</html>
