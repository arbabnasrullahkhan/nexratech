<!-- --- START OF FILE index.html --- -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- 1. META & SEO CORE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>
    
    <!-- Meta Theme & SEO -->
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="description" content="Pakistan's elite digital marketplace for automated software licensing and premium SaaS solutions.">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Nexra Tech PK | Digital Ecosystem">
    <meta property="og:description" content="Automated digital assets and premium software licensing.">
    <meta property="og:image" content="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">

    <!-- 2. PREMIUM TYPOGRAPHY & ICONS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- 3. FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- 4. CORE DESIGN SYSTEM -->
    <style>
        :root {
            /* LIGHT THEME (DEFAULT) */
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.15);
            --brand-soft: rgba(255, 74, 23, 0.08);
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            --radius-md: 24px;
            --radius-lg: 40px;
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); 
            color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* TOP LOADER (Apple Style) */
        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            z-index: 200000; pointer-events: none; opacity: 0;
        }
        #top-loader-fill {
            height: 100%; width: 0; background: var(--brand-main);
            box-shadow: 0 0 15px var(--brand-main);
            transition: width 0.3s ease, opacity 0.3s;
        }

        /* PREMIUM SPLASH INTERFACE */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }
        .splash-glow {
            position: absolute; width: 60vw; height: 60vw; background: var(--brand-main);
            filter: blur(140px); opacity: 0.08; border-radius: 50%; animation: pulseGlow 5s infinite alternate;
        }
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .sp-logo { width: clamp(80px, 20vw, 100px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); animation: floatLogo 4s ease-in-out infinite; }
        .sp-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); transition: filter 0.5s; }
        [data-theme="dark"] .sp-title { filter: none; }
        
        .sp-progress-box { width: 220px; margin-top: 60px; text-align: center; }
        .sp-bar { width: 100%; height: 3px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.4s ease; box-shadow: 0 0 10px var(--brand-glow); }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* MAINTENANCE INTERFACE */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-base); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md);
        }
        .m-icon { 
            width: 80px; height: 80px; background: var(--brand-soft); color: var(--brand-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 30px; border: 1px solid var(--brand-glow);
        }
        .m-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .m-desc { color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        /* SPA MAIN CONTAINER */
        #spa-main { 
            width: 100%; min-height: 100vh; opacity: 1; padding-top: 100px;
            transition: opacity 0.4s var(--transition), transform 0.4s var(--transition); 
        }
        .view-hidden { opacity: 0 !important; transform: translateY(15px); }

        /* UTILS */
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <!-- 1. TOP-LEVEL UI (LOADER) -->
    <div id="top-loader"><div id="top-loader-fill"></div></div>

    <!-- 2. GLOBAL UI MOUNTS (Header, Footer, Nav, Notifications) -->
    <div id="header-mount"></div> 
    <div id="nav-mount"></div> 
    <div id="notif-mount"></div>

    <!-- 3. SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" id="splash-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            <img class="sp-title" id="splash-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech PK">
            
            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Core...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">Engineered by Arbab Nasrullah</div>
    </div>

    <!-- 4. MAINTENANCE LAYER -->
    <div id="maintenance">
        <div class="m-card">
            <div class="m-icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1 class="m-title" id="m-title">Optimizing Ecosystem</h1>
            <p class="m-desc" id="m-desc">Our engineers are fine-tuning the platform for elite performance. We will be back online in a moment.</p>
        </div>
    </div>

    <!-- 5. SPA VIEW PORT (Where pages load) -->
    <main id="spa-main"></main>

    <div id="footer-mount"></div> 

    <!-- 6. FIREBASE & JAVASCRIPT MASTER ENGINE -->
    <script src="firebaseconfig.js"></script>
    <script>
        window.Nexra = {
            db: null,
            auth: null,
            user: null,
            currentRoute: null,
            currentId: null, // Stores deep link IDs
            state: { theme: 'light' },

            // ROUTE MAP (Maps clean URL params to actual folders)
            routes: {
                'home': 'discovery/home.html',
                'shop': 'shop/shop.html',
                'product-detail': 'shop/product-detail.html',
                'checkout': 'shop/checkout.html',
                'checkout-success': 'shop/checkout-success.html',
                'bundle': 'shop/bundle-builder.html',
                'freebies': 'freebies/freebies.html',
                'freebie-detail': 'freebies/freebie-detail.html',
                'giveaway': 'freebies/giveaway-live.html',
                'blog': 'academy/blog.html',
                'blog-detail': 'academy/blog-detail.html',
                'profile': 'user/profile-dashboard.html',
                'auth': 'user/auth-gate.html',
                'vip': 'vip/vip-tiers.html',
                'vip-hub': 'vip/vip-dashboard.html',
                'reseller': 'reseller/reseller-landing.html',
                'reseller-hub': 'reseller/reseller-dashboard.html',
                'support': 'support/support-hub.html',
                'about': 'system/about.html',
                'policies': 'system/policies.html',
                '404': 'system/error-404.html'
            },

            /* --- 1. BOOT SEQUENCE --- */
            boot: async function() {
                this.initTheme();
                this.updateSplash(20, "Connecting to Cloud...");

                const checkFirebase = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFirebase);
                        this.db = firebase.firestore();
                        this.auth = firebase.auth();
                        
                        this.updateSplash(50, "Fetching Ecosystem Data...");
                        
                        try {
                            // Check Maintenance Mode
                            const configSnap = await this.db.collection('splash_settings').doc('config').get();
                            const data = configSnap.exists ? configSnap.data() : {};

                            if(data.maintenance_mode) {
                                this.showMaintenance(data);
                            } else {
                                // Start fetching external Global UI files
                                await this.loadSharedUI();
                                
                                // Listen to User State globally
                                this.auth.onAuthStateChanged(user => {
                                    this.user = user;
                                    // Update Header Profile Icon if loaded
                                    if(window.NXR && window.NXR.setUser) window.NXR.setUser(user);
                                });

                                this.updateSplash(90, "Preparing Interface...");
                                this.launch();
                            }
                        } catch(e) { 
                            console.error("Boot Error:", e);
                            await this.loadSharedUI();
                            this.launch(); 
                        }
                    }
                }, 100);
            },

            updateSplash: function(percent, text) {
                document.getElementById('sp-fill').style.width = percent + '%';
                document.getElementById('sp-status').innerText = text;
            },

            /* --- 2. LOAD SHARED MODULES (HEADER/FOOTER) --- */
            loadSharedUI: async function() {
                const modules = [
                    { id: 'header-mount', file: 'header.html' },
                    { id: 'nav-mount', file: 'navigation.html' },
                    { id: 'notif-mount', file: 'ui-notifications.html' },
                    { id: 'footer-mount', file: 'footer.html' }
                ];
                
                await Promise.all(modules.map(async (m) => {
                    try {
                        const res = await fetch(m.file);
                        if(res.ok) {
                            const html = await res.text();
                            document.getElementById(m.id).innerHTML = html;
                            this.executeScripts(document.getElementById(m.id));
                        }
                    } catch(e) { console.warn("Failed to load module:", m.file); }
                }));
            },

            /* --- 3. THE SPA ROUTER (PREMIUM LINKS) --- */
            navTo: async function(view, id = null) {
                this.currentRoute = view;
                this.currentId = id; // Store ID globally so child pages can read it

                const loader = document.getElementById('top-loader-fill');
                const loaderParent = document.getElementById('top-loader');
                const main = document.getElementById('spa-main');
                
                // UX: Start Top Loader
                loaderParent.style.opacity = '1';
                loader.style.width = '30%';
                main.classList.add('view-hidden');

                const path = this.routes[view] || this.routes['404'];

                try {
                    const response = await fetch(path);
                    if(!response.ok) throw new Error("404");
                    
                    loader.style.width = '60%';
                    const html = await response.text();

                    setTimeout(() => {
                        main.innerHTML = html;
                        loader.style.width = '90%';
                        
                        // Execute internal JS of the loaded page
                        this.executeScripts(main);

                        // Finalize Animation
                        loader.style.width = '100%';
                        main.classList.remove('view-hidden');
                        
                        setTimeout(() => {
                            loaderParent.style.opacity = '0';
                            setTimeout(() => loader.style.width = '0', 300);
                        }, 400);

                        // PREMIUM DEEP LINKING UPDATE (e.g., ?p=shop)
                        const newUrl = `?p=${view}${id ? '&id='+id : ''}`;
                        window.history.pushState({view, id}, '', newUrl);
                        window.scrollTo({ top: 0, behavior: 'smooth' });

                        // Sync Active states in Navigation if NXR exists
                        if(window.NXR && window.NXR.navigate) window.NXR.navigate(view, true); // true = sync only, don't trigger fetch again

                    }, 300);

                } catch(e) {
                    console.error("Router Error:", e);
                    this.navTo('404');
                }
            },

            /* --- 4. SCRIPT EXECUTOR --- */
            executeScripts: function(container) {
                const scripts = container.querySelectorAll('script');
                scripts.forEach(s => {
                    const newScript = document.createElement('script');
                    if(s.src) newScript.src = s.src;
                    else newScript.text = s.innerHTML;
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                });
            },

            /* --- 5. FINALIZE LAUNCH & READ DEEP LINKS --- */
            launch: function() {
                this.updateSplash(100, "Ready.");
                const splash = document.getElementById('splash');
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        
                        // Read URL Parameters (Deep Link logic)
                        const params = new URLSearchParams(window.location.search);
                        const target = params.get('p') || params.get('view') || 'home';
                        const targetId = params.get('id');
                        
                        this.navTo(target, targetId);
                    }, 800);
                }, 500);
            },

            initTheme: function() {
                const saved = localStorage.getItem('nxr-theme') || 'light';
                if(saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            },

            showMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);

                if(data.m_title) document.getElementById('m-title').innerText = data.m_title;
                if(data.m_desc) document.getElementById('m-desc').innerText = data.m_desc;
            }
        };

        // Ignite System
        document.addEventListener('DOMContentLoaded', () => Nexra.boot());

        // Handle Browser Back/Forward Buttons
        window.onpopstate = (event) => {
            const params = new URLSearchParams(window.location.search);
            const view = params.get('p') || params.get('view') || 'home';
            const id = params.get('id');
            Nexra.navTo(view, id);
        };
    </script>
</body>
</html>
<!-- --- END OF FILE index.html --- -->
