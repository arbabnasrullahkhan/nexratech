<!-- --- START OF FILE index.html --- -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- 1. META & SEO CORE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>
    
    <!-- Meta Theme & SEO -->
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="description" content="Pakistan's elite digital marketplace for automated software licensing and premium SaaS solutions.">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- 2. PREMIUM TYPOGRAPHY -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- 3. FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- 4. CORE DESIGN SYSTEM -->
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.15);
            --brand-soft: rgba(255, 74, 23, 0.08);
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            --radius-md: 24px;
            --radius-lg: 40px;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); 
            color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; /* Prevent scroll on root splash */
            height: 100vh;
        }

        /* PREMIUM SPLASH INTERFACE */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s var(--transition), transform 0.6s var(--transition);
        }
        .splash-glow {
            position: absolute; width: 60vw; height: 60vw; background: var(--brand-main);
            filter: blur(140px); opacity: 0.08; border-radius: 50%; animation: pulseGlow 5s infinite alternate;
        }
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .sp-logo { width: clamp(80px, 20vw, 100px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); }
        .sp-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); transition: 0.3s; }
        [data-theme="dark"] .sp-title { filter: none; }
        
        .sp-progress-box { width: 200px; margin-top: 60px; text-align: center; }
        .sp-bar { width: 100%; height: 2px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.4s ease; }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* MAINTENANCE INTERFACE */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-base); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md);
        }
        .m-icon { 
            width: 80px; height: 80px; background: var(--brand-soft); color: var(--brand-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 30px; border: 1px solid var(--brand-glow);
        }
        .m-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .m-desc { color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
    </style>
</head>
<body>

    <!-- 1. SPLASH SCREEN (ROOT ENTRY) -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            <img class="sp-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech PK">
            
            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Cloud...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">Powered by Nexra Tech PK</div>
    </div>

    <!-- 2. MAINTENANCE LAYER -->
    <div id="maintenance">
        <div class="m-card">
            <div class="m-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.7a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.7z"></path></svg>
            </div>
            <h1 class="m-title" id="m-title-text">Optimizing Ecosystem</h1>
            <p class="m-desc" id="m-desc-text">Our engineers are fine-tuning the platform for elite performance. We will be back online in a moment.</p>
        </div>
    </div>

    <!-- 3. ROOT GATEWAY SCRIPT -->
    <script src="firebaseconfig.js"></script>
    <script>
        window.NexraRoot = {
            db: null,

            // 1. Theme Check (Avoid Flash of White)
            initTheme: function() {
                const saved = localStorage.getItem('nxr-theme') || 'light';
                if(saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            },

            // 2. Multi-Page Routing Function (HTML href location)
            navTo: function(view, id = null) {
                // Map logical views to actual HTML file paths
                const routes = {
                    'home': 'discovery/home.html',
                    'shop': 'shop/shop.html',
                    'freebies': 'freebies/freebies.html',
                    'blog': 'academy/blog.html',
                    'profile': 'user/profile-dashboard.html',
                    'reseller': 'reseller/reseller-landing.html',
                    'vip': 'vip/vip-tiers.html',
                    'checkout': 'shop/checkout.html'
                };

                let targetFile = routes[view] || routes['home'];
                if (id) {
                    targetFile += `?id=${id}`;
                }

                // Standard Redirect (Not SPA fetch)
                window.location.href = targetFile;
            },

            // 3. Boot Sequence (Splash -> Firebase -> Redirect)
            boot: function() {
                this.initTheme();
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');

                fill.style.width = '30%';
                status.innerText = "Syncing Firebase...";

                const checkFirebase = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFirebase);
                        this.db = firebase.firestore();
                        
                        fill.style.width = '70%';
                        status.innerText = "Authenticating System...";
                        
                        try {
                            const config = await this.db.collection('splash_settings').doc('config').get();
                            const data = config.exists ? config.data() : {};

                            if(data.maintenance_mode === true) {
                                this.showMaintenance(data);
                            } else {
                                this.launch();
                            }
                        } catch(e) { 
                            console.error("Firebase fetch error:", e);
                            this.launch(); // Fallback launch if db read fails
                        }
                    }
                }, 100);
            },

            // 4. Launch to Home.html
            launch: function() {
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');
                const splash = document.getElementById('splash');

                fill.style.width = '100%';
                status.innerText = "Entering Ecosystem...";

                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    
                    setTimeout(() => {
                        // Check if a specific deep link was requested (e.g., site.com/?view=shop)
                        const params = new URLSearchParams(window.location.search);
                        const target = params.get('view') || 'home';
                        const targetId = params.get('id');

                        // REDIRECT TO ACTUAL HTML FILE
                        this.navTo(target, targetId);
                    }, 600);
                }, 800);
            },

            // 5. Maintenance UI
            showMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);

                if(data.m_title) document.getElementById('m-title-text').innerText = data.m_title;
                if(data.m_desc) document.getElementById('m-desc-text').innerText = data.m_desc;
            }
        };

        // Start Boot Process
        document.addEventListener('DOMContentLoaded', () => NexraRoot.boot());
    </script>
</body>
</html>
<!-- --- END OF FILE index.html --- -->
