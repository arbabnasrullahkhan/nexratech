<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- 1. META & SEO CORE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>
    
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="description" content="Pakistan's elite digital marketplace for automated software licensing and premium SaaS solutions.">
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- 2. PREMIUM TYPOGRAPHY & ICONS -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- 3. FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        /* ── 4. CORE DESIGN SYSTEM ── */
        :root {
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.22);
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.14);
            --radius-lg: 40px;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; }

        /* ── 5. TOP LOADER (Apple Style) ── */
        #top-loader { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 200000; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
        #top-loader-fill { height: 100%; width: 0; background: var(--brand-main); box-shadow: 0 0 15px var(--brand-main); transition: width 0.4s ease; }

        /* ── 6. CINEMATIC SPLASH ── */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }
        .splash-glow { position: absolute; width: 60vw; height: 60vw; background: var(--brand-main); filter: blur(140px); opacity: 0.08; border-radius: 50%; animation: pulseGlow 5s infinite alternate; }
        .sp-logo { width: clamp(80px, 20vw, 100px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); animation: floatLogo 4s infinite ease-in-out; }
        .sp-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); }
        [data-theme="dark"] .sp-title { filter: none; }
        .sp-bar { width: 200px; height: 2px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-top: 50px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.4s ease; }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; margin-top: 12px; }

        /* ── 7. MAINTENANCE & OFFLINE ── */
        #maintenance, #offline {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card { background: var(--bg-base); border: 1px solid var(--glass-border); padding: 60px 40px; border-radius: var(--radius-lg); text-align: center; max-width: 550px; width: 100%; box-shadow: var(--shadow-float); }

        /* ── 8. VIEW PORT ── */
        #spa-main { width: 100%; min-height: 100vh; transition: opacity 0.4s var(--ease), transform 0.4s var(--ease); }
        .view-hidden { opacity: 0 !important; transform: translateY(15px); }

        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

    <!-- SHARED UI MOUNT POINTS -->
    <div id="top-loader"><div id="top-loader-fill"></div></div>
    <div id="header-mount"></div>   <!-- Loaded from header.html -->
    <div id="sidebar-mount"></div>  <!-- Loaded from navigation.html (Sidebar) -->
    <div id="dock-mount"></div>     <!-- Loaded from navigation.html (Dock) -->
    <div id="notif-mount"></div>    <!-- Loaded from ui-notifications.html -->

    <!-- 1. SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">
            <img class="sp-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg">
            <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
            <div class="sp-status" id="sp-status">Initializing Ecosystem...</div>
        </div>
    </div>

    <!-- 2. MAINTENANCE LAYER -->
    <div id="maintenance">
        <div class="m-card">
            <div style="font-size:50px; color:var(--brand-main); margin-bottom:20px;"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1 style="font-family:'Space Grotesk'; font-size:30px; font-weight:800; margin-bottom:15px;">System Optimization</h1>
            <p style="color:var(--text-200); line-height:1.7;">Our engineers are fine-tuning the platform for elite performance. We'll be back shortly.</p>
        </div>
    </div>

    <!-- 3. OFFLINE LAYER -->
    <div id="offline">
        <div class="m-card">
            <div style="font-size:50px; color:var(--text-300); margin-bottom:20px;"><i class="fa-solid fa-wifi"></i></div>
            <h1 style="font-family:'Space Grotesk'; font-size:26px; font-weight:800;">No Connection</h1>
            <p style="color:var(--text-200); margin-top:10px;">Please check your internet to continue browsing Nexra Tech.</p>
        </div>
    </div>

    <!-- 4. MAIN SPA CONTENT -->
    <main id="spa-main"></main>

    <!-- 5. GLOBAL FOOTER MOUNT -->
    <div id="footer-mount"></div>

    <script src="firebaseconfig.js"></script>
    <script>
        'use strict';

        window.Nexra = {
            db: null,
            auth: null,
            user: null,
            isOnline: navigator.onLine,
            
            // --- 1. BOOT ENGINE ---
            boot: async function() {
                this.updateSplash(20, "Syncing Firebase...");
                
                // Wait for Firebase to load from external config
                const checkFB = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFB);
                        this.db = firebase.firestore();
                        this.auth = firebase.auth();
                        
                        this.updateSplash(50, "Authenticating Securely...");
                        
                        this.auth.onAuthStateChanged(user => {
                            this.user = user;
                            this.checkMaintenance();
                        });
                    }
                }, 100);

                this.initSystemListeners();
            },

            checkMaintenance: async function() {
                try {
                    const snap = await this.db.collection('splash_settings').doc('config').get();
                    const data = snap.data();
                    if(data && data.maintenance_mode) {
                        this.showScreen('maintenance');
                    } else {
                        this.launch();
                    }
                } catch(e) { this.launch(); }
            },

            // --- 2. THE SPA ROUTER (Independent Modules) ---
            navTo: async function(view, id = null) {
                const loader = document.getElementById('top-loader-fill');
                const loaderParent = document.getElementById('top-loader');
                const main = document.getElementById('spa-main');
                
                loaderParent.style.opacity = '1';
                loader.style.width = '30%';
                main.classList.add('view-hidden');

                const ROUTES = {
                    home: 'discovery/home.html',
                    shop: 'shop/shop.html',
                    'product-detail': 'shop/product-detail.html',
                    freebies: 'freebies/freebies.html',
                    'freebie-detail': 'freebies/freebie-detail.html',
                    blog: 'academy/blog.html',
                    'blog-detail': 'academy/blog-detail.html',
                    profile: 'user/profile-dashboard.html',
                    vault: 'user/user-vault.html',
                    wallet: 'user/user-wallet.html',
                    reseller: 'reseller/reseller-dashboard.html',
                    vip: 'vip/vip-tiers.html',
                    checkout: 'shop/checkout.html'
                };

                const path = ROUTES[view] || ROUTES.home;

                try {
                    const response = await fetch(path);
                    if(!response.ok) throw new Error("File not found");
                    const html = await response.text();
                    
                    loader.style.width = '70%';

                    setTimeout(() => {
                        main.innerHTML = html;
                        this.executeScripts(main);
                        
                        loader.style.width = '100%';
                        main.classList.remove('view-hidden');
                        
                        setTimeout(() => {
                            loaderParent.style.opacity = '0';
                            setTimeout(() => loader.style.width = '0', 400);
                        }, 300);

                        // Sync URL & Components
                        window.history.pushState({}, '', `?view=${view}${id ? '&id='+id : ''}`);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 400);

                } catch(e) {
                    console.error("Router Error:", e);
                    loaderParent.style.opacity = '0';
                }
            },

            // --- 3. COMPONENT LOADER ---
            launch: async function() {
                this.updateSplash(80, "Opening Ecosystem...");
                
                const components = [
                    { id: 'header-mount', file: 'header.html' },
                    { id: 'sidebar-mount', file: 'navigation.html' }, // Sidebar inside navigation
                    { id: 'dock-mount', file: 'navigation.html' },    // Dock inside navigation
                    { id: 'footer-mount', file: 'footer.html' },
                    { id: 'notif-mount', file: 'ui-notifications.html' }
                ];

                await Promise.all(components.map(async (c) => {
                    try {
                        const res = await fetch(c.file);
                        if(res.ok) document.getElementById(c.id).innerHTML = await res.text();
                    } catch(err) {}
                }));

                this.updateSplash(100, "Ready");
                
                setTimeout(() => {
                    const splash = document.getElementById('splash');
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        const params = new URLSearchParams(window.location.search);
                        this.navTo(params.get('view') || 'home', params.get('id'));
                    }, 800);
                }, 600);
            },

            // --- 4. UTILS ---
            updateSplash: function(p, s) {
                document.getElementById('sp-fill').style.width = p + '%';
                document.getElementById('sp-status').innerText = s;
            },

            executeScripts: function(container) {
                const scripts = container.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.text = oldScript.innerHTML;
                    }
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                });
            },

            initSystemListeners: function() {
                window.addEventListener('online', () => this.handleConnection(true));
                window.addEventListener('offline', () => this.handleConnection(false));
            },

            handleConnection: function(online) {
                this.isOnline = online;
                const offScreen = document.getElementById('offline');
                if(!online) {
                    offScreen.style.display = 'flex';
                    setTimeout(() => offScreen.style.opacity = '1', 10);
                } else {
                    offScreen.style.opacity = '0';
                    setTimeout(() => offScreen.style.display = 'none', 500);
                }
            },

            showScreen: function(id) {
                document.getElementById('splash').style.display = 'none';
                const screen = document.getElementById(id);
                screen.style.display = 'flex';
                setTimeout(() => screen.style.opacity = '1', 10);
            }
        };

        // Ignite Boot
        document.addEventListener('DOMContentLoaded', () => Nexra.boot());
        window.onpopstate = () => {
            const params = new URLSearchParams(window.location.search);
            Nexra.navTo(params.get('view') || 'home');
        };
    </script>
</body>
</html>
