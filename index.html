<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. META & SEO HEAD CODE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>
    
    <!-- Meta Theme & Performance -->
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="description" content="Pakistan's premium digital marketplace for automated software licensing and elite SaaS tools.">
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- 2. PREMIUM FONTS (Plus Jakarta & Space Grotesk) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- 3. FIREBASE SDKS (v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- 4. CORE ENGINE CSS -->
    <style>
        :root {
            /* GLOBAL TOKENS - PREMIUM WHITE */
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.2);
            --brand-soft: rgba(255, 74, 23, 0.08);
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 12px 34px -10px rgba(0,0,0,0.08);
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition-smooth: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* RESET & BODY UX */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); 
            color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* 5. TOP LOADING INDICATOR (Apple Style) */
        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            z-index: 200000; pointer-events: none;
        }
        #top-loader-fill {
            height: 100%; width: 0; background: var(--brand-main);
            box-shadow: 0 0 15px var(--brand-main);
            transition: width 0.4s ease, opacity 0.4s;
        }

        /* 6. ELITE SPLASH INTERFACE */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition-smooth), transform 0.8s var(--transition-smooth);
        }
        .splash-glow {
            position: absolute; width: 50vw; height: 50vw; background: var(--brand-main);
            filter: blur(140px); opacity: 0.06; border-radius: 50%; animation: pulseGlow 4s infinite alternate;
        }
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .sp-logo { width: 90px; height: auto; filter: drop-shadow(0 10px 20px var(--brand-glow)); animation: logoIn 1s var(--transition-smooth); }
        .sp-title { height: 20px; margin-top: 30px; opacity: 0; transform: translateY(10px); animation: fadeUp 0.8s 0.3s forwards; }
        
        .sp-progress-box { width: 220px; margin-top: 50px; text-align: center; }
        .sp-bar { width: 100%; height: 2px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.3s ease; }
        .sp-status { font-size: 9px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* 7. MAINTENANCE INTERFACE */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-base); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 500px; width: 100%; box-shadow: var(--shadow-md);
        }
        .m-icon { 
            width: 70px; height: 70px; background: var(--brand-soft); color: var(--brand-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 30px;
        }
        .m-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 700; margin-bottom: 12px; }
        .m-desc { color: var(--text-200); font-size: 14px; margin-bottom: 35px; }

        /* 8. MAIN VIEW TRANSITIONS */
        #spa-main { width: 100%; min-height: 100vh; opacity: 1; transition: opacity 0.4s var(--transition-smooth), transform 0.4s var(--transition-smooth); }
        .view-loading { opacity: 0 !important; transform: translateY(15px); }

        /* ANIMATIONS */
        @keyframes pulseGlow { from { opacity: 0.04; transform: scale(1); } to { opacity: 0.1; transform: scale(1.2); } }
        @keyframes logoIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* BUTTONS & BADGES UTILS */
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 800; background: var(--bg-surface); border: 1px solid var(--glass-border); color: var(--brand-main); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- TOP LOADER -->
    <div id="top-loader"><div id="top-loader-fill"></div></div>

    <!-- 1. PREMIUM SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            <img class="sp-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra PK">
            
            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Ecosystem...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:10px; font-weight:700; color:var(--text-300); letter-spacing:3px;">NEXRA TECH PK</div>
    </div>

    <!-- 2. MAINTENANCE OVERLAY -->
    <div id="maintenance">
        <div class="m-card">
            <div class="m-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.7a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.7z"></path></svg></div>
            <h1 class="m-title">Optimizing System</h1>
            <p class="m-desc">We are currently fine-tuning our infrastructure to deliver a more seamless experience. We'll be back shortly.</p>
            <div id="m-socials" style="display:flex; justify-content:center; gap:15px;"></div>
        </div>
    </div>

    <!-- 3. SHARED UI CONTAINERS -->
    <div id="header-container"></div>
    <div id="sidebar-container"></div>

    <!-- 4. DYNAMIC VIEW CONTAINER -->
    <main id="spa-main"></main>

    <div id="footer-container"></div>
    <div id="dock-container"></div>

    <!-- 5. CORE JS ENGINE -->
    <script src="firebaseconfig.js"></script>
    <script>
        window.Nexra = {
            db: null,
            
            /* --- 1. THE SPA ROUTER (ULTRA UX) --- */
            navTo: async function(view, id = null) {
                const loader = document.getElementById('top-loader-fill');
                const main = document.getElementById('spa-main');
                
                // Trigger Progress
                loader.style.opacity = '1';
                loader.style.width = '40%';
                main.classList.add('view-loading');

                const routes = {
                    'home': 'discovery/home.html',
                    'shop': 'shop/shop.html',
                    'freebies': 'freebies/freebies.html',
                    'blog': 'academy/blog.html',
                    'profile': 'user/profile-dashboard.html',
                    'reseller': 'reseller/reseller-dashboard.html',
                    'vip': 'vip/vip-tiers.html'
                };

                const path = routes[view] || routes['home'];

                try {
                    const response = await fetch(path);
                    const html = await response.text();
                    
                    loader.style.width = '80%';

                    setTimeout(() => {
                        main.innerHTML = html;
                        
                        // Execute scripts in fetched HTML
                        const scripts = main.querySelectorAll('script');
                        scripts.forEach(s => {
                            const newScript = document.createElement('script');
                            newScript.text = s.innerHTML;
                            document.body.appendChild(newScript).parentNode.removeChild(newScript);
                        });

                        // Completion
                        loader.style.width = '100%';
                        main.classList.remove('view-loading');
                        
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.width = '0', 400);
                        }, 300);

                        // Sync URL
                        window.history.pushState({}, '', `?view=${view}${id ? '&id='+id : ''}`);
                        window.scrollTo(0,0);
                    }, 400);

                } catch(e) {
                    console.error("Routing Error:", e);
                    loader.style.opacity = '0';
                }
            },

            /* --- 2. THE BOOT SEQUENCE --- */
            boot: async function() {
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');

                // Step 1: Initialize Firebase
                fill.style.width = '30%';
                status.innerText = "Connecting to Cloud...";

                const checkFirebase = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFirebase);
                        this.db = firebase.firestore();
                        
                        // Step 2: Fetch System Settings
                        fill.style.width = '60%';
                        status.innerText = "Checking System Integrity...";
                        
                        try {
                            const config = await this.db.collection('splash_settings').doc('config').get();
                            const data = config.exists ? config.data() : {};

                            if(data.maintenance_mode) {
                                this.activateMaintenance(data);
                            } else {
                                this.launch(data);
                            }
                        } catch(e) { this.launch({}); }
                    }
                }, 100);
            },

            /* --- 3. SYSTEM LAUNCHER --- */
            launch: async function(data) {
                const fill = document.getElementById('sp-fill');
                const splash = document.getElementById('splash');
                
                fill.style.width = '100%';
                document.getElementById('sp-status').innerText = "Launching Ecosystem...";

                // Load Shared UI Modules first
                await this.loadSharedUI();

                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        
                        // Process Deep Links
                        const params = new URLSearchParams(window.location.search);
                        const target = params.get('view') || 'home';
                        this.navTo(target, params.get('id'));
                    }, 800);
                }, 600);
            },

            /* --- 4. SHARED UI LOADER --- */
            loadSharedUI: async function() {
                const modules = [
                    { id: 'header-container', file: 'header.html' },
                    { id: 'sidebar-container', file: 'sidebar.html' },
                    { id: 'footer-container', file: 'footer.html' },
                    { id: 'dock-container', file: 'navigation.html' }
                ];

                for(const mod of modules) {
                    try {
                        const res = await fetch(mod.file);
                        if(res.ok) document.getElementById(mod.id).innerHTML = await res.text();
                    } catch(e) { console.warn(`Module ${mod.file} failed to load.`); }
                }
            },

            /* --- 5. MAINTENANCE HANDLER --- */
            activateMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);

                if(data.m_title) document.querySelector('.m-title').innerText = data.m_title;
                if(data.m_desc) document.querySelector('.m-desc').innerText = data.m_desc;
            }
        };

        // Start the Engine
        document.addEventListener('DOMContentLoaded', () => Nexra.boot());
    </script>
</body>
</html>
