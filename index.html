<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Nexra PK - Elite Digital Ecosystem for Creators, Resellers, and Buyers">
    <meta name="theme-color" id="meta-theme-color" content="#f8fafc">
    <title>Nexra PK | Initializing Ecosystem</title>

    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- SVGs are used inline below for maximum performance -->

    <style>
        /* ==========================================================================
           CRITICAL BOOTLOADER CSS (Self-Contained for Instant Paint)
           ========================================================================== */
        :root {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand: #FF4A17;
            --brand-glow: rgba(255, 74, 23, 0.25);
            --grid-color: rgba(0, 0, 0, 0.03);
            --bar-bg: rgba(0, 0, 0, 0.06);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Dark Mode Dynamic Injection */
        html[data-theme="dark"] {
            --bg-base: #050505;
            --bg-surface: #121212;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --brand-glow: rgba(255, 74, 23, 0.35);
            --grid-color: rgba(255, 255, 255, 0.02);
            --bar-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Premium Technical Grid Background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        /* ── 1. SPLASH SCREEN UI ── */
        .nx-boot-screen {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--ease), transform 0.8s var(--ease), visibility 0.8s;
        }

        .nx-ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50vw; height: 50vw; max-width: 500px; max-height: 500px;
            background: var(--brand); filter: blur(120px); opacity: 0.15;
            border-radius: 50%; z-index: 1;
            animation: pulseGlow 4s alternate infinite var(--ease);
        }

        .nx-content-wrapper {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 320px; padding: 0 24px;
        }

        .nx-logo-box {
            width: 90px; height: 90px;
            background: var(--bg-surface);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px var(--brand-glow), inset 0 0 0 1px rgba(255,255,255,0.1);
            margin-bottom: 24px;
            animation: floatLogo 4s infinite ease-in-out;
        }

        .nx-logo-box img { width: 60px; height: 60px; object-fit: contain; }

        .nx-brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px; font-weight: 800; letter-spacing: -1px;
            margin-bottom: 40px; text-align: center;
            opacity: 0; transform: translateY(15px);
            animation: slideUpFade 0.8s 0.2s var(--ease) forwards;
        }
        
        .nx-brand-text span {
            background: linear-gradient(135deg, var(--brand) 0%, #ff8c00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Loading Bar */
        .nx-loader-container {
            width: 100%; opacity: 0; transform: translateY(15px);
            animation: slideUpFade 0.8s 0.4s var(--ease) forwards;
        }

        .nx-progress-track {
            width: 100%; height: 3px; background: var(--bar-bg);
            border-radius: 10px; overflow: hidden; position: relative;
            margin-bottom: 12px;
        }

        .nx-progress-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--brand), #ff8c00);
            border-radius: 10px; transition: width 0.3s linear;
            box-shadow: 0 0 10px var(--brand-glow);
        }

        .nx-loader-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Trust Badge */
        .nx-trust-badge {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 8px;
            font-size: 10px; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 2px;
            opacity: 0; animation: fadeIn 1s 1s forwards;
        }
        .nx-trust-badge svg { width: 14px; height: 14px; color: #10b981; }

        /* ── 2. MAINTENANCE SCREEN ── */
        .nx-maintenance-screen {
            position: fixed; inset: 0; z-index: 20;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-base); padding: 24px;
        }
        .nx-maintenance-screen.active {
            display: flex; animation: fadeIn 0.6s var(--ease) forwards;
        }

        .nx-m-card {
            background: var(--bg-surface);
            border: 1px solid var(--bar-bg);
            border-radius: 32px; padding: 50px 40px;
            max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .nx-m-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,74,23,0.1); color: var(--brand);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; box-shadow: inset 0 0 0 1px rgba(255,74,23,0.2);
            animation: pulseGlow 2s infinite alternate;
        }
        .nx-m-icon svg { width: 40px; height: 40px; }

        .nx-m-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .nx-m-desc { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }

        .nx-m-btn {
            background: var(--brand); color: #fff; border: none;
            padding: 16px 32px; border-radius: 50px; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px var(--brand-glow);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .nx-m-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px var(--brand-glow); filter: brightness(1.1); }

        /* ── ANIMATIONS ── */
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); box-shadow: 0 25px 50px var(--brand-glow), inset 0 0 0 1px rgba(255,255,255,0.1); } }
        @keyframes pulseGlow { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- BOOTLOADER / SPLASH SCREEN -->
    <div class="nx-boot-screen" id="boot-screen">
        <div class="nx-ambient-glow"></div>
        
        <div class="nx-content-wrapper">
            <!-- Central Logo -->
            <div class="nx-logo-box">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            </div>
            
            <h1 class="nx-brand-text">NEXRA <span>PK</span></h1>
            
            <!-- Progress UI -->
            <div class="nx-loader-container">
                <div class="nx-progress-track">
                    <div class="nx-progress-fill" id="progress-fill"></div>
                </div>
                <div class="nx-loader-meta">
                    <span id="status-text">Waking up servers...</span>
                    <span id="percentage-text">0%</span>
                </div>
            </div>
        </div>

        <!-- Trust Anchor -->
        <div class="nx-trust-badge">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
            256-BIT SECURED ECOSYSTEM
        </div>
    </div>

    <!-- MAINTENANCE SCREEN (Hidden by default) -->
    <div class="nx-maintenance-screen" id="maintenance-screen">
        <div class="nx-m-card">
            <div class="nx-m-icon">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </div>
            <h2 class="nx-m-title">System Upgrading</h2>
            <p class="nx-m-desc">We are deploying massive performance upgrades and deploying new infrastructure to elevate your experience. We will be back online shortly.</p>
            <button class="nx-m-btn" onclick="window.location.reload()">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="16" height="16"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                REFRESH CONNECTION
            </button>
        </div>
    </div>

    <!-- ENGINE LOGIC -->
    <script>
        window.NexraBoot = (function() {
            'use strict';

            // Boot Configuration
            const CONFIG = {
                // Toggle this to TRUE to see the Maintenance Screen
                isMaintenanceActive: false, 
                // The URL to redirect to after boot (Using Clean Slug configured in vercel.json)
                targetUrl: "/h" 
            };

            const DOM = {
                screen: document.getElementById('boot-screen'),
                maintenance: document.getElementById('maintenance-screen'),
                fill: document.getElementById('progress-fill'),
                status: document.getElementById('status-text'),
                percent: document.getElementById('percentage-text'),
                metaTheme: document.getElementById('meta-theme-color')
            };

            // 1. Theme Check Before Render
            function initTheme() {
                const theme = localStorage.getItem('nxr-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                DOM.metaTheme.content = theme === 'dark' ? '#050505' : '#f8fafc';
            }

            // 2. Cinematic Boot Sequence
            function startBootSequence() {
                const sequence = [
                    { progress: 15, msg: "Establishing secure connection...", delay: 200 },
                    { progress: 45, msg: "Fetching global inventory...", delay: 800 },
                    { progress: 70, msg: "Loading design tokens...", delay: 1500 },
                    { progress: 90, msg: "Verifying user session...", delay: 2200 },
                    { progress: 100, msg: "Ecosystem Ready.", delay: 2800 }
                ];

                sequence.forEach(step => {
                    setTimeout(() => {
                        updateUI(step.progress, step.msg);
                        if (step.progress === 100) {
                            handleComplete();
                        }
                    }, step.delay);
                });
            }

            function updateUI(value, message) {
                DOM.fill.style.width = `${value}%`;
                DOM.percent.innerText = `${value}%`;
                DOM.status.innerText = message;
            }

            // 3. Post-Boot Logic (Gatekeeper)
            function handleComplete() {
                setTimeout(() => {
                    if (CONFIG.isMaintenanceActive) {
                        showMaintenance();
                    } else {
                        launchApp();
                    }
                }, 400); // Small pause at 100% for smooth UX
            }

            function showMaintenance() {
                DOM.screen.style.opacity = '0';
                DOM.screen.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    DOM.screen.style.display = 'none';
                    DOM.maintenance.classList.add('active');
                }, 800);
            }

            function launchApp() {
                // Cinematic Exit
                DOM.screen.style.opacity = '0';
                DOM.screen.style.transform = 'scale(1.1)';
                
                setTimeout(() => {
                    // Redirect to the main application dashboard
                    window.location.replace(CONFIG.targetUrl);
                }, 600); // Matches the CSS transition duration
            }

            // Init Engine
            return {
                ignite: function() {
                    initTheme();
                    // Small delay to ensure browser has painted the initial frame
                    requestAnimationFrame(() => startBootSequence());
                }
            };
        })();

        // Start Bootloader
        NexraBoot.ignite();
    </script>
</body>
</html>
