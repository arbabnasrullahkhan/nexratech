<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Dynamic Theme Color -->
    <meta name="theme-color" content="#f8fafc" id="meta-theme-color">
    <meta name="description" content="Nexra PK - Elite Digital Ecosystem">
    <title>Nexra PK — Elite Digital Ecosystem</title>

    <!-- Official Brand Favicon -->
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">

    <!-- Elite SaaS Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase V9 Compat SDK (Storage Removed as requested) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Modular App Connections -->
    <script src="firebaseconfig.js"></script>
    <link rel="stylesheet" href="theme.css">
    
    <style>
        /* 
         * CORE SHELL & SPLASH CSS 
         * (Rest of the UI will be in theme.css)
         */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        /* Splash Screen Module */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s, transform 0.8s;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        [data-theme="dark"] #splash-screen { background: #020202; }

        .splash-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 600px;
            max-height: 600px;
            background: #FF4A17;
            filter: blur(140px);
            opacity: 0.12;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            animation: pulseSplash 4s infinite alternate ease-in-out;
        }

        .splash-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 24px;
        }

        .splash-logo {
            width: clamp(90px, 25vw, 120px);
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(255, 74, 23, 0.25));
            animation: floatLogo 4s ease-in-out infinite;
        }

        .splash-title {
            height: clamp(20px, 5vw, 26px);
            margin-top: 35px;
            object-fit: contain;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            filter: invert(1);
            mix-blend-mode: multiply;
        }
        [data-theme="dark"] .splash-title {
            filter: none;
            mix-blend-mode: screen;
        }

        .splash-progress-wrapper {
            width: 100%;
            max-width: 260px;
            margin-top: 50px;
            opacity: 0;
            animation: fadeUp 1s 0.6s forwards;
        }

        .splash-bar {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.06);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }
        [data-theme="dark"] .splash-bar { background: rgba(255,255,255,0.05); }

        .splash-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #FF4A17;
            box-shadow: 0 0 15px rgba(255,74,23,0.3);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        [data-theme="dark"] .splash-status-row { color: #52525b; }

        .splash-powered {
            position: absolute;
            bottom: calc(30px + env(safe-area-inset-bottom));
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s 1s forwards;
        }
        [data-theme="dark"] .splash-powered { color: #52525b; }

        @keyframes pulseSplash { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.15); opacity: 0.2; } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Main App Shell Layout */
        #app-shell { 
            display: none; 
            width: 100%; 
            height: 100vh; 
            flex-direction: column; 
            background: var(--bg-base);
        }
        
        #header-container { flex-shrink: 0; z-index: 9000; }
        #main-view-container { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth; }
        #nav-container { flex-shrink: 0; z-index: 8500; }
    </style>
</head>
<body>

    <!-- 1. ENTERPRISE SPLASH SCREEN -->
    <div id="splash-screen">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <!-- Dynamic Brand Assets -->
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo" class="splash-logo" id="splash-logo">
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Title Text" class="splash-title" id="splash-title">
            
            <!-- Progress Indicator -->
            <div class="splash-progress-wrapper">
                <div class="splash-bar"><div class="splash-fill" id="splash-progress-fill"></div></div>
                <div class="splash-status-row">
                    <span id="splash-status-text">Initializing Ecosystem...</span>
                    <span id="splash-percent">0%</span>
                </div>
            </div>
            
            <div class="splash-powered">POWERED BY ARBAB NASRULLAH</div>
        </div>
    </div>

    <!-- 2. MAIN APP SHELL (Modular Injection Targets) -->
    <div id="app-shell">
        <header id="header-container"></header>
        <main id="main-view-container"></main>
        <nav id="nav-container"></nav>
    </div>

    <!-- 3. SPLASH & BOOT ENGINE -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fill = document.getElementById('splash-progress-fill');
            const percent = document.getElementById('splash-percent');
            const statusText = document.getElementById('splash-status-text');
            const splash = document.getElementById('splash-screen');
            const shell = document.getElementById('app-shell');

            function updateProgress(val, text) {
                if(fill) fill.style.width = val + '%';
                if(percent) percent.innerText = val + '%';
                if(statusText) statusText.innerText = text;
            }

            async function bootApplication() {
                // Pre-flight check theme
                if(localStorage.getItem('nexra_theme') === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('meta-theme-color').setAttribute('content', '#020202');
                }

                updateProgress(20, 'Loading Architecture...');
                await new Promise(r => setTimeout(r, 600));

                updateProgress(50, 'Synchronizing Firebase Database...');
                // Checking if firebaseconfig.js loaded properly
                if(typeof firebase !== 'undefined') {
                    updateProgress(75, 'Preparing Modular Interface...');
                } else {
                    updateProgress(75, 'Network Delayed, Retrying...');
                }

                await new Promise(r => setTimeout(r, 800));
                updateProgress(100, 'Ready for Launch');

                // Cinematic Transition to App Shell
                setTimeout(() => {
                    splash.style.transform = 'scale(1.05)';
                    splash.style.opacity = '0';
                    shell.style.display = 'flex'; // Unveil Shell
                    
                    setTimeout(() => {
                        splash.style.visibility = 'hidden';
                        splash.style.display = 'none'; // Free DOM memory
                        document.body.style.overflow = 'auto'; // Restore scroll behavior
                        
                        // Fire Custom Event for Global Router to mount modules
                        window.dispatchEvent(new Event('NexraAppReady'));
                    }, 800);
                }, 600);
            }

            // Ignite Boot Sequence
            bootApplication();
        });
    </script>
    
    <!-- Deferred Scripts Loading for better performance -->
    <script src="global.js" defer></script>
    <script src="router.js" defer></script>

</body>
</html>
