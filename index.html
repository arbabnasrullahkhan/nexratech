<!-- --- START OF FILE index.html --- -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. META & SEO CORE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>
    
    <!-- Meta Theme & SEO -->
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="description" content="Pakistan's elite digital marketplace for automated software licensing and premium SaaS solutions.">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Nexra Tech PK | Digital Ecosystem">
    <meta property="og:description" content="Automated digital assets and premium software licensing.">
    <meta property="og:image" content="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">

    <!-- 2. PREMIUM TYPOGRAPHY & ICONS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- 3. FIREBASE SDKS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- 4. CORE DESIGN SYSTEM (PREMIUM WHITE & DARK) -->
    <style>
        :root {
            /* LIGHT THEME (DEFAULT) */
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            --brand-main: #FF4A17; 
            --brand-glow: rgba(255, 74, 23, 0.15);
            --brand-soft: rgba(255, 74, 23, 0.08);
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            --radius-md: 24px;
            --radius-lg: 40px;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); 
            color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* TOP LOADER (Apple Style) */
        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            z-index: 200000; pointer-events: none; opacity: 0;
        }
        #top-loader-fill {
            height: 100%; width: 0; background: var(--brand-main);
            box-shadow: 0 0 15px var(--brand-main);
            transition: width 0.4s ease, opacity 0.4s;
        }

        /* PREMIUM SPLASH INTERFACE */
        #splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }
        .splash-glow {
            position: absolute; width: 60vw; height: 60vw; background: var(--brand-main);
            filter: blur(140px); opacity: 0.08; border-radius: 50%; animation: pulseGlow 5s infinite alternate;
        }
        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .sp-logo { width: clamp(80px, 20vw, 100px); height: auto; filter: drop-shadow(0 10px 25px var(--brand-glow)); }
        .sp-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); }
        [data-theme="dark"] .sp-title { filter: none; }
        
        .sp-progress-box { width: 200px; margin-top: 60px; text-align: center; }
        .sp-bar { width: 100%; height: 2px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.4s ease; }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* MAINTENANCE INTERFACE */
        #maintenance {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s;
        }
        .m-card {
            background: var(--bg-base); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg); text-align: center;
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md);
        }
        .m-icon { 
            width: 80px; height: 80px; background: var(--brand-soft); color: var(--brand-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 30px; border: 1px solid var(--brand-glow);
        }
        .m-title { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .m-desc { color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        /* SPA MAIN CONTAINER */
        #spa-main { 
            width: 100%; min-height: 100vh; opacity: 1; 
            transition: opacity 0.4s var(--transition), transform 0.4s var(--transition); 
        }
        .view-hidden { opacity: 0 !important; transform: translateY(10px); }

        /* UTILS */
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
    </style>
</head>
<body>

    <!-- TOP-LEVEL UI (LOADER & SHARED) -->
    <div id="top-loader"><div id="top-loader-fill"></div></div>
    
    <!-- Shared Global Modules -->
    <div id="global-container"></div> <!-- Modules: global.html -->
    <div id="header-container"></div> <!-- Modules: header.html -->
    <div id="notif-container"></div>  <!-- Modules: ui-notifications.html -->

    <!-- 1. SPLASH SCREEN -->
    <div id="splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <img class="sp-logo" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra Logo">
            <img class="sp-title" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech PK">
            
            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Cloud...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">Powered by Nexra Tech PK</div>
    </div>

    <!-- 2. MAINTENANCE LAYER -->
    <div id="maintenance">
        <div class="m-card">
            <div class="m-icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1 class="m-title" id="m-title">Optimizing Ecosystem</h1>
            <p class="m-desc" id="m-desc">Our engineers are fine-tuning the platform for elite performance. We will be back online in a moment.</p>
        </div>
    </div>

    <!-- 3. SPA VIEW PORT -->
    <main id="spa-main"></main>

    <!-- 4. BOTTOM PERSISTENT UI -->
    <div id="dock-container"></div>   <!-- Modules: navigation.html -->
    <div id="footer-container"></div> <!-- Modules: footer.html -->

    <!-- 5. JAVASCRIPT ENGINE (MASTER CONTROLLER) -->
    <script src="firebaseconfig.js"></script>
    <script>
        window.Nexra = {
            db: null,
            auth: null,
            user: null,
            state: { theme: 'light', currentView: '' },

            /* --- 1. THEME ENGINE --- */
            initTheme: function() {
                const saved = localStorage.getItem('theme') || 'light';
                if(saved === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('meta-theme-color').content = "#050507";
                }
                this.state.theme = saved;
            },

            /* --- 2. DEEP LINK ROUTER (SPA ENGINE) --- */
            navTo: async function(view, id = null) {
                if (this.state.currentView === view && !id) return; // Prevent double loads
                this.state.currentView = view;

                const loader = document.getElementById('top-loader-fill');
                const loaderParent = document.getElementById('top-loader');
                const main = document.getElementById('spa-main');
                
                // Start Progress
                loaderParent.style.opacity = '1';
                loader.style.width = '40%';
                main.classList.add('view-hidden');

                // Map Virtual Views to Actual Folders
                const routes = {
                    'home': 'discovery/home.html',
                    'shop': 'shop/shop.html',
                    'product-detail': 'shop/product-detail.html',
                    'checkout': 'shop/checkout.html',
                    'freebies': 'freebies/freebies.html',
                    'freebie-detail': 'freebies/freebie-detail.html',
                    'blog': 'academy/blog.html',
                    'blog-detail': 'academy/blog-detail.html',
                    'profile': 'user/profile-dashboard.html',
                    'auth': 'user/auth-gate.html',
                    'reseller': 'reseller/reseller-dashboard.html',
                    'vip': 'vip/vip-tiers.html'
                };

                const path = routes[view] || 'system/error-404.html';

                try {
                    const response = await fetch(path);
                    if(!response.ok) throw new Error("View not found");
                    const html = await response.text();
                    
                    loader.style.width = '80%';

                    setTimeout(() => {
                        main.innerHTML = html;
                        
                        // Smart Script Execution (Ensures JS inside loaded HTML runs)
                        const scripts = main.querySelectorAll('script');
                        scripts.forEach(s => {
                            const newScript = document.createElement('script');
                            Array.from(s.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                            newScript.text = s.innerHTML;
                            document.body.appendChild(newScript).parentNode.removeChild(newScript);
                        });

                        // Finalize Animation
                        loader.style.width = '100%';
                        main.classList.remove('view-hidden');
                        
                        setTimeout(() => {
                            loaderParent.style.opacity = '0';
                            setTimeout(() => loader.style.width = '0', 400);
                        }, 300);

                        // Premium URL Generation & Push
                        const newUrl = id ? `?view=${view}&id=${id}` : `?view=${view}`;
                        window.history.pushState({view, id}, '', newUrl);
                        window.scrollTo({ top: 0, behavior: 'smooth' });

                        // Sync Active State with Dock & Header
                        if(window.NexraNavigation) window.NexraNavigation.syncState(view);

                    }, 400);

                } catch(e) {
                    console.error("Router Error:", e);
                    loaderParent.style.opacity = '0';
                    this.navTo('error-404');
                }
            },

            /* --- 3. BOOT SEQUENCE & DEEP LINK RESTORATION --- */
            boot: async function() {
                this.initTheme();
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');

                fill.style.width = '30%';
                status.innerText = "Syncing Firebase...";

                // Wait for Firebase to become available (Handles slow connections)
                const checkFirebase = setInterval(async () => {
                    if(window.firebase && firebase.apps.length) {
                        clearInterval(checkFirebase);
                        this.db = firebase.firestore();
                        this.auth = firebase.auth();
                        
                        fill.style.width = '60%';
                        status.innerText = "Authenticating System...";
                        
                        // Load Shared Global UI Modules
                        await this.loadSharedUI();

                        try {
                            const config = await this.db.collection('splash_settings').doc('config').get();
                            const data = config.exists ? config.data() : {};

                            if(data.maintenance_mode) {
                                this.showMaintenance(data);
                            } else {
                                this.launch();
                            }
                        } catch(e) { 
                            // Fallback if DB fails
                            this.launch(); 
                        }
                    }
                }, 100);
            },

            /* --- 4. LAUNCHER --- */
            launch: function() {
                const fill = document.getElementById('sp-fill');
                const status = document.getElementById('sp-status');
                const splash = document.getElementById('splash');

                fill.style.width = '100%';
                status.innerText = "Opening Ecosystem...";

                setTimeout(() => {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        
                        // Deep Link Restoration Handler
                        const params = new URLSearchParams(window.location.search);
                        const targetView = params.get('view') || 'home';
                        const targetId = params.get('id') || null;
                        
                        this.navTo(targetView, targetId);
                    }, 800);
                }, 600);
            },

            /* --- 5. UI LOADERS & EVENT LISTENERS --- */
            loadSharedUI: async function() {
                // Fetch external global UI components silently
                const mods = [
                    { id: 'global-container', file: 'global.html' },
                    { id: 'header-container', file: 'header.html' },
                    { id: 'sidebar-container', file: 'sidebar.html' },
                    { id: 'dock-container', file: 'navigation.html' },
                    { id: 'notif-container', file: 'ui-notifications.html' },
                    { id: 'footer-container', file: 'footer.html' }
                ];
                
                await Promise.all(mods.map(async (m) => {
                    try {
                        const res = await fetch(m.file);
                        if(res.ok) {
                            document.getElementById(m.id).innerHTML = await res.text();
                            // Run inner scripts for components like Navbar
                            const scripts = document.getElementById(m.id).querySelectorAll('script');
                            scripts.forEach(s => eval(s.innerText));
                        }
                    } catch(e) { console.warn("Failed loading module:", m.file); }
                }));

                // Native Link Interception (Converts standard <a> tags into SPA navTo)
                document.body.addEventListener('click', (e) => {
                    const link = e.target.closest('a');
                    if (link && link.getAttribute('href') && link.getAttribute('href').startsWith('?view=')) {
                        e.preventDefault();
                        const url = new URL(link.href, window.location.origin);
                        const view = url.searchParams.get('view');
                        const id = url.searchParams.get('id');
                        this.navTo(view, id);
                    }
                });
            },

            showMaintenance: function(data) {
                document.getElementById('splash').style.display = 'none';
                const m = document.getElementById('maintenance');
                m.style.display = 'flex';
                setTimeout(() => m.style.opacity = '1', 100);

                if(data.m_title) document.querySelector('.m-title').innerText = data.m_title;
                if(data.m_desc) document.querySelector('.m-desc').innerText = data.m_desc;
            }
        };

        // Initialize Core System
        document.addEventListener('DOMContentLoaded', () => Nexra.boot());

        // Handle Browser Forward/Back Buttons properly
        window.onpopstate = (event) => {
            if(event.state && event.state.view) {
                Nexra.navTo(event.state.view, event.state.id);
            } else {
                const params = new URLSearchParams(window.location.search);
                Nexra.navTo(params.get('view') || 'home', params.get('id'));
            }
        };
    </script>
</body>
</html>
<!-- --- END OF FILE index.html --- -->
