<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Nexra Tech PK - Elite Digital Ecosystem">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <title>Nexra Tech PK | Elite Digital Ecosystem</title>

    <!-- Favicon -->
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">

    <!-- Elite Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- SVG Library -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. PREMIUM DESIGN SYSTEM (LIGHT FIRST)
           ========================================================================== */
        :root {
            /* GLOBAL ACCENT COLOR (Can be changed via Admin/Global Config) */
            --accent: #FF4A17; 
            --accent-glow: rgba(255, 74, 23, 0.25);
            
            /* LIGHT THEME (DEFAULT - Apple/Stripe Style) */
            --bg-base: #FFFFFF;
            --bg-surface: #F8FAFC;
            --bg-elevated: #F1F5F9;
            --text-100: #0F172A;
            --text-200: #475569;
            --text-300: #94A3B8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 12px 30px -10px rgba(0,0,0,0.08);
            --shadow-float: 0 30px 60px -12px rgba(0,0,0,0.12);
        }

        /* DARK THEME OVERRIDE */
        [data-theme="dark"] {
            --bg-base: #050505;
            --bg-surface: #0F0F0F;
            --bg-elevated: #161616;
            --text-100: #FFFFFF;
            --text-200: #A1A1AA;
            --text-300: #52525B;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(10, 10, 10, 0.7);
            --shadow-soft: 0 20px 40px rgba(0, 0, 0, 0.6);
            --shadow-float: 0 40px 80px rgba(0, 0, 0, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-100);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s;
        }

        /* ==========================================================================
           2. CINEMATIC LOADER & SPLASH
           ========================================================================== */
        #nx-splash {
            position: fixed;
            inset: 0;
            z-index: 100000;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-logo-container {
            position: relative;
            margin-bottom: 40px;
        }

        .splash-logo {
            width: 90px;
            filter: drop-shadow(0 15px 30px var(--accent-glow));
            animation: breathe 4s infinite ease-in-out;
            z-index: 2;
        }

        .splash-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            background: var(--accent);
            filter: blur(60px);
            opacity: 0.15;
            z-index: 1;
        }

        .splash-title-img {
            height: 20px;
            margin-bottom: 60px;
            opacity: 0.8;
            /* Invert only in light mode for the JPG provided */
            filter: brightness(0.2); 
        }
        [data-theme="dark"] .splash-title-img { filter: invert(1); }

        /* Sleek Modern Progress */
        .nx-loader {
            width: 200px;
            height: 2px;
            background: var(--bg-elevated);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .nx-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transition: width 0.4s ease;
        }

        .nx-status-text {
            margin-top: 20px;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-300);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* ==========================================================================
           3. MAIN APP SHELL
           ========================================================================== */
        #nx-shell {
            opacity: 0;
            transform: scale(1.02);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #nx-shell.booted {
            opacity: 1;
            transform: scale(1);
        }

        #spa-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding-top: 70px; /* Fixed Header Space */
            padding-bottom: 90px; /* Bottom Dock Space */
        }

        /* Route Animation */
        .page-enter {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- SINEMATIC SPLASH -->
    <div id="nx-splash">
        <div class="splash-logo-container">
            <div class="splash-glow"></div>
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra" class="splash-logo">
        </div>
        <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra Tech" class="splash-title-img">
        
        <div class="nx-loader">
            <div class="nx-fill" id="boot-progress"></div>
        </div>
        <div class="nx-status-text" id="boot-status">Encrypted Link Establishing...</div>

        <div style="position: absolute; bottom: 40px; font-size: 9px; font-weight: 700; letter-spacing: 4px; color: var(--text-300);">
            VERSION 2.0 // SECURE ECOSYSTEM
        </div>
    </div>

    <!-- MAIN APP SHELL -->
    <div id="nx-shell">
        <!-- Components loaded modularly -->
        <div id="global-config-injection" style="display: none;"></div>
        <div id="nav-injection"></div>

        <!-- MAIN VIEWPORT -->
        <main id="spa-container"></main>

        <!-- NOTIFICATIONS & MODALS -->
        <div id="ui-injection"></div>
    </div>

    <!-- ==========================================================================
         4. CORE ENGINE (ROUTING & DEEP LINKS)
         ========================================================================== -->
    <script>
        window.Nexra = {
            config: {
                brand: "Nexra Tech PK",
                accent: "#FF4A17",
                isDark: false
            },

            // 1. BOOT SEQUENCE
            async boot() {
                const progress = document.getElementById('boot-progress');
                const status = document.getElementById('boot-status');

                const steps = [
                    { p: 20, t: "Initializing Global Config..." },
                    { p: 50, t: "Syncing Firebase Auth..." },
                    { p: 80, t: "Loading Interface..." },
                    { p: 100, t: "System Ready" }
                ];

                for (let step of steps) {
                    await new Promise(r => setTimeout(resolve => {
                        progress.style.width = step.p + '%';
                        status.innerText = step.t;
                        r();
                    }, 400));
                }

                this.finalizeBoot();
            },

            finalizeBoot() {
                document.getElementById('nx-splash').style.opacity = '0';
                document.getElementById('nx-splash').style.transform = 'scale(1.1)';
                
                setTimeout(() => {
                    document.getElementById('nx-splash').style.visibility = 'hidden';
                    document.getElementById('nx-shell').classList.add('booted');
                    
                    // HANDLE REDIRECTION & DEEP LINKS
                    this.handleDeepLinks();
                }, 600);
            },

            // 2. DEEP LINK REDIRECTION LOGIC
            handleDeepLinks() {
                const urlParams = new URLSearchParams(window.location.search);
                const view = urlParams.get('view');
                const id = urlParams.get('id');

                if (view) {
                    // Direct redirect to product, freebie, or blog
                    // Example: ?view=product&id=capcut-pro
                    this.navTo(view, id);
                } else {
                    this.navTo('home');
                }
            },

            // 3. SPA ROUTER ENGINE
            async navTo(viewId, documentId = null) {
                const container = document.getElementById('spa-container');
                
                // Show Inline Loader
                container.innerHTML = `
                    <div style="height: 50vh; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--accent);"></i>
                    </div>
                `;

                // Directory Mapping
                const pathMap = {
                    'home': 'discovery/home.html',
                    'shop': 'shop/shop.html',
                    'product': 'shop/product-detail.html',
                    'freebies': 'freebies/freebies.html',
                    'freebie-detail': 'freebies/freebie-detail.html',
                    'blog': 'academy/blog.html',
                    'blog-detail': 'academy/blog-detail.html',
                    'profile': 'user/profile-dashboard.html',
                    'checkout': 'shop/checkout.html'
                };

                const targetFile = pathMap[viewId] || 'system/error-404.html';
                
                // Update URL State
                let stateUrl = `?view=${viewId}`;
                if(documentId) stateUrl += `&id=${documentId}`;
                window.history.pushState({viewId, documentId}, '', stateUrl);

                try {
                    // In real step-by-step, we'll build these files.
                    // Currently simulating fetch:
                    setTimeout(() => {
                        container.innerHTML = `
                            <div class="page-enter" style="padding: 40px 20px; text-align:center;">
                                <h1 style="font-family:'Space Grotesk'; font-size:32px; margin-bottom:10px;">${viewId.toUpperCase()}</h1>
                                <p style="color:var(--text-300);">Module: ${targetFile}</p>
                                ${documentId ? `<div class="badge" style="background:var(--accent); color:#fff; padding:5px 15px; border-radius:50px; margin-top:20px;">ID: ${documentId}</div>` : ''}
                            </div>
                        `;
                    }, 500);
                } catch(e) {
                    container.innerHTML = "<h1>Failed to load module</h1>";
                }
            },

            // 4. THEME TOGGLE (Persistent)
            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const target = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', target);
                document.getElementById('meta-theme-color').content = target === 'light' ? '#ffffff' : '#050505';
                localStorage.setItem('nx_theme', target);
            }
        };

        // Initialize on Load
        window.addEventListener('DOMContentLoaded', () => {
            // Apply saved theme
            const savedTheme = localStorage.getItem('nx_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            Nexra.boot();
        });

        // Browser Back Button Support
        window.onpopstate = () => Nexra.handleDeepLinks();
    </script>
</body>
</html>
