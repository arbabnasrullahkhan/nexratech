<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <!-- ==========================================================================
         1. ENTERPRISE SEO, METADATA & BROWSER OPTIMIZATION
         ========================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Dynamic SEO Tags (Will be enhanced by routing script) -->
    <title>Nexra Tech PK | Initializing Ecosystem...</title>
    <meta name="description" content="Pakistan's elite digital marketplace for automated software licensing, SaaS solutions, and premium agency reseller portals.">
    <meta name="keywords" content="digital ecosystem, software licensing, SaaS tools, reseller portal, premium digital assets, Nexra PK, Supabase, Firebase">
    <meta name="author" content="Nexra Tech PK">
    <meta name="robots" content="index, follow">
    
    <!-- Theme & Mobile Optimizations -->
    <meta name="theme-color" id="meta-theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- DYNAMIC FAVICON (Controlled by NexraBrand Engine) -->
    <link rel="icon" id="dynamic-favicon" href="" type="image/png">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="">

    <!-- Open Graph / Twitter Cards -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nexra Tech PK | Premium Digital Ecosystem">
    <meta property="og:description" content="Discover automated digital assets, SaaS tools, and elite tech insights. Join the ultimate reseller network in Pakistan.">
    <meta property="og:image" class="nx-brand-watermark" content="">
    <meta name="twitter:card" content="summary_large_image">

    <!-- JSON-LD Structured Data for Google Indexing -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nexra Tech PK",
      "url": "https://nexratech.vercel.app",
      "description": "Premium Digital Ecosystem and Reseller Network in Pakistan.",
      "sameAs": [
        "https://www.facebook.com/nexrapk",
        "https://www.instagram.com/nexrapk"
      ]
    }
    </script>

    <!-- ==========================================================================
         2. RESOURCE PRELOADING & PREMIUM TYPOGRAPHY
         ========================================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Primary Fonts: Plus Jakarta Sans (Body) & Space Grotesk (Headings/Tech Data) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome 6 (No emojis policy) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- ==========================================================================
         3. HYBRID DATABASE SDKs (Firebase + Supabase)
         ========================================================================== -->
    <!-- Firebase (Auth & Real-time NoSQL) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <!-- Supabase (PostgreSQL & Storage) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- MASTER CONFIGURATION (Contains DB connections & NexraBrand) -->
    <script src="firebaseconfig.js"></script>

    <!-- ==========================================================================
         4. CORE DESIGN SYSTEM (CSS VARIABLES & GLOBAL UX)
         ========================================================================== -->
    <style>
        /* 
         * PREMIUM ENTERPRISE TOKENS
         * --brand-main is dynamically injected by NexraBrand in firebaseconfig.js 
         */
        :root {
            --bg-base: #ffffff;
            --bg-surface: #f8fafc;
            --bg-elevated: #f1f5f9;
            
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            
            --glass-border: rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.08);
            
            --radius-md: 24px;
            --radius-lg: 40px;
            
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* System Status Colors */
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        /* Dark Theme Support (Cinematic Luxury) */
        [data-theme="dark"] {
            --bg-base: #050507;
            --bg-surface: #0c0c12;
            --bg-elevated: #16161e;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-md: 0 15px 50px rgba(0,0,0,0.5);
        }

        /* Base Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-base); 
            color: var(--text-100); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; /* Lock scroll during splash */
            width: 100vw; height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .tech-font { font-family: 'Space Grotesk', sans-serif; }

        /* ==========================================
           ELITE SPLASH SCREEN INTERFACE
           ========================================== */
        #nx-gateway-splash {
            position: fixed; inset: 0; z-index: 100000; background: var(--bg-base);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--transition), transform 0.8s var(--transition);
        }

        /* Dynamic Branding Glow (Inherits active edition color) */
        .splash-glow {
            position: absolute; width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
            background: var(--brand-main, #FF4A17);
            filter: blur(140px); opacity: 0.08; border-radius: 50%; 
            animation: pulseGlow 5s infinite alternate ease-in-out; pointer-events: none;
        }

        .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        /* The images will be injected via NexraBrand */
        .nx-brand-logo { width: clamp(80px, 20vw, 110px); height: auto; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.1)); animation: logoFloat 4s ease-in-out infinite; }
        .nx-brand-title { height: 22px; margin-top: 35px; filter: grayscale(1) brightness(0.2); }
        [data-theme="dark"] .nx-brand-title { filter: none; }
        
        .sp-secure-badge {
            margin-top: 20px; display: inline-flex; align-items: center; gap: 8px;
            background: rgba(16, 185, 129, 0.1); color: var(--success);
            padding: 6px 16px; border-radius: 50px; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid rgba(16, 185, 129, 0.2);
            opacity: 0; transform: translateY(10px); animation: fadeUp 0.6s 0.3s forwards;
        }

        /* Progress Engine */
        .sp-progress-box { width: 240px; margin-top: 50px; text-align: center; opacity: 0; animation: fadeUp 0.6s 0.5s forwards; }
        .sp-bar { width: 100%; height: 3px; background: var(--bg-elevated); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .sp-fill { height: 100%; width: 0%; background: var(--brand-main, #FF4A17); transition: width 0.3s ease; box-shadow: 0 0 10px var(--brand-main, #FF4A17); }
        .sp-status { font-size: 10px; font-weight: 800; color: var(--text-300); text-transform: uppercase; letter-spacing: 2px; }

        /* ==========================================
           MAINTENANCE & ERROR OVERLAYS
           ========================================== */
        .nx-system-overlay {
            position: fixed; inset: 0; z-index: 100005; background: var(--bg-base);
            display: none; align-items: center; justify-content: center; padding: 25px;
            opacity: 0; transition: opacity 0.5s; text-align: center;
        }
        .m-card {
            background: var(--bg-surface); border: 1px solid var(--glass-border);
            padding: 60px 40px; border-radius: var(--radius-lg);
            max-width: 550px; width: 100%; box-shadow: var(--shadow-md);
        }
        .m-icon { 
            width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); color: var(--danger);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 30px; border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .m-title { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; margin-bottom: 15px; color: var(--text-100); }
        .m-desc { color: var(--text-200); font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        /* Animations */
        @keyframes pulseGlow { from { opacity: 0.05; transform: scale(1); } to { opacity: 0.12; transform: scale(1.15); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1. SPLASH SCREEN (GATEWAY) -->
    <div id="nx-gateway-splash">
        <div class="splash-glow"></div>
        <div class="splash-content">
            <!-- Assets populated automatically by NexraBrand in firebaseconfig.js -->
            <img class="nx-brand-logo sp-logo" src="" alt="Ecosystem Logo">
            <img class="nx-brand-title sp-title" src="" alt="Brand Title">
            
            <div class="sp-secure-badge">
                <i class="fa-solid fa-shield-halved"></i> 256-Bit Hybrid Engine Ready
            </div>

            <div class="sp-progress-box">
                <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
                <div class="sp-status" id="sp-status">Initializing Cloud Architecture...</div>
            </div>
        </div>
        <div style="position:absolute; bottom:40px; font-size:9px; font-weight:800; color:var(--text-300); letter-spacing:4px; text-transform:uppercase;">
            Engineered by Nexra Tech PK
        </div>
    </div>

    <!-- 2. MAINTENANCE / OFFLINE OVERLAY -->
    <div id="nx-system-overlay" class="nx-system-overlay">
        <div class="m-card">
            <div class="m-icon" id="overlay-icon">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <h1 class="m-title" id="overlay-title">Optimizing Ecosystem</h1>
            <p class="m-desc" id="overlay-desc">Our engineers are fine-tuning the platform. We will be back online in a moment.</p>
            <button onclick="window.location.reload()" style="background: var(--text-100); color: var(--bg-base); padding: 15px 30px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer;">
                RETRY CONNECTION
            </button>
        </div>
    </div>

    <!-- ==========================================================================
         CENTRALIZED JAVASCRIPT ENGINE (ROUTING, DEEP-LINKS, TRACKING)
         ========================================================================== -->
    <script>
        /**
         * NEXRA GATEWAY ENGINE
         * Handles routing, loading states, and analytics before the user sees the app.
         */
        window.NexraGateway = {
            
            // UI State Manager
            ui: {
                fill: document.getElementById('sp-fill'),
                status: document.getElementById('sp-status'),
                splash: document.getElementById('nx-gateway-splash'),
                overlay: document.getElementById('nx-system-overlay'),
                
                updateProgress: function(percent, message) {
                    if(this.fill) this.fill.style.width = `${percent}%`;
                    if(this.status) this.status.innerText = message;
                },
                
                showError: function(title, desc, iconClass) {
                    this.splash.style.display = 'none';
                    document.getElementById('overlay-title').innerText = title;
                    document.getElementById('overlay-desc').innerText = desc;
                    document.getElementById('overlay-icon').innerHTML = `<i class="${iconClass}"></i>`;
                    this.overlay.style.display = 'flex';
                    setTimeout(() => this.overlay.style.opacity = '1', 50);
                }
            },

            // 1. Analytics & Tracking Hooks
            captureAnalytics: function() {
                this.ui.updateProgress(10, "Securing Session...");
                const params = new URLSearchParams(window.location.search);
                
                // Capture Referral Code
                if(params.has('ref')) {
                    localStorage.setItem('nexra_ref_code', params.get('ref'));
                }
                
                // Capture Campaign (UTM) Data for Ad tracking
                if(params.has('utm_source')) {
                    const campaign = {
                        source: params.get('utm_source'),
                        medium: params.get('utm_medium'),
                        campaign: params.get('utm_campaign'),
                        timestamp: Date.now()
                    };
                    sessionStorage.setItem('nexra_campaign_data', JSON.stringify(campaign));
                }
            },

            // 2. Routing Resolution Engine
            resolveDeepLink: function() {
                this.ui.updateProgress(85, "Resolving Destination...");
                
                // Parse the current URL
                const path = window.location.pathname;
                const params = window.location.search; // Keep queries like ?id=123
                
                // Extract route identifier (e.g. /shop -> shop)
                const segments = path.split('/').filter(Boolean);
                let targetKey = segments.length > 0 ? segments[0] : 'home';
                
                // Generate the actual file path using the centralized registry in firebaseconfig.js
                // Example: 'shop' -> '/shop/shop.html'
                let destinationUrl = window.NexraRoutes.generateURL(targetKey, params);
                
                console.log(`[Gateway] Deep Link resolved. Routing from '${path}' to '${destinationUrl}'`);
                
                this.ui.updateProgress(100, "Ecosystem Ready.");

                // Cinematic Exit & Redirect
                setTimeout(() => {
                    this.ui.splash.style.opacity = '0';
                    this.ui.splash.style.transform = 'scale(1.05)';
                    
                    setTimeout(() => {
                        // Use window.location.replace to prevent the splash screen from appearing in the browser "Back" history.
                        window.location.replace(destinationUrl);
                    }, 600); // Wait for CSS transition
                }, 400); // Hold at 100% briefly
            },

            // 3. Database Connection & System Check
            boot: function() {
                this.captureAnalytics();
                
                if (!navigator.onLine) {
                    this.ui.showError("Connection Lost", "Please check your internet connection to access the ecosystem.", "fa-solid fa-wifi");
                    return;
                }

                this.ui.updateProgress(30, "Connecting to Hybrid Database...");

                let attempts = 0;
                const verifyConnection = setInterval(async () => {
                    attempts++;
                    
                    // Wait for Firebase/Supabase from firebaseconfig.js
                    if (window.db && window.supabaseClient) {
                        clearInterval(verifyConnection);
                        this.ui.updateProgress(60, "Verifying System Integrity...");
                        
                        try {
                            // Check Maintenance Mode Flag in Firestore
                            const settingsDoc = await window.db.collection('settings').doc('global').get();
                            const data = settingsDoc.exists ? settingsDoc.data() : {};
                            
                            if (data.maintenance_mode) {
                                this.ui.showError(data.maintenance_title || "Maintenance Mode", data.maintenance_desc || "System is offline for upgrades.", "fa-solid fa-tools");
                            } else {
                                this.resolveDeepLink();
                            }
                        } catch (error) {
                            console.error("[Gateway] Settings fetch failed. Proceeding with routing anyway.", error);
                            this.resolveDeepLink(); // Fallback: Let them through if DB read fails (offline cache might handle it)
                        }
                    } else if (attempts > 50) { // 5-second timeout
                        clearInterval(verifyConnection);
                        console.error("[Gateway] Database connection timeout.");
                        this.ui.showError("Database Timeout", "The hybrid engine took too long to respond. Please refresh.", "fa-solid fa-database");
                    }
                }, 100);
            }
        };

        // Ignite the Gateway
        window.addEventListener('DOMContentLoaded', () => {
            // Apply Theme before paint to prevent flashing
            const savedTheme = localStorage.getItem('theme') || 'light';
            if(savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            
            // Start boot sequence
            window.NexraGateway.boot();
        });
    </script>
</body>
</html>
