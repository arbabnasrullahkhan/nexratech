<!-- ==========================================================================
     NEXRA ELITE - UI NOTIFICATIONS & MODALS
     ========================================================================== -->
<style>
    /* Scoped Variables */
    .nx-ui-sys {
        --ui-surface: #ffffff;
        --ui-border: rgba(0, 0, 0, 0.08);
        --ui-text: #0f172a;
        --ui-muted: #475569;
        --ui-brand: #FF4A17;
        --ui-success: #10b981;
        --ui-danger: #ef4444;
        --ui-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    html[data-theme="dark"] .nx-ui-sys {
        --ui-surface: #121212;
        --ui-border: rgba(255, 255, 255, 0.08);
        --ui-text: #ffffff;
        --ui-muted: #a1a1aa;
        --ui-shadow: 0 25px 50px rgba(0,0,0,0.8);
    }

    /* 1. TOAST CONTAINER */
    #nx-toast-container {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
    }
    @media(min-width: 1024px) {
        #nx-toast-container { bottom: 30px; left: auto; right: 30px; transform: none; }
    }

    .nx-toast {
        background: var(--ui-surface);
        border: 1px solid var(--ui-border);
        padding: 15px 25px;
        border-radius: 50px;
        box-shadow: var(--ui-shadow);
        color: var(--ui-text);
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        animation: nxToastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        position: relative;
        overflow: hidden;
    }

    .nx-toast.nx-hide { animation: nxToastOut 0.4s forwards; }

    @keyframes nxToastIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes nxToastOut { to { opacity: 0; transform: translateY(20px) scale(0.9); } }

    /* 2. GLOBAL MODAL */
    .nx-modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        z-index: 100000; display: flex; align-items: center; justify-content: center;
        opacity: 0; visibility: hidden; transition: 0.4s;
    }
    .nx-modal-overlay.open { opacity: 1; visibility: visible; }

    .nx-modal-box {
        background: var(--ui-surface); border: 1px solid var(--ui-border);
        padding: 40px; border-radius: 32px; max-width: 450px; width: 90%;
        text-align: center; box-shadow: var(--ui-shadow);
        transform: scale(0.9); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nx-modal-overlay.open .nx-modal-box { transform: scale(1); }

    .nx-modal-icon {
        width: 80px; height: 80px; border-radius: 50%; background: rgba(255,74,23,0.1);
        color: var(--ui-brand); display: flex; align-items: center; justify-content: center;
        font-size: 35px; margin: 0 auto 20px;
    }
    .nx-modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 800; color: var(--ui-text); margin-bottom: 10px; }
    .nx-modal-desc { font-size: 15px; color: var(--ui-muted); line-height: 1.6; margin-bottom: 30px; }
    
    .nx-modal-btn {
        background: var(--ui-brand); color: #fff; border: none; width: 100%;
        padding: 18px; border-radius: 50px; font-size: 14px; font-weight: 800;
        cursor: pointer; box-shadow: 0 10px 25px rgba(255,74,23,0.3); transition: 0.3s;
    }
    .nx-modal-btn:hover { transform: translateY(-3px); }
</style>

<div class="nx-ui-sys">
    <!-- TOASTS -->
    <div id="nx-toast-container"></div>

    <!-- MODAL -->
    <div class="nx-modal-overlay" id="nx-global-modal">
        <div class="nx-modal-box">
            <div class="nx-modal-icon" id="nx-modal-icon"><i class="fa-solid fa-circle-info"></i></div>
            <h2 class="nx-modal-title" id="nx-modal-title">System Alert</h2>
            <p class="nx-modal-desc" id="nx-modal-desc">Message goes here.</p>
            <button class="nx-modal-btn" id="nx-modal-btn" onclick="window.NexraUI.closeModal()">UNDERSTOOD</button>
        </div>
    </div>
</div>

<script>
    // Self-contained UI Logic
    window.NexraUI = (function() {
        
        // 1. Toast Generator
        function showToast(message, type = 'success') {
            const container = document.getElementById('nx-toast-container');
            const toast = document.createElement('div');
            toast.className = 'nx-toast';
            
            // Premium SVG Icons
            let iconSvg = '';
            if(type === 'success') iconSvg = '<svg width="20" height="20" fill="none" stroke="var(--ui-success)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
            else if(type === 'error') iconSvg = '<svg width="20" height="20" fill="none" stroke="var(--ui-danger)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            else iconSvg = '<svg width="20" height="20" fill="none" stroke="var(--ui-brand)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

            toast.innerHTML = `${iconSvg} <span>${message}</span>`;
            container.appendChild(toast);

            // Auto Remove
            setTimeout(() => {
                toast.classList.add('nx-hide');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // 2. Modal Controller
        function showModal(title, desc, iconHTML, btnText, callback) {
            const modal = document.getElementById('nx-global-modal');
            document.getElementById('nx-modal-title').innerText = title;
            document.getElementById('nx-modal-desc').innerText = desc;
            
            const iconDiv = document.getElementById('nx-modal-icon');
            iconDiv.innerHTML = iconHTML || '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
            
            const btn = document.getElementById('nx-modal-btn');
            btn.innerText = btnText || "OK";
            
            btn.onclick = () => {
                closeModal();
                if(callback && typeof callback === 'function') callback();
            };

            modal.classList.add('open');
        }

        function closeModal() {
            document.getElementById('nx-global-modal').classList.remove('open');
        }

        // Attach to global window to allow other pages to use it safely
        return { showToast, showModal, closeModal };
    })();
</script>
