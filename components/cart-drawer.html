<!-- ==========================================================================
     NEXRA ELITE CART DRAWER
     ========================================================================== -->
<style>
    .nx-cart-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        z-index: 9999; opacity: 0; visibility: hidden; transition: all var(--transition-normal);
    }
    .nx-cart-overlay.open { opacity: 1; visibility: visible; }

    .nx-cart-drawer {
        position: fixed; top: 0; right: -420px; width: 400px; max-width: 90%; height: 100%;
        background: var(--bg-surface); border-left: 1px solid var(--glass-border);
        z-index: 10000; display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.2);
        transition: right 0.5s var(--transition-normal);
    }
    .nx-cart-drawer.open { right: 0; }

    .nx-cart-head { padding: 25px 30px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
    .nx-cart-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .nx-cart-close { background: var(--bg-elevated); border: 1px solid var(--glass-border); color: var(--text-100); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
    .nx-cart-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .nx-cart-body { flex: 1; overflow-y: auto; padding: 20px 30px; display: flex; flex-direction: column; gap: 15px; }
    .nx-cart-foot { padding: 30px; border-top: 1px solid var(--glass-border); background: var(--bg-elevated); }

    .nx-cart-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--bg-base); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); position: relative; }
    .nx-cart-item img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; background: var(--bg-elevated); }
    .nx-cart-item-info { flex: 1; min-width: 0; }
    .nx-cart-item-title { font-size: 14px; font-weight: 700; color: var(--text-100); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nx-cart-item-price { font-size: 14px; font-weight: 800; color: var(--brand-main); font-family: 'Space Grotesk', sans-serif; }
    .nx-cart-item-del { color: var(--danger); background: rgba(239,68,68,0.1); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
    .nx-cart-item-del:hover { background: var(--danger); color: #fff; transform: scale(1.1); }

    .nx-cart-total-row { display: flex; justify-content: space-between; font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 800; color: var(--text-100); margin-bottom: 20px; }
</style>

<div class="nx-cart-overlay" id="nx-cart-overlay" onclick="window.NexraCart.toggle()"></div>
<aside class="nx-cart-drawer" id="nx-cart-drawer">
    <div class="nx-cart-head">
        <div class="nx-cart-title">
            <svg fill="none" stroke="var(--brand-main)" stroke-width="2.5" viewBox="0 0 24 24" width="22"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Your Cart
        </div>
        <button class="nx-cart-close" onclick="window.NexraCart.toggle()">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="16"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        </button>
    </div>
    
    <div class="nx-cart-body" id="nx-cart-items-container">
        <!-- Rendered via JS -->
    </div>
    
    <div class="nx-cart-foot">
        <div class="nx-cart-total-row">
            <span>Subtotal</span>
            <span style="color:var(--brand-main);" id="nx-cart-total-price">Rs. 0</span>
        </div>
        <button class="btn btn-primary" style="width: 100%; padding: 20px; font-size:14px;" onclick="NexraCore.navigate('checkout')">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="18"><rect height="11" rx="2" ry="2" width="18" x="3" y="11"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            SECURE CHECKOUT
        </button>
    </div>
</aside>

<script>
    // Self-contained Cart Logic
    window.NexraCart = (function() {
        let items = JSON.parse(localStorage.getItem('nexra_cart') || '[]');

        function toggle() {
            const drawer = document.getElementById('nx-cart-drawer');
            const overlay = document.getElementById('nx-cart-overlay');
            const isOpen = drawer.classList.contains('open');
            
            if (isOpen) {
                drawer.classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            } else {
                render();
                drawer.classList.add('open');
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }
        }

        function addItem(product) {
            items.push(product);
            save();
            if (window.NexraCore && window.NexraCore.showToast) {
                window.NexraCore.showToast(`${product.title} added to cart`, 'success');
            }
        }

        function removeItem(index) {
            items.splice(index, 1);
            save();
            render();
        }

        function save() {
            localStorage.setItem('nexra_cart', JSON.stringify(items));
            updateBadge();
        }

        function updateBadge() {
            const badge = document.getElementById('global-cart-badge');
            if (badge) {
                badge.innerText = items.length;
                badge.style.display = items.length > 0 ? 'flex' : 'none';
            }
        }

        function render() {
            const container = document.getElementById('nx-cart-items-container');
            const totalEl = document.getElementById('nx-cart-total-price');
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="background:transparent; border:none;">
                        <i class="fa-solid fa-basket-shopping empty-state-icon" style="opacity:0.3;"></i>
                        <h4 class="empty-state-title">Cart is Empty</h4>
                        <p class="empty-state-desc">Browse the marketplace and add items.</p>
                    </div>`;
                totalEl.innerText = 'Rs. 0';
                return;
            }

            let html = '';
            let subtotal = 0;
            
            items.forEach((item, index) => {
                subtotal += Number(item.price);
                html += `
                    <div class="nx-cart-item">
                        <img src="${item.image}" alt="${item.title}">
                        <div class="nx-cart-item-info">
                            <div class="nx-cart-item-title">${item.title}</div>
                            <div class="nx-cart-item-price">Rs. ${item.price}</div>
                        </div>
                        <button class="nx-cart-item-del" onclick="NexraCart.removeItem(${index})">
                            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            totalEl.innerText = 'Rs. ' + subtotal.toLocaleString();
        }

        // Initialize badge on load
        updateBadge();

        return { toggle, addItem, removeItem, getItems: () => items };
    })();
</script>
