<!-- ==========================================================================
     NEXRA ELITE HEADER COMPONENT
     ========================================================================== -->
<style>
    /* Scoped Header Styles */
    .nx-header-wrap {
        position: fixed;
        top: 15px;
        left: 0;
        width: 100%;
        z-index: 9000;
        padding: 0 4%;
        pointer-events: none;
        animation: slideDownHeader 0.6s var(--transition-normal) forwards;
    }

    @keyframes slideDownHeader {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .nx-island-nav {
        max-width: var(--max-width);
        margin: 0 auto;
        background: var(--nav-blur);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-pill);
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow-soft);
        pointer-events: auto;
        transition: all var(--transition-normal);
    }

    .nx-logo-sec {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
        padding: 4px 15px 4px 4px;
        border-radius: var(--radius-pill);
        transition: background var(--transition-fast);
    }
    
    .nx-logo-sec:hover { background: var(--bg-elevated); }

    .nx-logo-icon {
        width: 42px;
        height: 42px;
        background: var(--bg-surface);
        border-radius: 50%;
        border: 1px solid var(--glass-border);
        box-shadow: 0 5px 15px var(--brand-glow);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px;
    }

    .nx-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .nx-title-img { height: 16px; filter: invert(1); transition: filter 0.3s; }
    html[data-theme="dark"] .nx-title-img { filter: none; }

    /* Desktop Navigation */
    .nx-desktop-nav {
        display: none;
        align-items: center;
        gap: 5px;
        background: var(--bg-elevated);
        padding: 6px;
        border-radius: var(--radius-pill);
        border: 1px solid var(--glass-border);
    }

    @media(min-width: 1024px) {
        .nx-desktop-nav { display: flex; }
        .nx-mobile-menu-btn { display: none !important; }
    }

    .nx-nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-200);
        padding: 10px 20px;
        border-radius: var(--radius-pill);
        cursor: pointer;
        transition: all var(--transition-fast);
    }

    .nx-nav-item svg { width: 16px; height: 16px; opacity: 0.7; transition: opacity 0.3s, transform 0.3s; }
    .nx-nav-item:hover { color: var(--brand-main); background: var(--bg-surface); }
    .nx-nav-item:hover svg { opacity: 1; transform: scale(1.1); }
    .nx-nav-item.active { background: var(--brand-main); color: #fff; box-shadow: 0 8px 20px var(--brand-glow); }
    .nx-nav-item.active svg { opacity: 1; }

    /* Action Buttons */
    .nx-actions { display: flex; align-items: center; gap: 8px; }
    .nx-action-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--bg-surface);
        border: 1px solid var(--glass-border);
        color: var(--text-100);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all var(--transition-fast);
        position: relative;
    }

    .nx-action-btn svg { width: 20px; height: 20px; transition: transform 0.3s; }
    .nx-action-btn:hover { background: var(--brand-main); color: #fff; border-color: var(--brand-main); transform: translateY(-3px); box-shadow: 0 8px 20px var(--brand-glow); }
    .nx-action-btn:hover svg { transform: scale(1.1); }
    .nx-action-btn:active { transform: scale(0.95); }

    .nx-cart-badge {
        position: absolute;
        top: -2px;
        right: -2px;
        min-width: 20px;
        height: 20px;
        background: var(--brand-main);
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--bg-surface);
    }
</style>

<div class="nx-header-wrap">
    <header class="nx-island-nav">
        
        <!-- LOGO -->
        <div class="nx-logo-sec" onclick="NexraCore.navigate('home')">
            <div class="nx-logo-icon">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Nexra">
            </div>
            <img class="nx-title-img" src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra PK">
        </div>

        <!-- DESKTOP NAVIGATION -->
        <nav class="nx-desktop-nav">
            <div class="nx-nav-item" onclick="NexraCore.navigate('home')">
                <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </div>
            <div class="nx-nav-item" onclick="NexraCore.navigate('shop')">
                <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                Marketplace
            </div>
            <div class="nx-nav-item" onclick="NexraCore.navigate('freebies')">
                <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Free Vault
            </div>
            <div class="nx-nav-item" onclick="NexraCore.navigate('blog')">
                <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Academy
            </div>
        </nav>

        <!-- ACTION BUTTONS -->
        <div class="nx-actions">
            <!-- Theme Toggle -->
            <button class="nx-action-btn" title="Toggle Theme" onclick="NexraCore.toggleTheme()">
                <svg id="theme-icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <!-- Default to Moon. Core.js updates this based on theme -->
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>

            <!-- Cart Toggle -->
            <button class="nx-action-btn" title="Shopping Cart" onclick="window.NexraCart && window.NexraCart.toggle()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <span class="nx-cart-badge" id="global-cart-badge">0</span>
            </button>

            <!-- User Profile (Desktop) -->
            <button class="nx-action-btn" title="User Profile" style="display:none; @media(min-width:1024px){display:flex;}" onclick="NexraCore.navigate('login')">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>

            <!-- Mobile Menu -->
            <button class="nx-action-btn nx-mobile-menu-btn" title="Menu">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
    </header>
</div>

<!-- Inline Script to Sync Theme Icon instantly -->
<script>
    window.addEventListener('themeChanged', (e) => {
        const icon = document.getElementById('theme-icon-svg');
        if(e.detail.theme === 'dark') {
            icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
        } else {
            icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
        }
    });
</script>
