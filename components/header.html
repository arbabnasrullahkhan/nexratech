<style>
    /* ==========================================
       ISLAND HEADER STYLING
       ========================================== */
    .nx-header-wrapper {
        position: fixed; top: 15px; left: 0; width: 100%;
        z-index: 9000; padding: 0 4%; pointer-events: none;
    }

    .nx-island-nav {
        max-width: 1400px; margin: 0 auto;
        background: var(--nav-blur);
        backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border); border-radius: 50px;
        padding: 10px 18px; display: flex; justify-content: space-between;
        align-items: center; box-shadow: var(--shadow-sm);
        pointer-events: auto; transition: var(--transition);
    }

    /* Logo Logic */
    .h-logo-group { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .h-logo-icon {
        width: 38px; height: 38px; background: #fff; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--glass-border); padding: 5px;
        box-shadow: 0 5px 15px var(--brand-glow); overflow: hidden;
    }
    .h-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .h-title-img { height: 16px; filter: brightness(0); opacity: 0.9; }
    [data-theme="dark"] .h-title-img { filter: invert(1); }

    /* Desktop Navigation (Center) */
    .h-nav-links {
        display: none; align-items: center; gap: 5px;
        background: var(--bg-elevated); padding: 6px; border-radius: 50px;
        border: 1px solid var(--glass-border);
    }
    .h-nav-item {
        font-size: 11px; font-weight: 800; color: var(--text-200);
        padding: 8px 18px; border-radius: 40px; text-transform: uppercase;
        letter-spacing: 0.5px; transition: 0.3s; cursor: pointer;
    }
    .h-nav-item:hover { color: var(--brand-main); }
    .h-nav-item.active { background: var(--brand-main); color: #fff; box-shadow: 0 4px 12px var(--brand-glow); }

    /* Actions (Right) */
    .h-actions { display: flex; align-items: center; gap: 8px; }
    .h-btn {
        width: 42px; height: 42px; border-radius: 50%;
        background: var(--bg-surface); border: 1px solid var(--glass-border);
        color: var(--text-100); display: flex; align-items: center;
        justify-content: center; transition: 0.3s var(--ease); cursor: pointer;
        position: relative;
    }
    .h-btn:hover { border-color: var(--brand-main); color: var(--brand-main); transform: scale(1.05); }

    .h-cart-badge {
        position: absolute; top: -3px; right: -3px;
        background: var(--brand-main); color: #fff; font-size: 9px;
        font-weight: 900; width: 18px; height: 18px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid var(--bg-surface); box-shadow: 0 4px 10px var(--brand-glow);
    }

    .h-auth-avatar {
        width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
        display: none; /* Shown via JS */
    }

    @media(min-width: 992px) { .h-nav-links { display: flex; } }
</style>

<div class="nx-header-wrapper">
    <header class="nx-island-nav">
        <!-- Brand -->
        <div class="h-logo-group" onclick="NexraRouter.loadView(NexraRoutes.generateURL('home'))">
            <div class="h-logo-icon">
                <img class="nx-brand-logo" src="" alt="N">
            </div>
            <img class="h-title-img nx-brand-title" src="" alt="Nexra">
        </div>

        <!-- Desktop Navigation -->
        <nav class="h-nav-links">
            <div class="h-nav-item active" onclick="NexraRouter.loadView(NexraRoutes.generateURL('home'))">Home</div>
            <div class="h-nav-item" onclick="NexraRouter.loadView(NexraRoutes.generateURL('shop'))">Market</div>
            <div class="h-nav-item" onclick="NexraRouter.loadView(NexraRoutes.generateURL('freebies'))">Vault</div>
            <div class="h-nav-item" onclick="NexraRouter.loadView(NexraRoutes.generateURL('blog'))">Insights</div>
        </nav>

        <!-- Dynamic Actions -->
        <div class="h-actions">
            <!-- Cart Trigger -->
            <button class="h-btn" onclick="NexraUI.toggleCart()" aria-label="Cart">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="header-cart-count" class="h-cart-badge">0</span>
            </button>

            <!-- User Auth Node -->
            <button class="h-btn" id="h-auth-node" onclick="NexraRouter.loadView(NexraRoutes.generateURL('profile'))">
                <i id="h-auth-icon" class="fa-solid fa-circle-user"></i>
                <img id="h-auth-img" class="h-auth-avatar" src="" alt="User">
            </button>

            <!-- Slider Toggle -->
            <button class="h-btn" onclick="NexraUI.toggleSlider()" aria-label="Menu">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>
    </header>
</div>

<script>
    /**
     * Header Logic: Monitor Auth State & Cart
     */
    (function() {
        firebase.auth().onAuthStateChanged(user => {
            const icon = document.getElementById('h-auth-icon');
            const img = document.getElementById('h-auth-img');
            if (user) {
                icon.style.display = 'none';
                img.src = user.photoURL || 'https://via.placeholder.com/100';
                img.style.display = 'block';
            } else {
                icon.style.display = 'block';
                img.style.display = 'none';
            }
        });
    })();
</script>
