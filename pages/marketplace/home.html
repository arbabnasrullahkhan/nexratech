<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra PK | Elite Dashboard</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ==========================================================================
           1. LOCAL DESIGN SYSTEM (SELF-CONTAINED)
           ========================================================================== */
        :root {
            --brand: #FF4A17;
            --brand-glow: rgba(255, 74, 23, 0.25);
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-elevated: #f1f5f9;
            --text-100: #0f172a;
            --text-200: #475569;
            --text-300: #94a3b8;
            --glass-border: rgba(0, 0, 0, 0.06);
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        html[data-theme="dark"] {
            --bg-base: #050505;
            --bg-surface: #121212;
            --bg-elevated: #1a1a1a;
            --text-100: #ffffff;
            --text-200: #a1a1aa;
            --text-300: #52525b;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-100); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        .text-gradient { background: linear-gradient(135deg, var(--brand) 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 5%; }

        /* ==========================================================================
           2. HERO SECTION
           ========================================================================== */
        .nx-hero {
            position: relative;
            padding: 180px 0 100px;
            text-align: center;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, var(--brand-glow) 0%, transparent 50%);
        }

        .nx-hero-content { position: relative; z-index: 2; }
        .nx-hero-title { font-size: clamp(32px, 8vw, 64px); font-weight: 800; letter-spacing: -2px; line-height: 1.1; margin-bottom: 20px; }
        .nx-hero-desc { font-size: 18px; color: var(--text-200); max-width: 600px; margin: 0 auto 40px; font-weight: 500; }

        /* 3. SEARCH BAR */
        .nx-search-wrapper { max-width: 700px; margin: 0 auto; padding: 0 20px; transform: translateY(-30px); }
        .nx-search-box {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .nx-search-box input { flex: 1; border: none; background: transparent; font-size: 16px; color: var(--text-100); outline: none; font-family: inherit; }
        .nx-search-btn { background: var(--brand); color: white; border: none; padding: 12px 28px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; }

        /* 4. PRODUCT GRID */
        .nx-section-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; }
        .nx-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media(min-width: 768px) { .nx-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media(min-width: 1024px) { .nx-grid { grid-template-columns: repeat(5, 1fr); } }

        .nx-card {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .nx-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--brand); }
        .nx-card-img { width: 100%; aspect-ratio: 1; border-radius: 14px; object-fit: cover; background: var(--bg-elevated); margin-bottom: 12px; }
        .nx-card-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 40px; }
        .nx-card-price { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--brand); }

        /* 5. LOADING STATES */
        .skeleton { background: var(--bg-elevated); border-radius: 12px; animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* 6. COMPONENT PLACEHOLDERS */
        .component-load { min-height: 50px; }
    </style>
</head>
<body>

    <!-- A. CINEMATIC LOADER (Component) -->
    <div data-include="loader"></div>

    <!-- B. GLOBAL UI NOTIFICATIONS (Component) -->
    <div data-include="ui-notifications"></div>

    <!-- C. GLOBAL HEADER (Component) -->
    <div data-include="header" class="component-load"></div>

    <!-- D. MAIN CONTENT -->
    <main>
        <!-- Hero Section -->
        <section class="nx-hero">
            <div class="container nx-hero-content">
                <div style="display:inline-block; background:rgba(255,74,23,0.1); color:var(--brand); padding:6px 16px; border-radius:50px; font-size:11px; font-weight:800; letter-spacing:2px; margin-bottom:20px;">
                    <i class="fa-solid fa-bolt"></i> AUTOMATED DISPATCH SYSTEM
                </div>
                <h1 class="nx-hero-title tech-font">Digital <span class="text-gradient">Ecosystem</span><br>For The Elite</h1>
                <p class="nx-hero-desc">Experience Pakistan's most trusted marketplace for genuine licenses, SaaS tools, and premium developer assets.</p>
            </div>
        </section>

        <!-- Search Bar -->
        <div class="nx-search-wrapper">
            <div class="nx-search-box">
                <i class="fa-solid fa-magnifying-glass" style="color:var(--text-300)"></i>
                <input type="text" id="global-search" placeholder="Search for CapCut, Canva, Netflix...">
                <button class="nx-search-btn tech-font">SEARCH</button>
            </div>
        </div>

        <!-- Trending Products -->
        <section class="container" style="padding: 60px 0;">
            <div class="nx-section-head">
                <div>
                    <h2 class="tech-font" style="font-size:28px;">Trending <span class="text-gradient">Now</span></h2>
                    <p style="color:var(--text-300); font-size:14px; font-weight:600;">Top selling assets updated in real-time</p>
                </div>
                <button onclick="location.href='/s'" style="background:none; border:none; color:var(--brand); font-weight:800; font-size:13px; cursor:pointer;">VIEW ALL <i class="fa-solid fa-arrow-right"></i></button>
            </div>

            <!-- Firebase Target Grid -->
            <div class="nx-grid" id="trending-grid">
                <!-- Skeletons (Will be replaced by Firebase JS) -->
                <div class="nx-card skeleton" style="height:280px;"></div>
                <div class="nx-card skeleton" style="height:280px;"></div>
                <div class="nx-card skeleton" style="height:280px;"></div>
                <div class="nx-card skeleton" style="height:280px;"></div>
                <div class="nx-card skeleton" style="height:280px;"></div>
            </div>
        </section>
    </main>

    <!-- E. SHOPPING CART DRAWER (Component) -->
    <div data-include="cart-drawer"></div>

    <!-- F. MOBILE NAVIGATION (Component) -->
    <div data-include="navigation"></div>

    <!-- G. GLOBAL FOOTER (Component) -->
    <div data-include="footer" class="component-load"></div>

    <!-- ==========================================================================
         CORE SCRIPT ENGINE
         ========================================================================== -->
    <script type="module">
        // 1. IMPORT FIREBASE CONFIG
        import { db } from "../../assets/js/firebase-config.js";
        import { collection, onSnapshot, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.NexraHome = (function() {
            'use strict';

            // 2. COMPONENT INJECTOR (Self-contained)
            async function injectComponents() {
                const elements = document.querySelectorAll('[data-include]');
                for (let el of elements) {
                    const comp = el.getAttribute('data-include');
                    try {
                        const response = await fetch(`../../components/${comp}.html`);
                        if (response.ok) {
                            el.innerHTML = await response.text();
                            // Re-init scripts inside injected HTML
                            el.querySelectorAll('script').forEach(oldScript => {
                                const newScript = document.createElement('script');
                                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                                oldScript.parentNode.replaceChild(newScript, oldScript);
                            });
                        }
                    } catch (err) { console.error(`Error loading ${comp}:`, err); }
                }
            }

            // 3. FETCH DYNAMIC PRODUCTS FROM FIREBASE
            function loadTrendingProducts() {
                const grid = document.getElementById('trending-grid');
                const q = query(collection(db, "products"), where("isTrending", "==", true), limit(5));

                onSnapshot(q, (snapshot) => {
                    grid.innerHTML = ''; // Clear skeletons
                    if (snapshot.empty) {
                        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-300);">No trending products found.</p>';
                        return;
                    }

                    snapshot.forEach((doc) => {
                        const p = doc.data();
                        grid.innerHTML += `
                            <div class="nx-card" onclick="location.href='/p/${p.slug}'">
                                <img src="${p.image}" class="nx-card-img" alt="${p.title}">
                                <h3 class="nx-card-title">${p.title}</h3>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span class="nx-card-price">Rs. ${p.price}</span>
                                    <button class="nx-add-cart" onclick="event.stopPropagation(); NexraCart.addItem({id:'${doc.id}', title:'${p.title}', price:${p.price}, image:'${p.image}'})" style="background:var(--bg-elevated); border:none; width:32px; height:32px; border-radius:8px; color:var(--text-200); cursor:pointer;"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }, (error) => {
                    console.error("Firebase Error:", error);
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--danger);">Failed to sync with database.</p>';
                });
            }

            // 4. THEME SYNC
            function syncTheme() {
                const theme = localStorage.getItem('nexra-theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
            }

            return {
                init: function() {
                    syncTheme();
                    injectComponents();
                    loadTrendingProducts();
                }
            };
        })();

        document.addEventListener('DOMContentLoaded', () => NexraHome.init());
    </script>
</body>
</html>
