<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra Navigation</title>
    <style>
        /* ==========================================================================
           NAVIGATION SYSTEM (ISLAND HEADER & MOBILE DOCK)
           ========================================================================== */
        
        /* 1. Desktop Island Header (Hidden on Mobile) */
        .nx-header-wrap { position: fixed; top: 20px; left: 0; width: 100%; z-index: 9000; padding: 0 4%; pointer-events: none; display: none; }
        @media(min-width: 992px) { .nx-header-wrap { display: block; } }

        .nx-island-nav { max-width: 1400px; margin: 0 auto; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(0,0,0,0.06); border-radius: 50px; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); pointer-events: auto; }
        [data-theme="dark"] .nx-island-nav { background: rgba(10, 10, 10, 0.85); border-color: rgba(255,255,255,0.08); }

        .nx-logo-sec { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .nx-logo-icon { width: 40px; height: 40px; background: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.06); padding: 5px; box-shadow: 0 5px 15px rgba(255,74,23,0.15); }
        .nx-title-img { height: 16px; filter: invert(1); mix-blend-mode: multiply; }
        [data-theme="dark"] .nx-title-img { filter: none; mix-blend-mode: screen; }

        .nx-desktop-links { display: flex; align-items: center; gap: 32px; background: rgba(255, 255, 255, 0.5); padding: 12px 35px; border-radius: 50px; border: 1px solid rgba(0,0,0,0.04); }
        [data-theme="dark"] .nx-desktop-links { background: rgba(20,20,20,0.5); border-color: rgba(255,255,255,0.05); }
        
        .nx-nav-item { font-size: 13px; font-weight: 700; color: #475569; cursor: pointer; transition: 0.3s; position: relative; }
        [data-theme="dark"] .nx-nav-item { color: #a1a1aa; }
        .nx-nav-item:hover { color: #FF4A17; }
        .nx-nav-item.active { color: #0f172a; }
        [data-theme="dark"] .nx-nav-item.active { color: #ffffff; }
        .nx-nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: #FF4A17; box-shadow: 0 0 10px #FF4A17; }

        .nx-header-actions { display: flex; align-items: center; gap: 12px; }
        .nx-action-btn { width: 44px; height: 44px; border-radius: 50%; background: #ffffff; border: 1px solid rgba(0,0,0,0.06); color: #0f172a; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        [data-theme="dark"] .nx-action-btn { background: #121212; border-color: rgba(255,255,255,0.08); color: #ffffff; }
        .nx-action-btn:hover { color: #FF4A17; border-color: #FF4A17; }

        /* 2. Mobile Bottom Dock (90% Users) */
        .nx-dock-wrap { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 9000; pointer-events: none; }
        @media(min-width: 992px) { .nx-dock-wrap { display: none; } }

        .nx-dock-ui { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(0,0,0,0.08); border-radius: 40px; height: 75px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); pointer-events: auto; width: 92%; max-width: 450px; }
        [data-theme="dark"] .nx-dock-ui { background: rgba(15, 15, 15, 0.9); border-color: rgba(255,255,255,0.08); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        .nx-dock-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #94a3b8; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); flex: 1; position: relative; }
        [data-theme="dark"] .nx-dock-item { color: #52525b; }
        .nx-dock-item i { font-size: 22px; transition: 0.4s; }
        .nx-dock-item span { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0; transform: translateY(10px); transition: 0.4s; position: absolute; bottom: -18px; }
        
        .nx-dock-item.active { color: #FF4A17; transform: translateY(-8px); }
        .nx-dock-item.active i { filter: drop-shadow(0 5px 15px rgba(255,74,23,0.3)); transform: scale(1.15); }
        .nx-dock-item.active span { opacity: 1; transform: translateY(0); bottom: -20px; color: #0f172a; }
        [data-theme="dark"] .nx-dock-item.active span { color: #ffffff; }

        /* Mobile Top Mini Header */
        .nx-mobile-top { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 8900; background: linear-gradient(180deg, var(--bg-base) 0%, transparent 100%); pointer-events: none; }
        @media(min-width: 992px) { .nx-mobile-top { display: none; } }
    </style>
</head>
<body>

    <!-- 1. DESKTOP ISLAND HEADER -->
    <header class="nx-header-wrap">
        <div class="nx-island-nav">
            <div class="nx-logo-sec" onclick="NexraApp.navTo('home')">
                <div class="nx-logo-icon"><img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Logo"></div>
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/12945C3A-733B-45AB-9722-044C592AC5C7.jpeg" alt="Nexra" class="nx-title-img">
            </div>
            
            <nav class="nx-desktop-links">
                <div class="nx-nav-item active" data-target="home" onclick="NexraApp.navTo('home')">Home</div>
                <div class="nx-nav-item" data-target="shop" onclick="NexraApp.navTo('shop')">Marketplace</div>
                <div class="nx-nav-item" data-target="freebies" onclick="NexraApp.navTo('freebies')">Free Vault</div>
                <div class="nx-nav-item" data-target="blog" onclick="NexraApp.navTo('blog')">Academy</div>
                <div class="nx-nav-item" data-target="profile" onclick="NexraApp.navTo('profile')">Profile</div>
            </nav>

            <div class="nx-header-actions">
                <button class="nx-action-btn" onclick="NexraApp.toggleCart()">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="desk-cart-count" style="position:absolute; top:-4px; right:-4px; background:#FF4A17; color:#fff; font-size:9px; font-weight:800; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;">0</span>
                </button>
                <button class="nx-action-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
            </div>
        </div>
    </header>

    <!-- 2. MOBILE TOP BAR (Logo & Cart Only) -->
    <div class="nx-mobile-top">
        <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" alt="Logo" style="width: 40px; pointer-events: auto;" onclick="NexraApp.navTo('home')">
        <div style="display:flex; gap:10px; pointer-events: auto;">
            <button class="nx-action-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon-mob"></i></button>
            <button class="nx-action-btn" onclick="NexraApp.toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
            </button>
        </div>
    </div>

    <!-- 3. MOBILE BOTTOM DOCK -->
    <nav class="nx-dock-wrap">
        <div class="nx-dock-ui">
            <div class="nx-dock-item nx-nav-item active" data-target="home" onclick="NexraApp.navTo('home')">
                <i class="fa-solid fa-house-chimney"></i><span>Home</span>
            </div>
            <div class="nx-dock-item nx-nav-item" data-target="shop" onclick="NexraApp.navTo('shop')">
                <i class="fa-solid fa-store"></i><span>Market</span>
            </div>
            <div class="nx-dock-item nx-nav-item" data-target="freebies" onclick="NexraApp.navTo('freebies')">
                <i class="fa-solid fa-cloud-arrow-down"></i><span>Vault</span>
            </div>
            <div class="nx-dock-item nx-nav-item" data-target="blog" onclick="NexraApp.navTo('blog')">
                <i class="fa-solid fa-newspaper"></i><span>Academy</span>
            </div>
            <div class="nx-dock-item nx-nav-item" data-target="profile" onclick="NexraApp.navTo('profile')">
                <i class="fa-solid fa-circle-user"></i><span>Profile</span>
            </div>
        </div>
    </nav>

    <!-- Theme Toggle Script -->
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('nexra_theme', newTheme);
            
            // Update Icons
            const iconClass = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            document.getElementById('theme-icon').className = iconClass;
            document.getElementById('theme-icon-mob').className = iconClass;
            
            // Meta tag update
            document.getElementById('meta-theme-color').setAttribute('content', newTheme === 'dark' ? '#020202' : '#f8fafc');
        }

        // Set initial icon state based on saved theme
        if(localStorage.getItem('nexra_theme') === 'dark') {
            document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            document.getElementById('theme-icon-mob').className = 'fa-solid fa-sun';
        }
    </script>
</body>
</html>
