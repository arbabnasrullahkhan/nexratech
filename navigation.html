<!-- 
  NEXRA TECH PK - NAVIGATION SYSTEM
  COMPONENTS: TOP HEADER, BOTTOM DOCK, SIDEBAR, FLOATING ACTION
-->

<style>
    /* ==========================================================================
       1. TOP HEADER (ISLAND NAV)
       ========================================================================== */
    .header-wrap { 
        position: fixed; top: 15px; left: 0; width: 100%; z-index: 9000; 
        padding: 0 4%; pointer-events: none; 
    }
    
    .island-nav { 
        max-width: 1400px; margin: 0 auto; background: var(--nav-blur); 
        backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
        border: 1px solid var(--glass-border); border-radius: 50px; 
        padding: 10px 18px; display: flex; justify-content: space-between; 
        align-items: center; box-shadow: var(--shadow-soft); pointer-events: auto; 
    }
    
    .di-logo-sec { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .di-logo-icon { 
        width: 40px; height: 40px; background: var(--bg-surface); border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        border: 1px solid var(--glass-border); padding: 5px; box-shadow: 0 4px 12px var(--brand-glow); 
    }
    .di-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    
    .di-title-img { height: 16px; transition: var(--transition); filter: brightness(0.1); }
    [data-theme="dark"] .di-title-img { filter: brightness(1) invert(0); }
    
    /* DESKTOP NAV TABS */
    .desktop-links { 
        display: none; align-items: center; gap: 25px; background: var(--bg-elevated); 
        padding: 8px 30px; border-radius: 50px; border: 1px solid var(--glass-border); 
    }
    
    .d-nav-item { 
        font-size: 13px; font-weight: 700; color: var(--text-200); cursor: pointer; 
        transition: 0.3s; position: relative; letter-spacing: 0.3px; 
    }
    .d-nav-item:hover { color: var(--brand-main); }
    .d-nav-item.active { color: var(--text-100); }
    .d-nav-item.active::after { 
        content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); 
        width: 4px; height: 4px; border-radius: 50%; background: var(--brand-main); 
        box-shadow: 0 0 8px var(--brand-main); 
    }

    .di-actions { display: flex; align-items: center; gap: 10px; }
    .di-btn { 
        width: 42px; height: 42px; border-radius: 50%; background: var(--bg-surface); 
        border: 1px solid var(--glass-border); color: var(--text-100); font-size: 15px; 
        cursor: pointer; transition: 0.3s; position: relative; display: flex; 
        align-items: center; justify-content: center;
    }
    .di-btn:hover { border-color: var(--brand-main); color: var(--brand-main); transform: translateY(-2px); }
    
    #cart-count { 
        position: absolute; top: -2px; right: -2px; background: var(--brand-main); 
        color: #fff; font-size: 9px; font-weight: 800; width: 17px; height: 17px; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        box-shadow: 0 2px 8px var(--brand-glow);
    }

    /* ==========================================================================
       2. MOBILE BOTTOM DOCK
       ========================================================================== */
    .dock-container-wrap { 
        position: fixed; bottom: 20px; left: 0; width: 100%; 
        display: flex; justify-content: center; z-index: 8500; pointer-events: none; 
    }
    
    .dock-ui { 
        background: var(--nav-blur); backdrop-filter: blur(30px); 
        -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); 
        border-radius: 35px; height: 70px; display: flex; justify-content: space-around; 
        align-items: center; padding: 0 10px; box-shadow: var(--shadow-float); 
        pointer-events: auto; width: 92%; max-width: 450px; 
    }
    
    .dock-item { 
        display: flex; flex-direction: column; align-items: center; gap: 4px; 
        color: var(--text-300); cursor: pointer; transition: 0.4s var(--transition); 
        flex: 1; position: relative; 
    }
    .dock-item i { font-size: 20px; transition: 0.3s; }
    .dock-item span { 
        font-size: 9px; font-weight: 800; text-transform: uppercase; 
        letter-spacing: 0.5px; opacity: 0; transform: translateY(8px); 
        transition: 0.3s; position: absolute; bottom: -15px; 
    }
    
    .dock-item.active { color: var(--brand-main); transform: translateY(-5px); }
    .dock-item.active i { filter: drop-shadow(0 4px 10px var(--brand-glow)); }
    .dock-item.active span { opacity: 1; transform: translateY(0); color: var(--text-100); }

    /* ==========================================================================
       3. SIDEBAR & OVERLAY
       ========================================================================== */
    .sb-overlay { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
        backdrop-filter: blur(8px); z-index: 9998; opacity: 0; 
        visibility: hidden; transition: 0.4s; 
    }
    .sb-overlay.active { opacity: 1; visibility: visible; }
    
    .sb-drawer { 
        position: fixed; top: 0; right: -360px; width: 340px; max-width: 85%; 
        height: 100%; background: var(--bg-base); z-index: 9999; padding: 30px 20px; 
        transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -15px 0 40px rgba(0,0,0,0.1); 
        border-left: 1px solid var(--glass-border); display: flex; flex-direction: column;
    }
    .sb-drawer.active { right: 0; }
    
    .sb-group { margin-bottom: 30px; }
    .sb-head { 
        font-size: 10px; font-weight: 800; color: var(--text-300); 
        text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; 
        display: block; padding-left: 5px; 
    }
    
    .sb-link { 
        display: flex; align-items: center; gap: 14px; padding: 15px 18px; 
        border-radius: 16px; color: var(--text-100); font-size: 14px; 
        font-weight: 600; transition: 0.3s; cursor: pointer; background: var(--bg-surface); 
        margin-bottom: 8px; border: 1px solid transparent;
    }
    .sb-link i { font-size: 16px; width: 22px; text-align: center; color: var(--text-300); }
    .sb-link:hover { 
        background: var(--bg-elevated); border-color: var(--glass-border); 
        transform: translateX(6px); color: var(--brand-main);
    }
    .sb-link:hover i { color: var(--brand-main); }

    /* ==========================================================================
       4. FLOATING ACTION (WHATSAPP)
       ========================================================================== */
    .wa-float {
        position: fixed; bottom: 105px; right: 20px; width: 55px; height: 55px; 
        background: #25D366; color: #fff; border-radius: 50%; display: flex; 
        align-items: center; justify-content: center; font-size: 26px; 
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); z-index: 8000; 
        transition: 0.4s; text-decoration: none; animation: nxFloat 3s ease-in-out infinite;
    }
    .wa-float:hover { transform: scale(1.1); filter: brightness(1.1); }

    @keyframes nxFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* RESPONSIVE LOGIC */
    @media(min-width: 992px) {
        .desktop-links { display: flex; }
        .mobile-menu-btn { display: none; }
        .dock-container-wrap { display: none !important; }
        .wa-float { bottom: 30px; }
    }
</style>

<script>
    /* LOCAL TOGGLE LOGIC */
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebar-overlay').classList.toggle('active');
    }

    // Sync active state with Router
    window.addEventListener('popstate', () => {
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view') || 'home';
        document.querySelectorAll('[data-nav]').forEach(el => {
            el.classList.toggle('active', el.getAttribute('data-nav') === view);
        });
    });
</script>
