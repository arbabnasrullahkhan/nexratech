<style>
    /* ==========================================================================
       NEXRA PREMIUM MOBILE DOCK (SYNCED & OPTIMIZED)
       ========================================================================== */
    
    .nxr-dock-wrap {
        position: fixed;
        bottom: 24px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9500;
        pointer-events: none;
        padding-bottom: env(safe-area-inset-bottom);
        animation: nxr-dock-up 0.6s var(--ease) both;
    }

    /* ── DESKTOP PER: HIDE DOCK ── */
    @media (min-width: 992px) {
        .nxr-dock-wrap { display: none !important; }
    }

    @keyframes nxr-dock-up {
        from { transform: translateY(100px); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
    }

    .nxr-dock-ui {
        background: var(--glass-bg);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 40px;
        height: 70px;
        width: 92%;
        max-width: 440px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 10px;
        box-shadow: var(--shadow-float);
        pointer-events: auto;
    }

    .nxr-dock-item {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        height: 100%;
        color: var(--text-300);
        cursor: pointer;
        transition: 0.3s var(--ease);
        text-decoration: none;
    }

    .nxr-dock-item i {
        font-size: 19px;
        margin-bottom: 2px;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
    }

    .nxr-dock-item span {
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.3s var(--ease);
        position: absolute;
        bottom: 12px;
    }

    /* ── ACTIVE STATE ── */
    .nxr-dock-item.active {
        color: var(--brand);
    }

    .nxr-dock-item.active i {
        transform: translateY(-12px) scale(1.15);
        filter: drop-shadow(0 6px 10px var(--brand-glow));
    }

    .nxr-dock-item.active span {
        opacity: 1;
        transform: translateY(0);
        color: var(--text-100);
    }

    .nxr-dock-item.active::after {
        content: '';
        position: absolute;
        bottom: 6px;
        width: 4px;
        height: 4px;
        background: var(--brand);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--brand);
        animation: nxr-pop-in 0.4s forwards;
    }

    @keyframes nxr-pop-in {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
</style>

<div class="nxr-dock-wrap">
    <nav class="nxr-dock-ui">
        <!-- 1. Home -->
        <div class="nxr-dock-item active" data-route="home">
            <i class="fa-solid fa-house-chimney"></i>
            <span>Home</span>
        </div>

        <!-- 2. Market -->
        <div class="nxr-dock-item" data-route="shop">
            <i class="fa-solid fa-store"></i>
            <span>Market</span>
        </div>

        <!-- 3. Vault -->
        <div class="nxr-dock-item" data-route="vault">
            <i class="fa-solid fa-cloud-arrow-down"></i>
            <span>Vault</span>
        </div>

        <!-- 4. Insights -->
        <div class="nxr-dock-item" data-route="blog">
            <i class="fa-solid fa-newspaper"></i>
            <span>Insights</span>
        </div>

        <!-- 5. Profile -->
        <div class="nxr-dock-item" data-route="profile">
            <i class="fa-solid fa-circle-user"></i>
            <span>Profile</span>
        </div>
    </nav>
</div>

<script>
    /**
     * MOBILE DOCK LOGIC
     * Integrates directly with NXR Global Engine
     */
    (function() {
        function updateDockUI(route) {
            document.querySelectorAll('.nxr-dock-item').forEach(item => {
                item.classList.toggle('active', item.dataset.route === route);
            });
        }

        // Listen for Global Navigation events
        document.addEventListener('click', (e) => {
            const dockItem = e.target.closest('.nxr-dock-item');
            if (dockItem) {
                const route = dockItem.dataset.route;
                
                // Trigger NXR Engine Navigation
                if (window.NXR && typeof window.NXR.navigate === 'function') {
                    window.NXR.navigate(route);
                    updateDockUI(route);
                }

                // Haptic Feedback
                if ("vibrate" in navigator) navigator.vibrate(12);
            }
        });

        // Initial Sync on load
        window.addEventListener('load', () => {
            const currentView = new URLSearchParams(window.location.search).get('view') || 'home';
            updateDockUI(currentView);
        });

        // Popstate support (Back button)
        window.addEventListener('popstate', () => {
            const currentView = new URLSearchParams(window.location.search).get('view') || 'home';
            updateDockUI(currentView);
        });
    })();
</script>
