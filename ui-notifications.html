 <!-- ==========================================================================
     NEXRA UI ENGINE - OVERLAYS, NOTIFICATIONS & DRAWERS
     Handles: Sidebar, Cart, Toasts, and Global Modals
     ========================================================================== -->

<style>
    /* 1. OVERLAY BACKDROP */
    .nx-overlay {
        position: fixed; inset: 0;
        z-index: 9998; background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nx-overlay.active { opacity: 1; visibility: visible; }

    /* 2. PREMIUM DRAWERS (SIDEBAR & CART) */
    .nx-drawer {
        position: fixed; top: 0; right: -400px; 
        width: 380px; max-width: 85%; height: 100%;
        background: var(--bg-surface); z-index: 9999;
        box-shadow: -15px 0 40px rgba(0,0,0,0.1);
        transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex; flex-direction: column;
        border-left: 1px solid var(--glass-border);
    }
    .nx-drawer.active { right: 0; }

    .drawer-header {
        padding: 25px; border-bottom: 1px solid var(--glass-border);
        display: flex; justify-content: space-between; align-items: center;
    }
    .drawer-body { flex: 1; overflow-y: auto; padding: 25px; }
    .drawer-footer { padding: 25px; border-top: 1px solid var(--glass-border); }

    /* 3. SIDEBAR SPECIFIC STYLES */
    .menu-group { margin-bottom: 30px; }
    .menu-label { 
        font-size: 10px; font-weight: 800; color: var(--text-300);
        text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block;
    }
    .menu-link {
        display: flex; align-items: center; gap: 15px;
        padding: 16px; border-radius: var(--radius-sm);
        color: var(--text-100); font-weight: 600; font-size: 14px;
        transition: 0.3s; cursor: pointer; margin-bottom: 5px;
    }
    .menu-link i { font-size: 18px; color: var(--text-300); width: 25px; text-align: center; }
    .menu-link:hover { background: var(--bg-elevated); color: var(--brand-main); }
    .menu-link:hover i { color: var(--brand-main); }

    /* 4. CART SPECIFIC STYLES */
    .cart-item {
        display: flex; align-items: center; gap: 15px;
        padding: 15px; background: var(--bg-base);
        border-radius: 16px; border: 1px solid var(--glass-border);
        margin-bottom: 12px; animation: slideIn 0.4s;
    }
    .cart-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-size: 13px; font-weight: 700; color: var(--text-100); margin-bottom: 4px; }
    .cart-item-price { font-size: 12px; color: var(--brand-main); font-weight: 800; }
    .cart-remove { color: var(--danger); font-size: 14px; cursor: pointer; padding: 5px; }

    /* 5. BUTTONS */
    .btn-close-drawer {
        width: 35px; height: 35px; border-radius: 50%;
        background: var(--bg-elevated); border: 1px solid var(--glass-border);
        display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>

<!-- 1. OVERLAY MASK -->
<div id="nx-global-overlay" class="nx-overlay" onclick="Nexra.ui.closeAllDrawers()"></div>

<!-- 2. SIDEBAR DRAWER -->
<div id="nx-sidebar-drawer" class="nx-drawer">
    <div class="drawer-header">
        <div class="badge"><i class="fa-solid fa-compass"></i> NAVIGATION</div>
        <div class="btn-close-drawer" onclick="Nexra.ui.toggleSidebar()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="drawer-body">
        <div class="menu-group">
            <span class="menu-label">Platform Features</span>
            <div class="menu-link" onclick="Nexra.navTo('reseller'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-users-gear"></i> Agency Portal</div>
            <div class="menu-link" onclick="Nexra.navTo('vip'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-crown"></i> VIP Membership</div>
            <div class="menu-link" onclick="Nexra.navTo('bundle'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-cubes"></i> Bundle Builder</div>
            <div class="menu-link" onclick="Nexra.navTo('giveaway'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-gift"></i> Live Giveaway</div>
        </div>
        <div class="menu-group">
            <span class="menu-label">Support & Info</span>
            <div class="menu-link" onclick="Nexra.navTo('about'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-circle-info"></i> About Nexra</div>
            <div class="menu-link" onclick="Nexra.navTo('support'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-headset"></i> Help Center</div>
            <div class="menu-link" onclick="Nexra.navTo('policies'); Nexra.ui.closeAllDrawers()"><i class="fa-solid fa-shield-halved"></i> Legal Docs</div>
        </div>
    </div>
</div>

<!-- 3. CART DRAWER -->
<div id="nx-cart-drawer" class="nx-drawer">
    <div class="drawer-header">
        <h3 class="tech-font" style="font-size: 18px;"><i class="fa-solid fa-bag-shopping text-brand"></i> YOUR CART</h3>
        <div class="btn-close-drawer" onclick="Nexra.ui.toggleCart()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div id="cart-items-list" class="drawer-body">
        <!-- Dynamically filled by JS -->
        <div class="flex-center" style="height:100%; flex-direction:column; color:var(--text-300);">
            <i class="fa-solid fa-basket-shopping" style="font-size:40px; margin-bottom:15px; opacity:0.2;"></i>
            <p style="font-size:13px; font-weight:600;">Your cart is empty</p>
        </div>
    </div>
    <div class="drawer-footer">
        <div class="flex-between" style="margin-bottom: 20px; font-weight: 800; font-family: 'Space Grotesk';">
            <span>SUBTOTAL</span>
            <span id="cart-subtotal" class="text-brand">Rs 0</span>
        </div>
        <button class="btn-modal-action" onclick="Nexra.ui.closeAllDrawers(); Nexra.navTo('checkout')" style="background:var(--text-100); color:var(--bg-base); height:60px;">CHECKOUT NOW</button>
    </div>
</div>

<script>
    /**
     * UI NOTIFICATIONS & DRAWER ENGINE
     * Extends the Nexra object with drawer logic
     */
    (function() {
        // UI State
        Nexra.cart = JSON.parse(localStorage.getItem('nx-cart')) || [];

        Nexra.ui.toggleSidebar = function() {
            const sidebar = document.getElementById('nx-sidebar-drawer');
            const overlay = document.getElementById('nx-global-overlay');
            const isActive = sidebar.classList.toggle('active');
            overlay.classList.toggle('active', isActive);
            if(isActive) document.getElementById('nx-cart-drawer').classList.remove('active');
        };

        Nexra.ui.toggleCart = function() {
            const cart = document.getElementById('nx-cart-drawer');
            const overlay = document.getElementById('nx-global-overlay');
            const isActive = cart.classList.toggle('active');
            overlay.classList.toggle('active', isActive);
            if(isActive) {
                document.getElementById('nx-sidebar-drawer').classList.remove('active');
                this.renderCart();
            }
        };

        Nexra.ui.closeAllDrawers = function() {
            document.getElementById('nx-sidebar-drawer').classList.remove('active');
            document.getElementById('nx-cart-drawer').classList.remove('active');
            document.getElementById('nx-global-overlay').classList.remove('active');
        };

        // Cart Logic
        Nexra.ui.addToCart = function(product) {
            this.cart.push(product);
            localStorage.setItem('nx-cart', JSON.stringify(this.cart));
            this.toast(`${product.title} added to cart`, 'fa-solid fa-cart-arrow-down');
            this.updateBadges();
        };

        Nexra.ui.removeFromCart = function(index) {
            this.cart.splice(index, 1);
            localStorage.setItem('nx-cart', JSON.stringify(this.cart));
            this.renderCart();
            this.updateBadges();
        };

        Nexra.ui.renderCart = function() {
            const list = document.getElementById('cart-items-list');
            const subtotalEl = document.getElementById('cart-subtotal');
            list.innerHTML = '';
            
            if(this.cart.length === 0) {
                list.innerHTML = `<div class="flex-center" style="height:100%; flex-direction:column; color:var(--text-300);"><i class="fa-solid fa-basket-shopping" style="font-size:40px; margin-bottom:15px; opacity:0.2;"></i><p style="font-size:13px; font-weight:600;">Your cart is empty</p></div>`;
                subtotalEl.innerText = 'Rs 0';
                return;
            }

            let subtotal = 0;
            this.cart.forEach((item, index) => {
                subtotal += Number(item.price);
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" onerror="Nexra.utils.handleImgError(this)">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">${Nexra.utils.formatPrice(item.price)}</div>
                        </div>
                        <div class="cart-remove" onclick="Nexra.ui.removeFromCart(${index})"><i class="fa-solid fa-trash-can"></i></div>
                    </div>
                `;
            });
            subtotalEl.innerText = Nexra.utils.formatPrice(subtotal);
        };

        Nexra.ui.updateBadges = function() {
            // Updates badge in header.html if loaded
            if(window.NexraHeader) {
                NexraHeader.updateCartBadge(this.cart.length);
            }
        };

        // Sync badges on load
        setTimeout(() => Nexra.ui.updateBadges(), 1000);

    })();
</script>
