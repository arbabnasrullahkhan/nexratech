<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra OS | The One Man Army Protocol</title>
    
    <!-- Favicon & SEO -->
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    <meta name="theme-color" content="#ff5500">

    <!-- Frameworks -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f5f4ef;
            --orange: #ff5500;
            --obsidian: #0f172a;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.05);
            --transition: all 0.7s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* --- UI RESET & NO SCROLL --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: crosshair; }
        body { background: var(--bg); color: var(--obsidian); height: 100vh; overflow: hidden; }

        /* --- HARD REFRESH MOVIE GATE --- */
        #gate-container {
            position: fixed; inset: 0; z-index: 10000; display: flex; 
            pointer-events: none; visibility: hidden;
        }
        .gate-panel {
            flex: 1; background: var(--obsidian); height: 100%; transition: transform 1.5s var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        #gate-l { transform: translateX(0); border-right: 1px solid var(--orange); }
        #gate-r { transform: translateX(0); border-left: 1px solid var(--orange); }
        .gate-logo { width: 120px; filter: drop-shadow(0 0 20px var(--orange)); opacity: 0; transition: 0.5s; }
        
        body.booting #gate-container { visibility: visible; pointer-events: all; }
        body.open-gate #gate-l { transform: translateX(-100%); }
        body.open-gate #gate-r { transform: translateX(100%); }

        /* --- WATERMARKS --- */
        .watermark-img { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; opacity: 0.02; z-index: 0; pointer-events: none; }
        .watermark-text { position: fixed; bottom: 5%; right: 2%; font-family: 'Space Grotesk'; font-size: 10vw; font-weight: 900; color: #000; opacity: 0.015; z-index: 0; pointer-events: none; white-space: nowrap; }

        /* --- APP SHELL (PC LAYOUT) --- */
        .app-shell { display: grid; grid-template-columns: 280px 1fr 80px; height: 100vh; position: relative; z-index: 10; }

        /* --- LEFT SIDEBAR: NEXUS HISTORY & YT --- */
        .left-sidebar { background: white; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .yt-preview { background: var(--bg); border-radius: 20px; padding: 15px; border: 1px solid var(--border); text-align: center; }
        .yt-logo { width: 45px; border-radius: 12px; margin-bottom: 10px; }
        .subs-count { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--obsidian); }
        .nexus-history { flex: 1; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .project-card { padding: 12px; border-radius: 14px; background: #fafafa; border: 1px solid transparent; cursor: pointer; transition: 0.3s; }
        .project-card:hover, .project-card.active { border-color: var(--orange); background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .social-grid i { font-size: 18px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .social-grid i:hover { color: var(--orange); transform: scale(1.1); }

        /* --- CENTER: EVOLUTION HUB --- */
        .roadmap-workspace { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; perspective: 1500px; }
        .zoom-layer { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: var(--transition); transform-origin: center center; }

        #svg-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .line-path { fill: none; stroke-width: 2.5; stroke-dasharray: 6; animation: march 15s linear infinite; opacity: 0.2; }
        @keyframes march { to { stroke-dashoffset: -500; } }

        .hub-core { width: 160px; height: 160px; background: var(--obsidian); border-radius: 50%; border: 6px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); z-index: 100; position: relative; }
        .hub-core img { width: 50px; margin-bottom: 5px; }
        .hub-core span { font-size: 8px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }

        .phase-card { position: absolute; width: 250px; background: var(--glass); backdrop-filter: blur(20px); padding: 18px; border-radius: 24px; border: 1px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.04); z-index: 50; transition: 0.4s; }
        .phase-card:hover { transform: translateY(-5px); background: white; }
        .badge { width: 32px; height: 32px; border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }

        /* --- RIGHT DOCK: ICONS ONLY --- */
        .right-dock { background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .dock-icon { width: 32px; height: 32px; cursor: pointer; transition: 0.3s; opacity: 0.6; filter: grayscale(1); }
        .dock-icon:hover { opacity: 1; filter: grayscale(0); transform: scale(1.2); }

        /* --- MODALS (TXT VIEW) --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 600px; padding: 35px; border-radius: 30px; box-shadow: 0 30px 100px rgba(0,0,0,0.1); border: 1px solid white; position: relative; }
        .txt-area { background: #f8fafc; padding: 20px; border-radius: 15px; font-family: 'Fira Code', monospace; font-size: 12px; color: #334155; height: 300px; overflow-y: auto; white-space: pre-wrap; border: 1px solid #edf2f7; margin-bottom: 20px; }
        .copy-btn { background: var(--obsidian); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .copy-btn:hover { background: var(--orange); }

        /* --- DIRECTOR CONTROLS --- */
        .director-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--obsidian); padding: 8px 12px; border-radius: 50px; display: flex; gap: 8px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .cam-btn { background: transparent; border: none; color: #94a3b8; font-size: 10px; font-weight: 800; padding: 10px 18px; border-radius: 20px; transition: 0.3s; }
        .cam-btn.active { color: white; background: #334155; }

        /* --- LICENSING (PREMIUM LOCK) --- */
        .premium-lock { position: absolute; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; cursor: pointer; }
        .lock-icon { font-size: 40px; color: var(--orange); margin-bottom: 10px; }

        /* Positions for 3 main cards */
        .p1 { top: 10%; left: 10%; }
        .p2 { top: 10%; right: 10%; }
        .p3 { bottom: 10%; left: 50%; transform: translateX(-50%); }

        @media (max-width: 1024px) {
            .app-shell { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .left-sidebar, .right-dock { display: none; }
            .zoom-layer { flex-direction: column; height: auto; padding: 120px 0; }
            .phase-card { position: relative; left: auto; top: auto; transform: none !important; margin: 20px auto; }
            #svg-canvas, .director-bar { display: none; }
        }
    </style>
</head>
<body class="booting">

    <!-- Hard Refresh Gate -->
    <div id="gate-container">
        <div id="gate-l" class="gate-panel"><img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" class="gate-logo"></div>
        <div id="gate-r" class="gate-panel"></div>
    </div>

    <!-- Watermarks -->
    <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" class="watermark-img">
    <div class="watermark-text">NEXRA TECH</div>

    <div class="app-shell">
        
        <!-- Left: Nexus History & YT -->
        <aside class="left-sidebar">
            <div class="yt-preview">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" class="yt-logo">
                <h4>Nexra Tech</h4>
                <p class="subs-count">84+ <span style="font-size:10px; color:#94a3b8;">Subscribers</span></p>
                <div class="social-grid">
                    <a href="https://youtube.com/@NexraTech"><i class="fa-brands fa-youtube"></i></a>
                    <i class="fa-brands fa-tiktok"></i>
                    <i class="fa-brands fa-telegram"></i>
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
            </div>

            <h5 style="font-size:10px; letter-spacing:2px; color:#94a3b8; text-transform:uppercase; font-weight:800; margin-top:10px;">Nexus History Vault</h5>
            <div id="project-list" class="nexus-history">
                <!-- Projects Load Here -->
            </div>

            <div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-top:auto;">
                <p style="font-size:11px; font-weight:700; color:#64748b;">Get free PRDs, roadmaps & templates from our official site.</p>
                <a href="https://nexratech.vercel.app" style="font-size:10px; color:var(--orange); font-weight:800; text-decoration:none;">nexratech.vercel.app</a>
            </div>
        </aside>

        <!-- Center: Evolution Roadmap Hub -->
        <main class="roadmap-workspace">
            <div class="zoom-layer" id="main-zoom">
                
                <svg id="svg-canvas">
                    <path id="path1" class="line-path" stroke="var(--orange)"></path>
                    <path id="path2" class="line-path" stroke="#007aff"></path>
                    <path id="path3" class="line-path" stroke="#34c759"></path>
                </svg>

                <div class="hub-core" id="core-logo">
                    <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">
                    <span>Evolution<br>Engine</span>
                </div>

                <div id="roadmap-cards-container"></div>

            </div>
        </main>

        <!-- Right: Smart File Dock -->
        <aside class="right-dock">
            <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png" class="dock-icon" onclick="openFile('Firebase Config', 'Firebase API Key: AIzaSyDeNZBt...\nProject ID: nexrapk\nFirestore Rules: allow read, write: if true;')" title="Firebase Config">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_AdMob_logo.svg" class="dock-icon" onclick="openAdMob()" title="AdMob Testing IDs">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-ai-studio-gemini-icon.png" class="dock-icon" title="Google AI Studio">
            <i class="fa-solid fa-file-invoice dock-icon" style="font-size:24px; color:#475569;" onclick="openPRD()"></i>
            <i class="fa-solid fa-clock-rotate-left dock-icon" style="font-size:24px; color:#475569;"></i>
        </aside>

    </div>

    <!-- Director's Cut Bar -->
    <div class="director-bar">
        <button class="cam-btn active" onclick="setCam('global', this)">GLOBAL</button>
        <button class="cam-btn" onclick="setCam('p1', this)">PHASE 1</button>
        <button class="cam-btn" onclick="setCam('p2', this)">PHASE 2</button>
        <button class="cam-btn" onclick="setCam('p3', this)">PHASE 3</button>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="file-modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin-bottom:15px; font-family:'Space Grotesk';">File Preview</h3>
            <div class="txt-area" id="modal-content"></div>
            <button class="copy-btn" onclick="copyContent()">COPY TO CLIPBOARD</button>
            <p onclick="closeModal()" style="text-align:center; font-size:11px; margin-top:15px; color:#94a3b8; cursor:pointer;">Close Viewer</p>
        </div>
    </div>

    <script>
        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyDeNZBtVQ5iX5PjV5Gj4xXgxqB3KaJ4cZw",
            authDomain: "nexrapk.firebaseapp.com",
            projectId: "nexrapk",
            storageBucket: "nexrapk.firebasestorage.app",
            messagingSenderId: "958761878252",
            appId: "1:958761878252:web:099246eb11de0e08755bc9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let activeProject = null;

        // === BOOT SEQUENCE (GATE ANIMATION) ===
        window.onload = () => {
            const isHardRefresh = performance.navigation.type === 1;
            if(isHardRefresh) {
                document.querySelector('.gate-logo').style.opacity = '1';
                setTimeout(() => {
                    document.body.classList.add('open-gate');
                    setTimeout(() => document.body.classList.remove('booting'), 1500);
                }, 1000);
            } else {
                document.body.classList.remove('booting');
            }
            loadProjects();
        };

        // === KEYBOARD SHORTCUTS ===
        window.addEventListener('keydown', e => {
            if(e.ctrlKey) {
                e.preventDefault();
                if(e.key === 'p') openPRD();
                if(e.key === 'b') openFile('Firebase Config', 'Firebase Logic Locked.');
                if(e.key === 'd') openFile('Documentation', 'Project Documentation loading...');
            }
        });

        // === LOAD PROJECTS FROM FIREBASE ===
        function loadProjects() {
            db.collection("RoadmapData").orderBy("order", "asc").onSnapshot(snap => {
                const list = document.getElementById('project-list');
                list.innerHTML = "";
                snap.docs.forEach((doc, i) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = `project-card ${i === 0 ? 'active' : ''}`;
                    card.innerHTML = `<h4>${data.title}</h4><p>v2.0 • Last Synced</p>`;
                    card.onclick = () => selectProject(doc.id, data, card);
                    list.appendChild(card);
                    if(i === 0) selectProject(doc.id, data, card);
                });
            });
        }

        function selectProject(id, data, el) {
            document.querySelectorAll('.project-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            activeProject = data;
            renderRoadmap(data);
            setTimeout(drawPaths, 600);
        }

        // === RENDER ROADMAP CARDS ===
        function renderRoadmap(data) {
            const container = document.getElementById('roadmap-cards-container');
            container.innerHTML = "";
            const colors = ['#ff5500', '#007aff', '#34c759'];
            
            for(let i=0; i<3; i++) {
                const card = document.createElement('div');
                card.className = `phase-card p${i+1}`;
                card.id = `card${i+1}`;
                
                // Add Premium Lock logic if data.isLocked is true
                if(data.tasks[i]?.locked) {
                    card.innerHTML = `<div class="premium-lock" onclick="window.open('https://wa.me/NexraTech')"><i class="fa-solid fa-lock lock-icon"></i><p style="font-size:12px; font-weight:800;">LICENSE REQUIRED<br><span style="color:var(--orange)">Tap to Purchase</span></p></div>`;
                }

                card.innerHTML += `
                    <div class="card-header">
                        <div class="badge" style="background:${colors[i]}">0${i+1}</div>
                        <h3 style="font-size:13px; font-weight:800;">Phase 0${i+1}<br><span style="font-size:9px; color:#94a3b8; text-transform:uppercase;">Protocol</span></h3>
                    </div>
                    <div id="tasks-p${i}"></div>
                `;
                container.appendChild(card);
                
                // Simplified task display (first 4 tasks)
                const taskContainer = card.querySelector(`#tasks-p${i}`);
                data.tasks.slice(i*3, (i+1)*3).forEach(t => {
                    taskContainer.innerHTML += `
                        <div style="display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; cursor:pointer;">
                            <div style="width:18px; height:18px; border:2px solid #ddd; border-radius:5px;"></div>
                            <span style="font-size:12px; font-weight:700; color:#475569;">${t.title}</span>
                        </div>
                    `;
                });
            }
        }

        // === CINEMATIC CAMERA SYSTEM ===
        function setCam(view, btn) {
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const zoomLayer = document.getElementById('main-zoom');
            const hubLogo = document.getElementById('core-logo');

            if(view === 'global') {
                zoomLayer.style.transform = "scale(1) translate(0, 0)";
                hubLogo.style.opacity = "1";
            } else if(view === 'p1') {
                zoomLayer.style.transform = "scale(1.7) translate(25%, 15%)";
            } else if(view === 'p2') {
                zoomLayer.style.transform = "scale(1.7) translate(-25%, 15%)";
            } else if(view === 'p3') {
                zoomLayer.style.transform = "scale(1.7) translate(0, -25%)";
            }
        }

        // === SVG PATH ENGINE ===
        function drawPaths() {
            const hub = document.getElementById('core-logo').getBoundingClientRect();
            const cx = hub.left + hub.width / 2;
            const cy = hub.top + hub.height / 2;

            for(let i=1; i<=3; i++) {
                const card = document.getElementById('card'+i);
                if(!card) continue;
                const rect = card.getBoundingClientRect();
                const tx = rect.left + rect.width / 2;
                const ty = rect.top + rect.height / 2;
                document.getElementById('path'+i).setAttribute('d', `M ${cx} ${cy} Q ${cx} ${ty} ${tx} ${ty}`);
            }
        }

        // === DOCS & MODAL LOGIC ===
        function openFile(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('file-modal').style.display = 'flex';
        }

        function openPRD() {
            if(!activeProject) return;
            let prdText = `NEXRA TECH OFFICIAL PRD\nPROJECT: ${activeProject.title}\n==========================\n`;
            activeProject.tasks.forEach(t => prdText += `\n[TASK]: ${t.title}\nDETAILS: ${t.prd}\n`);
            openFile('Master PRD Script', prdText);
        }

        function openAdMob() {
            const ads = {
                "Banner": "ca-app-pub-3940256099942544/6300978111",
                "Interstitial": "ca-app-pub-3940256099942544/1033173712",
                "Rewarded": "ca-app-pub-3940256099942544/5224354917"
            };
            openFile('AdMob Testing IDs', JSON.stringify(ads, null, 4));
        }

        function closeModal() { document.getElementById('file-modal').style.display = 'none'; }
        
        function copyContent() {
            const text = document.getElementById('modal-content').innerText;
            navigator.clipboard.writeText(text);
            alert("📋 Copied to Nexra Clipboard!");
        }

        window.onresize = drawPaths;
    </script>
</body>
</html>
