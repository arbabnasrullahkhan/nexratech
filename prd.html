<!-- 
  NEXRA PK - GLOBAL DYNAMIC SLIDER SYSTEM v3.0
  INTEGRATED WITH: Firebase, Auth, Theme Engine, and SPA Router
-->

<style>
    /* ==========================================================================
       OFF-CANVAS DRAWER CORE STYLING
       ========================================================================== */
    :root {
        --slider-w: 360px;
        --slider-z: 100001;
    }

    /* 1. Backdrop Overlay */
    #n-slider-overlay {
        position: fixed; inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: calc(var(--slider-z) - 1);
        opacity: 0; visibility: hidden;
        transition: var(--transition);
    }
    #n-slider-overlay.active { opacity: 1; visibility: visible; }

    /* 2. Main Drawer */
    #n-slider {
        position: fixed; top: 0; right: calc(var(--slider-w) * -1);
        width: var(--slider-w); max-width: 85%; height: 100%;
        background: var(--bg-surface);
        border-left: 1px solid var(--glass-border);
        z-index: var(--slider-z);
        display: flex; flex-direction: column;
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: -20px 0 50px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    #n-slider.active { transform: translateX(calc(var(--slider-w) * -1)); }

    /* 3. Slider Header & Search */
    .ns-header { padding: 30px 25px 20px; flex-shrink: 0; }
    .ns-search-box {
        background: var(--bg-elevated);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 12px 18px;
        display: flex; align-items: center; gap: 12px;
        transition: 0.3s;
    }
    .ns-search-box:focus-within { border-color: var(--brand-main); box-shadow: 0 0 0 4px var(--brand-glow); }
    .ns-search-box input {
        border: none; background: transparent; color: var(--text-100);
        font-family: inherit; font-size: 14px; width: 100%;
    }

    /* 4. User Profile Card */
    .ns-profile-card {
        margin: 10px 25px 25px;
        padding: 20px;
        background: var(--brand-soft);
        border-radius: var(--radius-md);
        border: 1px solid var(--brand-glow);
        display: flex; align-items: center; gap: 15px;
        cursor: pointer; transition: 0.3s;
    }
    .ns-profile-card:hover { transform: translateY(-3px); background: var(--bg-elevated); }
    .ns-avatar { 
        width: 50px; height: 50px; border-radius: 50%; 
        border: 2px solid var(--brand-main); padding: 2px;
        background: var(--bg-surface); object-fit: cover;
    }
    .ns-user-info h4 { font-size: 15px; font-weight: 800; color: var(--text-100); }
    .ns-user-info p { font-size: 10px; font-weight: 700; color: var(--brand-main); text-transform: uppercase; letter-spacing: 1px; }

    /* 5. Navigation Menu Body */
    .ns-body { flex: 1; overflow-y: auto; padding: 0 15px 30px; scrollbar-width: none; }
    .ns-body::-webkit-scrollbar { display: none; }
    
    .ns-group { margin-bottom: 25px; }
    .ns-group-label { 
        font-size: 10px; font-weight: 800; color: var(--text-300); 
        text-transform: uppercase; letter-spacing: 2px;
        padding-left: 15px; margin-bottom: 12px; display: block;
    }

    .ns-item {
        display: flex; align-items: center; gap: 15px;
        padding: 14px 18px; border-radius: 14px;
        color: var(--text-200); font-size: 14px; font-weight: 700;
        cursor: pointer; transition: 0.3s; margin-bottom: 4px;
        position: relative;
    }
    .ns-item svg { width: 20px; height: 20px; opacity: 0.8; }
    .ns-item:hover { background: var(--bg-elevated); color: var(--brand-main); }
    .ns-item.active { background: var(--brand-soft); color: var(--brand-main); }
    .ns-item.active::after {
        content: ''; position: absolute; left: 0; top: 25%; height: 50%;
        width: 4px; background: var(--brand-main); border-radius: 0 4px 4px 0;
    }

    /* Item Badges */
    .ns-badge {
        margin-left: auto; font-size: 9px; font-weight: 800;
        padding: 2px 8px; border-radius: 6px;
    }
    .badge-new { background: var(--brand-main); color: #fff; }
    .badge-vip { background: #ffd700; color: #000; }

    /* 6. Bottom Actions */
    .ns-footer {
        padding: 20px 25px 40px;
        border-top: 1px solid var(--glass-border);
        background: var(--bg-surface);
        display: flex; align-items: center; justify-content: space-between;
    }
    .ns-theme-toggle {
        display: flex; gap: 5px; background: var(--bg-elevated);
        padding: 5px; border-radius: 50px; border: 1px solid var(--glass-border);
    }
    .theme-circle {
        width: 30px; height: 30px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.3s; color: var(--text-300);
    }
    .theme-circle.active { background: var(--bg-surface); color: var(--brand-main); box-shadow: var(--shadow-sm); }

    /* Animations */
    @keyframes slideInItem { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .ns-body .ns-item { animation: slideInItem 0.4s forwards; }
</style>

<div id="n-slider-overlay" onclick="NexraSlider.close()"></div>

<aside id="n-slider">
    <!-- Header: Close & Search -->
    <div class="ns-header">
        <div class="flex-between" style="margin-bottom: 25px;">
            <div class="badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg> DASHBOARD</div>
            <button class="di-btn" onclick="NexraSlider.close()" style="border:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="ns-search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="ns-search-input" placeholder="Search Ecosystem..." onkeyup="NexraSlider.search(this.value)">
        </div>
    </div>

    <!-- User Profile Area -->
    <div class="ns-profile-card" onclick="Nexra.navTo('profile'); NexraSlider.close()">
        <img id="ns-user-dp" class="ns-avatar" src="https://via.placeholder.com/100" alt="User">
        <div class="ns-user-info">
            <h4 id="ns-user-name">Guest Explorer</h4>
            <p id="ns-user-status">Standard Access</p>
        </div>
        <svg style="margin-left:auto; opacity:0.5;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </div>

    <!-- Dynamic Menu Content -->
    <div class="ns-body" id="ns-menu-container">
        <!-- JS will inject dynamic groups and items here -->
        <div class="ns-group">
            <span class="ns-group-label">Loading Core...</span>
            <div class="nav-skeleton" style="margin: 10px 15px;"></div>
            <div class="nav-skeleton" style="margin: 10px 15px; width: 70%;"></div>
        </div>
    </div>

    <!-- Footer: Theme & Recently Visited -->
    <div class="ns-footer">
        <div class="ns-theme-toggle">
            <div class="theme-circle active" id="ts-light" onclick="NexraSlider.setTheme('light')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </div>
            <div class="theme-circle" id="ts-dark" onclick="NexraSlider.setTheme('dark')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </div>
        </div>
        <button class="btn btn-outline" style="padding: 10px 20px; font-size: 11px;" onclick="NexraSlider.logout()">
            <svg style="margin-right:8px;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> LOGOUT
        </button>
    </div>
</aside>

<script>
    /**
     * NEXRA SLIDER ENGINE v3.0
     * Handles Dynamic Menu, Auth Sync, and UI Interactions
     */
    window.NexraSlider = {
        db: null,
        init: function() {
            const checkDb = setInterval(() => {
                if(window.db) {
                    clearInterval(checkDb);
                    this.db = window.db;
                    this.syncAuth();
                    this.loadMenu();
                    this.syncThemeUI();
                }
            }, 100);
        },

        // 1. OPEN/CLOSE CONTROLS
        open: function() {
            document.getElementById('n-slider').classList.add('active');
            document.getElementById('n-slider-overlay').classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scroll
        },
        close: function() {
            document.getElementById('n-slider').classList.remove('active');
            document.getElementById('n-slider-overlay').classList.remove('active');
            document.body.style.overflow = '';
        },

        // 2. AUTH SYNC (Profile Card)
        syncAuth: function() {
            firebase.auth().onAuthStateChanged(user => {
                const nameEl = document.getElementById('ns-user-name');
                const statusEl = document.getElementById('ns-user-status');
                const dpEl = document.getElementById('ns-user-dp');

                if(user) {
                    nameEl.innerText = user.displayName || "Nexra Member";
                    dpEl.src = user.photoURL || "https://via.placeholder.com/100";
                    // Check VIP Status from Firestore
                    this.db.collection('users').doc(user.uid).onSnapshot(doc => {
                        if(doc.exists && doc.data().tier === 'VIP') {
                            statusEl.innerText = "Diamond VIP Member";
                            statusEl.style.color = "#ffd700";
                        } else {
                            statusEl.innerText = "Verified Member";
                        }
                    });
                } else {
                    nameEl.innerText = "Guest Explorer";
                    statusEl.innerText = "Standard Access";
                    dpEl.src = "https://via.placeholder.com/100";
                }
            });
        },

        // 3. DYNAMIC MENU LOADER (Firebase)
        loadMenu: function() {
            const container = document.getElementById('ns-menu-container');
            // Listen to 'navigation' collection or a config doc
            this.db.collection('settings').doc('slider_menu').onSnapshot(doc => {
                if(!doc.exists) return;
                const groups = doc.data().groups || [];
                container.innerHTML = '';

                groups.forEach((group, gIdx) => {
                    if(!group.visible) return;
                    
                    let itemsHTML = '';
                    group.items.forEach(item => {
                        if(!item.active) return;
                        const activeClass = (new URLSearchParams(window.location.search).get('view') === item.route) ? 'active' : '';
                        itemsHTML += `
                            <div class="ns-item ${activeClass}" onclick="Nexra.navTo('${item.route}'); NexraSlider.close()" style="animation-delay: ${gIdx * 0.1}s">
                                ${item.svgIcon}
                                <span>${item.name}</span>
                                ${item.badge ? `<span class="ns-badge ${item.badgeClass}">${item.badge}</span>` : ''}
                            </div>
                        `;
                    });

                    container.innerHTML += `
                        <div class="ns-group">
                            <span class="ns-group-label">${group.label}</span>
                            ${itemsHTML}
                        </div>
                    `;
                });
            });
        },

        // 4. THEME & UTILS
        setTheme: function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            this.syncThemeUI();
            if(window.Nexra) Nexra.showToast(`${theme.toUpperCase()} Mode Enabled`, 'info');
        },

        syncThemeUI: function() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            document.getElementById('ts-light').classList.toggle('active', current === 'light');
            document.getElementById('ts-dark').classList.toggle('active', current === 'dark');
        },

        search: function(query) {
            // Global Search Integration logic
            console.log("Searching for:", query);
        },

        logout: function() {
            firebase.auth().signOut().then(() => {
                this.close();
                Nexra.navTo('home');
            });
        }
    };

    // Auto-init
    NexraSlider.init();

    // Link Nexra global UI trigger to this module
    window.Nexra = window.Nexra || {};
    window.Nexra.ui = window.Nexra.ui || {};
    window.Nexra.ui.toggleSidebar = function() { NexraSlider.open(); };
</script>
