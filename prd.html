<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra OS v4.0 | Pro Developer Ecosystem</title>
    
    <!-- External Assets -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f8f7f2;
            --accent: #ff5500;
            --graphite: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            --transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }
        body { background: var(--bg); color: var(--graphite); height: 100vh; overflow: hidden; }

        /* --- SEARCH & COMMAND BAR --- */
        .global-search-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 450px; z-index: 1000; }
        .search-input-wrapper { background: var(--glass); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 16px; border: 1px solid white; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
        .search-input-wrapper input { border: none; background: transparent; outline: none; width: 100%; font-weight: 600; font-size: 13px; color: var(--graphite); }
        .cmd-key { background: #eee; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: 800; color: #888; }

        /* --- APP LAYOUT --- */
        .app-shell { display: grid; grid-template-columns: 280px 1fr 320px; height: 100vh; position: relative; }

        /* --- LEFT SIDEBAR: BRANDING & HISTORY --- */
        .sidebar-left { background: white; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 25px; }
        
        .yt-brand-card { background: var(--graphite); border-radius: 24px; padding: 20px; color: white; position: relative; overflow: hidden; }
        .yt-brand-card::after { content: ''; position: absolute; top: -50px; right: -50px; width: 100px; height: 100px; background: var(--accent); filter: blur(60px); opacity: 0.4; }
        .yt-logo { width: 50px; height: 50px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 12px; }
        .sub-count { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
        .sub-label { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .history-section { flex: 1; overflow-y: auto; padding-right: 5px; }
        .history-section::-webkit-scrollbar { width: 3px; }
        .history-section::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
        
        .project-tab { padding: 12px 15px; border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1.5px solid transparent; }
        .project-tab:hover, .project-tab.active { background: #f9f9f9; border-color: var(--accent); }
        .project-tab i { color: #ccc; font-size: 14px; }
        .project-tab.active i { color: var(--accent); }
        .project-tab h5 { font-size: 13px; font-weight: 700; }

        /* --- CENTER: INTERACTIVE CANVAS --- */
        .canvas-area { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#e5e5e5 1px, transparent 1px); background-size: 30px 30px; }
        .zoom-viewport { position: relative; width: 100%; height: 100%; transform-origin: center; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        
        #connector-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .fluid-line { fill: none; stroke-width: 2.5; stroke-dasharray: 8; animation: flow 25s linear infinite; opacity: 0.15; transition: 0.5s; }
        @keyframes flow { to { stroke-dashoffset: -1000; } }

        .nexus-hub { width: 170px; height: 170px; background: var(--graphite); border-radius: 50%; border: 6px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; box-shadow: 0 30px 60px -10px rgba(0,0,0,0.2); z-index: 10; position: relative; }
        .nexus-hub img { width: 45px; filter: drop-shadow(0 0 10px var(--accent)); margin-bottom: 10px; }
        .nexus-hub span { font-size: 10px; font-weight: 800; letter-spacing: 2px; }

        .phase-card { position: absolute; width: 280px; background: var(--glass); backdrop-filter: blur(30px); padding: 22px; border-radius: 28px; border: 1px solid white; box-shadow: var(--shadow); z-index: 5; transition: 0.4s; }
        .phase-card:hover { transform: scale(1.02) translateY(-5px); background: white; }
        .phase-card h3 { font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }

        .task-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 14px; margin-bottom: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .task-row:hover { background: #fdfdfd; border-color: #eee; }
        .task-left { display: flex; align-items: center; gap: 12px; }
        .task-check { width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 7px; flex-shrink: 0; position: relative; }
        .task-row.done .task-check { background: var(--accent); border-color: var(--accent); }
        .task-row.done .task-check::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-weight: 900; }
        .task-row span { font-size: 12px; font-weight: 700; color: #444; }
        .task-row.done span { text-decoration: line-through; color: #aaa; }
        .diff-tag { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 5px; text-transform: uppercase; }

        /* Node Positions */
        .pos-1 { top: 10%; left: 10%; }
        .pos-2 { top: 10%; right: 10%; }
        .pos-3 { bottom: 10%; left: 50%; transform: translateX(-50%); }

        /* --- RIGHT SIDEBAR: PRO VAULT --- */
        .sidebar-right { background: white; border-left: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .vault-header { display: flex; justify-content: space-between; align-items: center; }
        .vault-header h4 { font-size: 11px; font-weight: 800; color: #aaa; letter-spacing: 1.5px; }
        .script-container { background: #f9f9f9; border-radius: 20px; border: 1px solid var(--border); padding: 20px; flex: 1; font-family: 'Fira Code', monospace; font-size: 11px; line-height: 1.7; color: #555; overflow-y: auto; white-space: pre-wrap; }
        .copy-trigger { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--graphite); color: white; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .copy-trigger:hover { background: var(--accent); transform: translateY(-2px); }

        /* --- BOTTOM FIXED DOCK --- */
        .floating-dock { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 12px; z-index: 1000; }
        .dock-item { width: 48px; height: 48px; border-radius: 16px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid white; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; }
        .dock-item:hover { transform: translateY(-8px); border-color: var(--accent); color: var(--accent); }

        /* --- CAMERA CONTROL --- */
        .cam-dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--graphite); padding: 8px 10px; border-radius: 50px; display: flex; gap: 5px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); z-index: 1000; }
        .cam-btn { background: transparent; border: none; color: #666; font-size: 11px; font-weight: 800; padding: 10px 20px; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .cam-btn.active { color: white; background: #333; }
        .cam-btn:hover { color: var(--accent); }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-card { width: 500px; background: white; border-radius: 30px; padding: 35px; box-shadow: 0 50px 100px rgba(0,0,0,0.2); position: relative; }
        .modal-card h2 { font-weight: 800; font-size: 22px; margin-bottom: 20px; }

        @media (max-width: 1024px) {
            .app-shell { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right, .global-search-container { display: none; }
            .cam-dock { bottom: 10px; width: 90%; justify-content: space-around; }
            .floating-dock { bottom: 80px; right: 15px; }
        }
    </style>
</head>
<body>

    <!-- Top Search Bar -->
    <div class="global-search-container">
        <div class="search-input-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="color: #ccc;"></i>
            <input type="text" id="universal-search" placeholder="Search roadmap, projects or commands..." onkeyup="searchProject()">
            <div class="cmd-key">⌘ K</div>
        </div>
    </div>

    <div class="app-shell">
        
        <!-- Sidebar Left -->
        <aside class="sidebar-left">
            <div class="yt-brand-card">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" class="yt-logo">
                <div class="sub-count" id="live-subs">124,582</div>
                <div class="sub-label">Subscribers <i class="fa-solid fa-circle-check" style="color: var(--accent);"></i></div>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <a href="#" style="color: white; font-size: 14px;"><i class="fa-brands fa-youtube"></i></a>
                    <a href="#" style="color: white; font-size: 14px;"><i class="fa-brands fa-github"></i></a>
                    <a href="#" style="color: white; font-size: 14px;"><i class="fa-brands fa-telegram"></i></a>
                </div>
            </div>

            <div class="history-section">
                <h4 style="font-size: 10px; font-weight: 800; color: #bbb; letter-spacing: 1.5px; margin-bottom: 15px;">PROJECT HISTORY</h4>
                <div id="history-list">
                    <!-- Loaded from Firestore -->
                </div>
            </div>

            <div style="background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid var(--border);">
                <p style="font-size: 11px; font-weight: 700; color: #777;">Access premium roadmaps and AI blueprints at <span style="color: var(--accent);">nexratech.vercel.app</span></p>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="canvas-area">
            <div class="zoom-viewport" id="viewport">
                
                <svg id="connector-canvas">
                    <path id="l1" class="fluid-line" stroke="var(--accent)"></path>
                    <path id="l2" class="fluid-line" stroke="#007aff"></path>
                    <path id="l3" class="fluid-line" stroke="#34c759"></path>
                </svg>

                <div class="nexus-hub">
                    <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">
                    <span>NEXRA<br>SYNC OS</span>
                </div>

                <div id="roadmap-nodes"></div>

            </div>
        </main>

        <!-- Sidebar Right -->
        <aside class="sidebar-right">
            <div class="vault-header">
                <h4>SCRIPT VAULT</h4>
                <div id="sync-status" style="font-size: 9px; font-weight: 800; color: var(--accent);"><i class="fa-solid fa-cloud"></i> LIVE</div>
            </div>
            <div class="script-container" id="prd-display">Select a project to unlock the master PRD script...</div>
            <button class="copy-trigger" onclick="copyVault()">COPY MASTER SCRIPT</button>
            
            <div style="display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 12px; border-radius: 14px; border: 1px dashed #ddd;">
                <span style="font-size: 10px; font-weight: 700; color: #888;">Progress Status</span>
                <span id="perc-stat" style="font-size: 12px; font-weight: 800; color: var(--accent);">0%</span>
            </div>
        </aside>

    </div>

    <!-- Floating Dock -->
    <div class="floating-dock">
        <div class="dock-item" title="Firebase" onclick="openModal('firebase')"><i class="fa-solid fa-fire"></i></div>
        <div class="dock-item" title="AdMob" onclick="openModal('admob')"><i class="fa-solid fa-rectangle-ad"></i></div>
        <div class="dock-item" title="API Vault" onclick="openModal('api')"><i class="fa-solid fa-key"></i></div>
        <div class="dock-item" title="Download" onclick="window.print()"><i class="fa-solid fa-file-pdf"></i></div>
    </div>

    <!-- Camera Control -->
    <div class="cam-dock">
        <button class="cam-btn active" onclick="cam('global', this)">GLOBAL</button>
        <button class="cam-btn" onclick="cam('p1', this)">PHASE 1</button>
        <button class="cam-btn" onclick="cam('p2', this)">PHASE 2</button>
        <button class="cam-btn" onclick="cam('p3', this)">PHASE 3</button>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title">Resource</h2>
            <div id="modal-body" style="background: #f8fafc; padding: 20px; border-radius: 15px; font-family: monospace; font-size: 12px; max-height: 250px; overflow-y: auto;"></div>
            <button class="copy-trigger" style="margin-top: 20px;" onclick="copyModal()">COPY TO CLIPBOARD</button>
        </div>
    </div>

    <script>
        // === FIREBASE INIT ===
        const firebaseConfig = {
            apiKey: "AIzaSyDeNZBtVQ5iX5PjV5Gj4xXgxqB3KaJ4cZw",
            authDomain: "nexrapk.firebaseapp.com",
            projectId: "nexrapk",
            storageBucket: "nexrapk.firebasestorage.app",
            messagingSenderId: "958761878252",
            appId: "1:958761878252:web:099246eb11de0e08755bc9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentProj = null;
        let progress = JSON.parse(localStorage.getItem('nx_v4_progress') || '{}');

        // === LOAD DATA ===
        function initOS() {
            db.collection("RoadmapData").orderBy("order", "asc").onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snap.docs.forEach((doc, i) => {
                    const data = doc.data();
                    const tab = document.createElement('div');
                    tab.className = `project-tab ${currentProj?.id === doc.id ? 'active' : ''}`;
                    tab.innerHTML = `<i class="fa-solid fa-folder"></i> <h5>${data.title}</h5>`;
                    tab.onclick = () => selectProject(doc.id, data);
                    list.appendChild(tab);
                    if(!currentProj && i === 0) selectProject(doc.id, data);
                });
            });
            // Simulate sub count
            setInterval(() => {
                const count = parseInt(document.getElementById('live-subs').innerText.replace(/,/g, ''));
                document.getElementById('live-subs').innerText = (count + Math.floor(Math.random() * 5)).toLocaleString();
            }, 3000);
        }

        function selectProject(id, data) {
            currentProj = { id, ...data };
            document.querySelectorAll('.project-tab').forEach(t => t.classList.remove('active'));
            
            // Build SCRIPT
            let script = `// MASTER PRD: ${data.title.toUpperCase()}\n// ARCHITECT: NASRULLAH KHAN\n\n`;
            data.tasks.forEach((t, i) => {
                script += `STEP ${i+1}: ${t.title}\nSTATUS: ${progress[t.id] ? 'COMPLETE' : 'PENDING'}\nDETAILS: ${t.prd || 'Core logic layer.'}\n\n`;
            });
            document.getElementById('prd-display').innerText = script;

            renderCanvas(data);
            updateStats();
            setTimeout(drawLines, 600);
        }

        function renderCanvas(data) {
            const container = document.getElementById('roadmap-nodes');
            container.innerHTML = "";
            const colors = ['var(--accent)', '#007aff', '#34c759'];
            const tasks = data.tasks || [];
            const chunk = Math.ceil(tasks.length / 3);

            for(let i=0; i<3; i++) {
                const phaseTasks = tasks.slice(i * chunk, (i + 1) * chunk);
                const card = document.createElement('div');
                card.className = `phase-card pos-${i+1}`;
                card.id = `node-${i+1}`;
                
                let html = `<h3>Phase 0${i+1}</h3>`;
                phaseTasks.forEach(t => {
                    const diff = ['Easy', 'Med', 'Hard'][Math.floor(Math.random()*3)];
                    const isDone = progress[t.id] ? 'done' : '';
                    html += `
                        <div class="task-row ${isDone}" onclick="toggleTask(this, '${t.id}')">
                            <div class="task-left">
                                <div class="task-check"></div>
                                <span>${t.title}</span>
                            </div>
                            <div class="diff-tag" style="background: ${isDone ? '#eee' : '#fff0eb'}; color: ${isDone ? '#aaa' : 'var(--accent)'}">${diff}</div>
                        </div>`;
                });
                card.innerHTML = html;
                container.appendChild(card);
            }
        }

        // === ENGINE FUNCTIONS ===
        function toggleTask(el, id) {
            el.classList.toggle('done');
            progress[id] = el.classList.contains('done');
            localStorage.setItem('nx_v4_progress', JSON.stringify(progress));
            updateStats();
        }

        function updateStats() {
            const total = currentProj?.tasks.length || 0;
            const done = currentProj?.tasks.filter(t => progress[t.id]).length || 0;
            const p = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('perc-stat').innerText = p + '%';
            if(p === 100) confetti({ particleCount: 200, spread: 80, colors: ['#ff5500', '#000'] });
        }

        function cam(view, btn) {
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const vp = document.getElementById('viewport');
            const poses = { 'global': 'scale(1) translate(0,0)', 'p1': 'scale(1.8) translate(25%, 15%)', 'p2': 'scale(1.8) translate(-25%, 15%)', 'p3': 'scale(1.8) translate(0, -25%)' };
            vp.style.transform = poses[view];
        }

        function drawLines() {
            const hub = document.querySelector('.nexus-hub').getBoundingClientRect();
            const cx = hub.left + hub.width / 2;
            const cy = hub.top + hub.height / 2;

            for(let i=1; i<=3; i++) {
                const node = document.getElementById('node-'+i);
                if(!node) continue;
                const nr = node.getBoundingClientRect();
                document.getElementById('l'+i).setAttribute('d', `M ${cx} ${cy} Q ${cx} ${nr.top + nr.height/2} ${nr.left + nr.width/2} ${nr.top + nr.height/2}`);
            }
        }

        function searchProject() {
            const val = document.getElementById('universal-search').value.toLowerCase();
            document.querySelectorAll('.project-tab').forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        }

        // Command Palette Listener
        window.addEventListener('keydown', e => {
            if(e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('universal-search').focus();
            }
        });

        function openModal(type) {
            const o = document.getElementById('modal-overlay');
            const t = document.getElementById('modal-title');
            const b = document.getElementById('modal-body');
            o.style.display = "flex";
            if(type==='firebase') { t.innerText="Firebase Config"; b.innerText='const config = {\n apiKey: "NX_PRO_KEY",\n auth: "nexratech.com"\n};'; }
            else if(type==='admob') { t.innerText="AdMob Test IDs"; b.innerText='Banner: ca-app-pub-3940...\nInterstitial: ca-app-pub-123...'; }
            else if(type==='api') { t.innerText="Elite API Vault"; b.innerText='GEMINI_KEY: xxxx-xxxx\nSTRIPE_LIVE: live_xxxxx'; }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }
        function copyVault() { navigator.clipboard.writeText(document.getElementById('prd-display').innerText); alert("Master Script Copied!"); }

        window.onload = initOS;
        window.onresize = drawLines;
    </script>
</body>
</html>
