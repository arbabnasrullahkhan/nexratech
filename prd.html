<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra OS | The One Man Army Protocol</title>
    
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" type="image/png">
    
    <!-- Frameworks -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f4ef;
            --orange: #ff5500;
            --obsidian: #0f172a;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.05);
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
            --director-ease: cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* --- UI CORE & NOISE TEXTURE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: none; outline: none; }
        body { background: var(--bg); color: var(--obsidian); height: 100vh; overflow: hidden; position: relative; }
        
        body::before {
            content: ""; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.03;
        }

        /* --- CINEMATIC BOOT SEQUENCE --- */
        #boot-os {
            position: fixed; inset: 0; background: var(--obsidian); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s var(--director-ease);
        }
        .boot-status { color: var(--orange); font-family: 'Fira Code', monospace; font-size: 12px; margin-top: 20px; letter-spacing: 2px; }
        .boot-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .boot-progress { height: 100%; width: 0%; background: var(--orange); transition: width 0.4s ease; box-shadow: 0 0 15px var(--orange); }

        /* --- BACKGROUND PARTICLES --- */
        #particle-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.4; }

        /* --- CUSTOM CURSOR --- */
        #os-cursor { position: fixed; width: 12px; height: 12px; background: var(--obsidian); border-radius: 50%; z-index: 10001; pointer-events: none; transform: translate(-50%, -50%); transition: transform 0.1s ease; }
        #os-cursor-glow { position: fixed; width: 40px; height: 40px; border: 1px solid var(--orange); border-radius: 50%; z-index: 10000; pointer-events: none; transform: translate(-50%, -50%); transition: all 0.15s var(--spring); opacity: 0.3; }

        /* --- MAIN VIEWPORT CANVAS --- */
        .os-viewport {
            width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;
            perspective: 2000px; z-index: 10; position: relative;
        }
        .world-layer {
            position: relative; width: 3000px; height: 3000px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.2s var(--director-ease); transform-origin: center center;
            will-change: transform;
        }

        /* --- NEURAL GLOW HUB & ORBIT RINGS --- */
        .neural-hub {
            position: relative; width: 220px; height: 220px;
            background: var(--obsidian); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 8px solid white; z-index: 100;
            box-shadow: 0 30px 100px rgba(0,0,0,0.3);
            animation: pulse-heart 3s infinite ease-in-out;
        }
        @keyframes pulse-heart { 0%, 100% { transform: scale(1); box-shadow: 0 30px 100px rgba(0,0,0,0.3); } 50% { transform: scale(1.05); box-shadow: 0 30px 120px rgba(255,85,0,0.2); } }

        .orbit-ring {
            position: absolute; border: 1px dashed rgba(0,0,0,0.05); border-radius: 50%;
            pointer-events: none; animation: rotate-orbit 60s linear infinite;
        }
        .ring-1 { width: 500px; height: 500px; }
        .ring-2 { width: 800px; height: 800px; animation-duration: 90s; }
        @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- GLASS CARDS (3D TILT) --- */
        .os-card {
            position: absolute; width: 280px; background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 24px; border-radius: 30px; border: 1px solid white;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05); z-index: 50;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }
        .os-card:hover { box-shadow: 0 25px 60px rgba(0,0,0,0.1); border-color: var(--orange); }

        .os-card .badge {
            width: 40px; height: 40px; border-radius: 12px; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; transform: translateZ(20px);
        }

        /* --- XP & PROGRESS --- */
        .xp-container {
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
            width: 300px; text-align: center; z-index: 1000;
        }
        .xp-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--orange), #ffae00); transition: width 1s var(--spring); }

        /* --- COMMAND PALETTE --- */
        #cmd-palette {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%) scale(0.9);
            width: 600px; background: white; border-radius: 24px;
            box-shadow: 0 50px 150px rgba(0,0,0,0.2); z-index: 10000;
            padding: 10px; border: 1px solid var(--border);
            display: none; opacity: 0; transition: 0.3s var(--spring);
        }
        #cmd-palette.active { display: block; opacity: 1; transform: translateX(-50%) scale(1); }
        .cmd-input { width: 100%; padding: 15px 20px; border: none; font-size: 18px; font-weight: 600; color: var(--obsidian); background: transparent; }

        /* --- SIDEBARS --- */
        .os-sidebar {
            position: fixed; left: 20px; top: 100px; bottom: 100px; width: 260px;
            background: white; border-radius: 30px; padding: 25px;
            box-shadow: var(--border) 0px 10px 30px; z-index: 1000;
            transition: transform 0.5s var(--spring);
        }
        .os-sidebar.hidden { transform: translateX(-300px); }

        /* --- SVG SYSTEM ICONS --- */
        .svg-icon { width: 20px; height: 20px; fill: currentColor; }

        /* --- STATS & HEALTH --- */
        .health-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px currentColor; }
        .health-online { color: #22c55e; background: #22c55e; }

        /* --- ANIMATIONS --- */
        .stagger-load { animation: slideUp 0.8s var(--spring) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* --- DIRECTOR ZOOM BUTTONS --- */
        .os-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--obsidian); padding: 8px; border-radius: 100px;
            display: flex; gap: 5px; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .os-btn {
            background: transparent; border: none; color: #64748b; font-size: 10px;
            font-weight: 800; padding: 12px 20px; border-radius: 100px; transition: 0.3s;
        }
        .os-btn.active { color: white; background: #334155; }
        .os-btn:hover:not(.active) { color: var(--orange); }

        /* --- MOBILE ADAPTIVE --- */
        @media (max-width: 1024px) {
            .world-layer { flex-direction: column; height: auto; padding: 150px 0; transform: none !important; }
            .os-card { position: relative; left: auto !important; top: auto !important; transform: none !important; margin: 20px auto; }
            .os-sidebar, .os-controls, #particle-canvas, .orbit-ring { display: none; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body class="loading-state">

    <!-- 1. OS Boot Screen -->
    <div id="boot-os">
        <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" width="100" style="filter: drop-shadow(0 0 20px rgba(255,85,0,0.5))">
        <div class="boot-status" id="boot-text">INITIALIZING NEXRA_OS...</div>
        <div class="boot-bar"><div class="boot-progress" id="boot-load"></div></div>
    </div>

    <!-- 2. Interactive Background -->
    <canvas id="particle-canvas"></canvas>
    <div id="os-cursor"></div>
    <div id="os-cursor-glow"></div>

    <!-- 3. Top Status Bar -->
    <header style="position: fixed; top: 0; left: 0; right: 0; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 10000; pointer-events: none;">
        <div style="background: white; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); pointer-events: all;">
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" height="30">
            <h2 style="font-size: 14px; font-weight: 800;">NEXRA <span style="color: var(--orange);">OS</span></h2>
        </div>

        <div class="xp-container" style="pointer-events: all;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; letter-spacing: 1px;">
                <span>LEVEL <span id="user-level">1</span></span>
                <span>XP: <span id="user-xp">0</span>/1000</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
        </div>

        <div style="background: white; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); pointer-events: all;">
            <div class="health-dot health-online"></div>
            <span style="font-size: 11px; font-weight: 800;" id="system-time">00:00:00</span>
        </div>
    </header>

    <!-- 4. Main OS Sidebar -->
    <aside class="os-sidebar" id="main-sidebar">
        <div style="margin-bottom: 30px; text-align: center;">
            <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" width="60" style="border-radius: 15px; margin-bottom: 10px;">
            <h3 style="font-size: 16px;">Nexra Tech</h3>
            <p style="font-size: 10px; color: #94a3b8; font-weight: 800;">84+ SUBSCRIBERS</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div style="font-size: 10px; font-weight: 800; color: #cbd5e1; letter-spacing: 2px; margin-bottom: 5px;">PROJECT VAULT</div>
            <div id="history-list" style="display: flex; flex-direction: column; gap: 8px;">
                <!-- Projects from Firebase -->
            </div>
        </div>

        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 20px;">
            <!-- SVG Icons only -->
            <a href="https://youtube.com/@NexraTech"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.016 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.455L15.818 12l-6.273 3.568z"/></svg></a>
            <svg class="svg-icon" viewBox="0 0 24 24" onclick="toggleFocus()"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
    </aside>

    <!-- 5. Cinematic Roadmap Canvas -->
    <div class="os-viewport" id="viewport">
        <div class="world-layer" id="world">
            
            <div class="orbit-ring ring-1"></div>
            <div class="orbit-ring ring-2"></div>

            <svg style="position: absolute; inset: 0; pointer-events: none; z-index: 5;">
                <path id="flow-1" class="line-path" stroke="var(--orange)" d=""></path>
                <path id="flow-2" class="line-path" stroke="#007aff" d=""></path>
                <path id="flow-3" class="line-path" stroke="#22c55e" d=""></path>
            </svg>

            <!-- Neural Center Hub -->
            <div class="neural-hub" id="hub-trigger">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" width="60">
                <div style="position: absolute; bottom: 35px; color: white; font-family: 'Space Grotesk'; font-size: 8px; letter-spacing: 3px; font-weight: 800;">PROTOCOL</div>
            </div>

            <!-- Phase Containers (Dynamic) -->
            <div id="cards-container"></div>

        </div>
    </div>

    <!-- 6. Command Palette Overlay -->
    <div id="cmd-palette">
        <input type="text" class="cmd-input" placeholder="Type a command (e.g. /focus, /reset, /prd)..." id="cmd-field">
    </div>

    <!-- 7. Director's Cut Bar -->
    <div class="os-controls">
        <button class="os-btn active" onclick="osView('global', this)">GLOBAL</button>
        <button class="os-btn" onclick="osView('p1', this)">PHASE 01</button>
        <button class="os-btn" onclick="osView('p2', this)">PHASE 02</button>
        <button class="os-btn" onclick="osView('p3', this)">PHASE 03</button>
    </div>

    <script>
        // === FIREBASE CONFIG (SAME AS BEFORE) ===
        const firebaseConfig = {
            apiKey: "AIzaSyDeNZBtVQ5iX5PjV5Gj4xXgxqB3KaJ4cZw",
            authDomain: "nexrapk.firebaseapp.com",
            projectId: "nexrapk",
            storageBucket: "nexrapk.firebasestorage.app",
            messagingSenderId: "958761878252",
            appId: "1:958761878252:web:099246eb11de0e08755bc9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentXP = parseInt(localStorage.getItem('nexra_xp')) || 0;
        let userLevel = Math.floor(currentXP / 1000) + 1;
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        // === 1. BOOT SEQUENCE ===
        window.onload = () => {
            const bootStages = ["MOUNTING_DRIVES...", "SYNCING_FIREBASE...", "INITIALIZING_UI...", "OS_READY."];
            let stage = 0;
            const interval = setInterval(() => {
                document.getElementById('boot-load').style.width = ((stage + 1) * 25) + "%";
                document.getElementById('boot-text').innerText = bootStages[stage];
                stage++;
                if(stage >= 4) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('boot-os').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('boot-os').style.display = 'none';
                            initOS();
                        }, 1000);
                    }, 500);
                }
            }, 600);
        };

        // === 2. PARTICLE SYSTEM ===
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, d: Math.random()*1 });

        function drawParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.d; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // === 3. CUSTOM CURSOR & TILT ===
        document.addEventListener('mousemove', e => {
            document.getElementById('os-cursor').style.left = e.clientX + 'px';
            document.getElementById('os-cursor').style.top = e.clientY + 'px';
            document.getElementById('os-cursor-glow').style.left = e.clientX + 'px';
            document.getElementById('os-cursor-glow').style.top = e.clientY + 'px';
        });

        // === 4. CORE OS FUNCTIONS ===
        function initOS() {
            updateXP(0);
            startTime();
            loadHistory();
            initDragCanvas();
            // Start listening to Firebase
            db.collection("RoadmapData").orderBy("order", "asc").onSnapshot(snap => {
                renderCards(snap.docs);
            });
        }

        function startTime() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('system-time').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
            }, 1000);
        }

        function updateXP(amount) {
            currentXP += amount;
            localStorage.setItem('nexra_xp', currentXP);
            userLevel = Math.floor(currentXP / 1000) + 1;
            const progress = (currentXP % 1000) / 10;
            document.getElementById('xp-fill').style.width = progress + "%";
            document.getElementById('user-xp').innerText = currentXP % 1000;
            document.getElementById('user-level').innerText = userLevel;
        }

        // === 5. COMMAND PALETTE ===
        document.addEventListener('keydown', e => {
            if(e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('cmd-palette').classList.add('active');
                document.getElementById('cmd-field').focus();
            }
            if(e.key === 'Escape') {
                document.getElementById('cmd-palette').classList.remove('active');
            }
            if(e.key === '?') {
                alert("COMMANDS:\nCtrl+K: Open Console\n/focus: Hide Sidebar\n/reset: Clear Data");
            }
        });

        // === 6. CINEMATIC CAMERA ===
        function osView(view, btn) {
            document.querySelectorAll('.os-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const world = document.getElementById('world');
            const trans = {
                'global': 'scale(1) translate(0,0)',
                'p1': 'scale(1.8) translate(20%, 15%)',
                'p2': 'scale(1.8) translate(-20%, 15%)',
                'p3': 'scale(1.8) translate(0, -25%)'
            };
            world.style.transform = trans[view];
        }

        function toggleFocus() {
            document.getElementById('main-sidebar').classList.toggle('hidden');
        }

        // === 7. FIREBASE & CARDS ===
        function renderCards(docs) {
            const container = document.getElementById('cards-container');
            container.innerHTML = "";
            const pos = [
                { top: '10%', left: '10%', c: '#ff5500' },
                { top: '10%', right: '10%', c: '#007aff' },
                { bottom: '10%', left: '50%', transform: 'translateX(-50%)', c: '#22c55e' }
            ];

            docs.forEach((doc, i) => {
                if(i > 2) return; // Support top 3 phases for cinematic view
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "os-card stagger-load";
                Object.assign(card.style, pos[i]);
                
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                        <div class="badge" style="background:${pos[i].c}">0${i+1}</div>
                        <div>
                            <h4 style="font-size:14px; font-weight:800;">${data.title}</h4>
                            <p style="font-size:9px; color:#94a3b8; font-weight:700;">PHASE_SYNC_ID: ${doc.id.substring(0,5)}</p>
                        </div>
                    </div>
                `;
                
                data.tasks.forEach(t => {
                    const taskItem = document.createElement('div');
                    taskItem.style = "display:flex; align-items:center; gap:12px; padding:10px; border-radius:15px; cursor:pointer; transition:0.2s; margin-bottom:5px; border:1px solid transparent;";
                    taskItem.innerHTML = `
                        <div style="width:20px; height:20px; border:2px solid #ddd; border-radius:6px;" class="task-check"></div>
                        <span style="font-size:12px; font-weight:700; color:#475569;">${t.title}</span>
                    `;
                    taskItem.onclick = () => {
                        taskItem.style.background = "rgba(34, 197, 94, 0.1)";
                        taskItem.querySelector('.task-check').style.background = pos[i].c;
                        updateXP(150);
                    };
                    card.appendChild(taskItem);
                });

                container.appendChild(card);
                
                // Tilt logic
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                    const xc = rect.width/2; const yc = rect.height/2;
                    const dx = x - xc; const dy = y - yc;
                    card.style.transform = `rotateY(${dx/15}deg) rotateX(${-dy/15}deg) translateZ(10px)`;
                });
                card.addEventListener('mouseleave', () => card.style.transform = `rotateX(0) rotateY(0)`);
            });
            setTimeout(drawFlowLines, 1000);
        }

        function drawFlowLines() {
            const hub = document.getElementById('hub-trigger').getBoundingClientRect();
            const cx = hub.left + hub.width / 2;
            const cy = hub.top + hub.height / 2;

            for(let i=1; i<=3; i++) {
                const card = document.querySelector(`.os-card:nth-child(${i+2})`); // +2 for orbit rings
                if(!card) continue;
                const cr = card.getBoundingClientRect();
                const path = document.getElementById(`flow-${i}`);
                path.setAttribute('d', `M ${cx} ${cy} Q ${cx} ${cr.top+cr.height/2} ${cr.left+cr.width/2} ${cr.top+cr.height/2}`);
            }
        }

        // === 8. CANVAS DRAG ===
        function initDragCanvas() {
            const view = document.getElementById('viewport');
            view.addEventListener('mousedown', (e) => {
                isDragging = true; view.style.cursor = 'grabbing';
                startX = e.pageX; startY = e.pageY;
            });
            window.addEventListener('mouseup', () => { isDragging = false; view.style.cursor = 'crosshair'; });
            window.addEventListener('mousemove', (e) => {
                if(!isDragging) return;
                const dx = e.pageX - startX; const dy = e.pageY - startY;
                const world = document.getElementById('world');
                // Subtle drift movement
                world.style.marginLeft = dx/5 + 'px';
                world.style.marginTop = dy/5 + 'px';
            });
        }

        function loadHistory() {
            db.collection("RoadmapData").limit(5).get().then(snap => {
                const list = document.getElementById('history-list');
                snap.forEach(doc => {
                    const item = document.createElement('div');
                    item.style = "padding:12px; border-radius:15px; background:#f8f9fa; font-size:12px; font-weight:700; cursor:pointer;";
                    item.innerText = doc.data().title;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
