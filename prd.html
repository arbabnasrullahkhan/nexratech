<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra OS | The Universal Dev Hub</title>
    
    <!-- Frameworks -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #fbfaf5; /* Warm White */
            --sidebar-bg: #ffffff;
            --accent: #ff5500; /* Nexra Orange */
            --obsidian: #1e1e1e; /* Graphite */
            --muted: #94a3b8;
            --border: rgba(0, 0, 0, 0.04);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            --transition: all 0.7s cubic-bezier(0.65, 0, 0.35, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--obsidian); height: 100vh; overflow: hidden; }

        /* --- UI UTILITIES --- */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8); }
        .flex-center { display: flex; align-items: center; justify-content: center; }

        /* --- APP LAYOUT --- */
        .app-shell { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; position: relative; }

        /* --- LEFT SIDEBAR: YT & HISTORY --- */
        .left-sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 100; overflow-y: auto; }
        
        .yt-preview-card { background: #f8f9fa; border-radius: 20px; padding: 15px; border: 1px solid var(--border); text-align: center; }
        .yt-logo { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; }
        .yt-info h4 { font-size: 14px; font-weight: 800; }
        .yt-info p { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
        
        .social-icons { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .soc-btn { width: 32px; height: 32px; border-radius: 8px; background: white; border: 1px solid var(--border); font-size: 14px; transition: 0.3s; }
        .soc-btn:hover { color: var(--accent); transform: translateY(-3px); }

        .nexus-history { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .history-card { padding: 12px 15px; border-radius: 12px; background: var(--bg); border: 1.5px solid transparent; cursor: pointer; transition: 0.3s; }
        .history-card:hover, .history-card.active { border-color: var(--accent); background: white; box-shadow: var(--shadow); }
        .history-card h5 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
        .history-card span { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; }

        /* --- CENTER: ROADMAP HUB --- */
        .workspace-canvas { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .zoom-world { position: relative; width: 100%; height: 100%; transform-origin: center; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        
        #connection-lines { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .path-anim { fill: none; stroke-width: 2; stroke-dasharray: 5; animation: flow 20s linear infinite; opacity: 0.2; }
        @keyframes flow { to { stroke-dashoffset: -500; } }

        .core-hub { width: 150px; height: 160px; background: var(--obsidian); border-radius: 50%; border: 5px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); z-index: 10; cursor: pointer; transition: 0.3s; }
        .core-hub:hover { transform: scale(1.05); }
        .core-hub img { width: 40px; margin-bottom: 8px; }
        .core-hub span { font-size: 8px; letter-spacing: 2px; font-weight: 800; }

        .phase-node { position: absolute; width: 240px; border-radius: 24px; padding: 20px; z-index: 5; transition: 0.4s var(--transition); }
        .phase-node h3 { font-size: 12px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
        
        .task-unit { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: white; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.02); cursor: pointer; transition: 0.2s; }
        .task-unit:hover { transform: translateX(5px); border-color: var(--accent); }
        .check-ui { width: 18px; height: 18px; border: 2px solid #ddd; border-radius: 6px; flex-shrink: 0; }
        .task-unit.done .check-ui { background: var(--accent); border-color: var(--accent); position: relative; }
        .task-unit.done .check-ui::after { content: '✓'; color: white; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; }
        .task-unit.done span { text-decoration: line-through; color: var(--muted); }
        .task-unit span { font-size: 12px; font-weight: 700; color: var(--obsidian); }

        /* Node Positions */
        .node-p1 { top: 10%; left: 10%; }
        .node-p2 { top: 10%; right: 10%; }
        .node-p3 { bottom: 10%; left: 50%; transform: translateX(-50%); }

        /* --- RIGHT SIDEBAR: SCRIPT VAULT --- */
        .right-sidebar { background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .script-box { background: #fcfcfc; border: 1px solid var(--border); border-radius: 15px; padding: 20px; flex: 1; font-family: 'Fira Code', monospace; font-size: 11px; line-height: 1.6; overflow-y: auto; color: #444; white-space: pre-wrap; position: relative; }
        .copy-all-btn { position: sticky; top: -10px; float: right; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; z-index: 10; }

        /* --- BOTTOM FIXED DOCK --- */
        .file-dock { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 10px; z-index: 200; }
        .dock-icon { width: 45px; height: 45px; border-radius: 12px; background: white; border: 1px solid var(--border); box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; }
        .dock-icon:hover { transform: translateY(-5px); border-color: var(--accent); }
        .dock-icon i { font-size: 18px; color: var(--obsidian); }

        /* --- CAMERA CONTROL BAR --- */
        .director-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--obsidian); padding: 8px; border-radius: 50px; display: flex; gap: 5px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 200; }
        .cam-btn { background: transparent; border: none; color: #777; font-size: 10px; font-weight: 800; padding: 10px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cam-btn.active { color: white; background: #444; }
        .cam-btn:hover { color: var(--accent); }

        /* --- POPUP DRAWERS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-box { width: 500px; max-width: 90%; background: white; border-radius: 25px; padding: 30px; box-shadow: var(--shadow); position: relative; }
        .modal-box h2 { font-family: 'Space Grotesk'; font-size: 20px; margin-bottom: 15px; }
        .modal-content { background: #f8fafc; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .app-shell { grid-template-columns: 1fr; }
            .left-sidebar, .right-sidebar { display: none; }
            .director-bar { bottom: 10px; scale: 0.8; }
            .file-dock { bottom: 80px; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- LEFT PANEL -->
        <aside class="left-sidebar">
            <div class="yt-preview-card">
                <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png" class="yt-logo">
                <div class="yt-info">
                    <h4>Nexra Tech</h4>
                    <p>Building the Future Alone.</p>
                </div>
                <div class="social-icons">
                    <button class="soc-btn"><i class="fa-brands fa-youtube"></i></button>
                    <button class="soc-btn"><i class="fa-brands fa-github"></i></button>
                    <button class="soc-btn"><i class="fa-brands fa-telegram"></i></button>
                    <button class="soc-btn"><i class="fa-brands fa-whatsapp"></i></button>
                </div>
                <a href="https://nexratech.vercel.app" style="font-size: 10px; color: var(--accent); text-decoration: none; font-weight: 800;">nexratech.vercel.app</a>
            </div>

            <div class="nexus-history">
                <p class="panel-title" style="font-size: 10px; font-weight: 800; color: #aaa; letter-spacing: 1px; margin-bottom: 10px;">PROJECT HISTORY</p>
                <div id="project-list">
                    <!-- Loaded from Firebase -->
                </div>
            </div>

            <div class="glass" style="padding: 15px; border-radius: 15px; margin-top: auto;">
                <p style="font-size: 11px; font-weight: 700; line-height: 1.4;">Get premium PRDs, templates and AI resources on our website.</p>
            </div>
        </aside>

        <!-- MAIN ROADMAP CANVAS -->
        <main class="workspace-canvas">
            <div class="zoom-world" id="viewport">
                
                <svg id="connection-lines">
                    <path id="l1" class="path-anim" stroke="var(--accent)"></path>
                    <path id="l2" class="path-anim" stroke="#007aff"></path>
                    <path id="l3" class="path-anim" stroke="#34c759"></path>
                </svg>

                <div class="core-hub" id="hub">
                    <img src="https://uploads.onecompiler.io/42yatf6fu/44qbafhwy/IMG_4795.png">
                    <span>NEXRA<br>SYNC</span>
                </div>

                <div id="phases-container">
                    <!-- Phases & Tasks Injected Here -->
                </div>

            </div>
        </main>

        <!-- RIGHT SCRIPT PANEL -->
        <aside class="right-sidebar">
            <p class="panel-title" style="font-size: 10px; font-weight: 800; color: #aaa; letter-spacing: 1px;">MASTER SCRIPT VAULT</p>
            <div class="script-box">
                <button class="copy-all-btn" onclick="copyFullPRD()">COPY ALL</button>
                <div id="full-script-text">Select a project to load its blueprint...</div>
            </div>
            <div class="glass" style="padding: 12px; border-radius: 12px; font-size: 10px; text-align: center; color: var(--muted); font-weight: 700;">
                CONNECTED TO FIRESTORE v9.0
            </div>
        </aside>

    </div>

    <!-- FLOATING FILE DOCK -->
    <div class="file-dock">
        <div class="dock-icon flex-center" title="Firebase Config" onclick="openModal('firebase')"><i class="fa-solid fa-fire"></i></div>
        <div class="dock-icon flex-center" title="AdMob IDs" onclick="openModal('admob')"><i class="fa-solid fa-rectangle-ad"></i></div>
        <div class="dock-icon flex-center" title="Google AI Studio" onclick="window.open('https://aistudio.google.com/')"><i class="fa-solid fa-brain"></i></div>
        <div class="dock-icon flex-center" title="API Vault" onclick="openModal('api')"><i class="fa-solid fa-key"></i></div>
    </div>

    <!-- DIRECTOR BAR -->
    <div class="director-bar">
        <button class="cam-btn active" onclick="camera('global', this)">GLOBAL VIEW</button>
        <button class="cam-btn" onclick="camera('p1', this)">PHASE 01</button>
        <button class="cam-btn" onclick="camera('p2', this)">PHASE 02</button>
        <button class="cam-btn" onclick="camera('p3', this)">PHASE 03</button>
    </div>

    <!-- MODAL SYSTEM -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 id="modal-title">Config</h2>
            <div class="modal-content" id="modal-body"></div>
            <button class="copy-all-btn" style="margin-top: 15px; position: static; width: 100%; padding: 12px;" onclick="copyModalContent()">COPY TO CLIPBOARD</button>
        </div>
    </div>

    <script>
        // === FIREBASE INITIALIZATION ===
        const firebaseConfig = {
            apiKey: "AIzaSyDeNZBtVQ5iX5PjV5Gj4xXgxqB3KaJ4cZw",
            authDomain: "nexrapk.firebaseapp.com",
            projectId: "nexrapk",
            storageBucket: "nexrapk.firebasestorage.app",
            messagingSenderId: "958761878252",
            appId: "1:958761878252:web:099246eb11de0e08755bc9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentProject = null;
        let progress = JSON.parse(localStorage.getItem('nx_progress') || '{}');

        // === FETCH PROJECTS (HISTORY) ===
        function loadProjects() {
            db.collection("RoadmapData").orderBy("order", "asc").onSnapshot(snap => {
                const list = document.getElementById('project-list');
                list.innerHTML = "";
                snap.docs.forEach((doc, i) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = `history-card ${currentProject?.id === doc.id ? 'active' : ''}`;
                    card.innerHTML = `<h5>${data.title}</h5><span>Protocol: ${doc.id.substring(0,6)}</span>`;
                    card.onclick = () => selectProject(doc.id, data);
                    list.appendChild(card);
                    if(!currentProject && i === 0) selectProject(doc.id, data);
                });
            });
        }

        // === SELECT PROJECT ===
        function selectProject(id, data) {
            currentProject = { id, ...data };
            document.querySelectorAll('.history-card').forEach(c => c.classList.remove('active'));
            
            // Build Full PRD Script
            let fullPRD = `[PRD]: ${data.title.toUpperCase()}\n\n`;
            data.tasks.forEach((t, i) => fullPRD += `STEP ${i+1}: ${t.title}\nDETAILS: ${t.prd || 'Core component'}\n\n`);
            document.getElementById('full-script-text').innerText = fullPRD;

            renderRoadmap(data);
            setTimeout(drawLines, 500);
        }

        // === RENDER ROADMAP CANVAS ===
        function renderRoadmap(data) {
            const container = document.getElementById('phases-container');
            container.innerHTML = "";
            const colors = ['var(--accent)', '#007aff', '#34c759'];
            
            // Split tasks into 3 phases automatically
            const tasks = data.tasks || [];
            const chunk = Math.ceil(tasks.length / 3);
            
            for(let i=0; i<3; i++) {
                const phaseTasks = tasks.slice(i * chunk, (i + 1) * chunk);
                const node = document.createElement('div');
                node.className = `phase-node node-p${i+1} glass`;
                node.id = `node${i+1}`;
                
                let taskHTML = "";
                phaseTasks.forEach(t => {
                    const isDone = progress[t.id] ? 'done' : '';
                    taskHTML += `
                        <div class="task-unit ${isDone}" onclick="toggleTask(this, '${t.id}')">
                            <div class="check-ui"></div>
                            <span>${t.title}</span>
                        </div>`;
                });

                node.innerHTML = `<h3>Phase 0${i+1}</h3> ${taskHTML}`;
                container.appendChild(node);
            }
        }

        // === CINEMATIC CAMERA SYSTEM ===
        function camera(view, btn) {
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const viewport = document.getElementById('viewport');
            
            const poses = {
                'global': 'scale(1) translate(0, 0)',
                'p1': 'scale(1.8) translate(25%, 15%)',
                'p2': 'scale(1.8) translate(-25%, 15%)',
                'p3': 'scale(1.8) translate(0, -25%)'
            };
            viewport.style.transform = poses[view];
        }

        // === SVG LINES ===
        function drawLines() {
            const hub = document.getElementById('hub').getBoundingClientRect();
            const cx = hub.left + hub.width / 2;
            const cy = hub.top + hub.height / 2;

            for(let i=1; i<=3; i++) {
                const node = document.getElementById('node'+i);
                if(!node) continue;
                const nr = node.getBoundingClientRect();
                const tx = nr.left + nr.width / 2;
                const ty = nr.top + nr.height / 2;
                document.getElementById('l'+i).setAttribute('d', `M ${cx} ${cy} Q ${cx} ${ty} ${tx} ${ty}`);
            }
        }

        // === LOGIC FUNCTIONS ===
        function toggleTask(el, id) {
            el.classList.toggle('done');
            progress[id] = el.classList.contains('done');
            localStorage.setItem('nx_progress', JSON.stringify(progress));
            
            // 100% Celebration check
            const total = currentProject.tasks.length;
            const doneCount = Object.values(progress).filter(v => v).length;
            if(doneCount === total) confetti({ particleCount: 150, colors: ['#ff5500', '#000'] });
        }

        function openModal(type) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            overlay.style.display = "flex";

            if(type === 'firebase') {
                title.innerText = "Firebase Config";
                body.innerText = `const firebaseConfig = {\n apiKey: "AIzaSy...7Zw",\n projectId: "nexrapk",\n appId: "1:95...bc9"\n};`;
            } else if(type === 'admob') {
                title.innerText = "AdMob Test IDs";
                body.innerText = `Banner: ca-app-pub-3940256099942544/6300978111\nInterstitial: ca-app-pub-3940256099942544/1033173712\nRewarded: ca-app-pub-3940256099942544/5224354917`;
            } else if(type === 'api') {
                title.innerText = "API Vault";
                body.innerText = `GEMINI_API_KEY: AIzaSy...-Nexra\nWHATSAPP_LINK: https://wa.me/NexraTech`;
            }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = "none"; }
        function copyModalContent() { navigator.clipboard.writeText(document.getElementById('modal-body').innerText); alert("📋 Copied!"); }
        function copyFullPRD() { navigator.clipboard.writeText(document.getElementById('full-script-text').innerText); alert("🚀 Full PRD Vault Copied!"); }

        window.onload = loadProjects;
        window.onresize = drawLines;
    </script>
</body>
</html>
